<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор миров 2.0</title>
    <style>
        /* -------- СТИЛИ -------- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; }

        #canvas-container { width: 100vw; height: 100vh; display: block; }

        /* Верхняя панель */
        #toolbar {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,36,0.85); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 40px;
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            max-width: 96%;
        }
        #toolbar button, #toolbar .group-btn {
            background: rgba(255,255,255,0.06);
            border: none; color: #ccc;
            padding: 6px 14px; border-radius: 30px;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid transparent;
            display: inline-flex; align-items: center; gap: 4px;
        }
        #toolbar button:hover, #toolbar .group-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        #toolbar button.active {
            background: #4a9eff; color: #fff; border-color: #4a9eff;
            box-shadow: 0 0 20px rgba(74,158,255,0.25);
        }
        #toolbar button.danger {
            background: rgba(255,70,70,0.2);
        }
        #toolbar button.danger:hover {
            background: rgba(255,70,70,0.4);
        }
        #toolbar .separator {
            width: 1px; background: rgba(255,255,255,0.1);
            margin: 0 4px;
        }
        #toolbar .transform-btn {
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
        }
        #toolbar .transform-btn.active {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }

        /* Статус */
        #status {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            padding: 8px 24px; border-radius: 40px;
            font-size: 14px; color: #ddd;
            z-index: 10; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            max-width: 90%;
        }
        #hint {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.4); padding: 4px 16px; border-radius: 20px;
            font-size: 13px; color: #aaa; z-index: 10; pointer-events: none;
            white-space: nowrap;
        }

        /* Настройки кисти */
        #brush-settings {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,36,0.85); backdrop-filter: blur(8px);
            padding: 8px 20px; border-radius: 30px;
            display: none; gap: 20px; align-items: center;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10; font-size: 14px; color: #ccc;
            pointer-events: auto;
        }
        #brush-settings label { display: flex; align-items: center; gap: 8px; }
        #brush-settings input[type="range"] { width: 100px; accent-color: #4a9eff; }

        /* Палитра предметов */
        #object-palette {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,36,0.85); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 30px;
            display: none; gap: 8px; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 10; pointer-events: auto;
        }
        #object-palette button {
            background: rgba(255,255,255,0.06);
            border: none; color: #ccc;
            padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 13px;
            transition: 0.2s;
        }
        #object-palette button:hover { background: rgba(255,255,255,0.15); }
        #object-palette button.active { background: #4a9eff; color: #fff; }

        /* Панель свойств */
        #properties {
            position: absolute; right: 20px; top: 80px;
            background: rgba(20,20,36,0.9); backdrop-filter: blur(10px);
            padding: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            width: 240px; z-index: 10;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            pointer-events: auto;
            color: #ccc;
            max-height: 80vh;
            overflow-y: auto;
        }
        #properties h3 { margin: 0 0 12px 0; font-size: 16px; color: #fff; }
        #properties label { display: block; font-size: 13px; margin: 8px 0 4px; }
        #properties input[type="number"],
        #properties input[type="color"],
        #properties select {
            width: 100%; padding: 4px 8px;
            background: #2a2a3a; border: 1px solid #444;
            border-radius: 6px; color: #fff;
            font-size: 13px;
        }
        #properties input[type="color"] { height: 36px; padding: 2px; }
        #properties input[type="checkbox"] { width: auto; margin-top: 6px; }
        #properties .row { display: flex; gap: 8px; align-items: center; }
        #properties .row label { margin: 0; }
        #properties .prop-btn {
            margin-top: 12px;
            background: #4a9eff; border: none;
            color: #fff; padding: 6px 0;
            border-radius: 6px; cursor: pointer;
            width: 100%; font-size: 14px;
        }
        #properties .prop-btn:hover { background: #3a8eef; }

        /* Крестик */
        .crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.12);
            font-size: 36px; pointer-events: none; z-index: 5;
            font-weight: 100;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        @media (max-width: 700px) {
            #toolbar button { font-size: 11px; padding: 4px 10px; }
            #properties { width: 200px; right: 10px; }
            #hint { font-size: 11px; white-space: normal; bottom: 100px; }
        }
    </style>
</head>
<body>

    <div class="crosshair">+</div>

    <!-- Панель инструментов -->
    <div id="toolbar">
        <button data-mode="fly" class="active">✈️ Полет</button>
        <button data-mode="terrain">⛰️ Рельеф</button>
        <button data-mode="wall">🧱 Стены</button>
        <button data-mode="object">📦 Предметы</button>
        <button data-mode="select">🖱️ Выделить</button>
        <div class="separator"></div>
        <button id="btn-group" class="group-btn" title="Группировать выделенные">📁 Группа</button>
        <button id="btn-ungroup" class="group-btn" title="Разгруппировать">📂 Разгр.</button>
        <div class="separator"></div>
        <button id="btn-translate" class="transform-btn active" title="Перемещение">⟷</button>
        <button id="btn-rotate" class="transform-btn" title="Вращение">↻</button>
        <button id="btn-scale" class="transform-btn" title="Масштабирование">⤡</button>
        <div class="separator"></div>
        <button id="btn-save-project">💾 Сохранить</button>
        <button id="btn-load-project">📂 Загрузить</button>
        <button id="btn-export-game">⬇️ Экспорт HTML</button>
        <button id="btn-physics" class="danger">⚡ Физика</button>
        <button id="btn-clear" class="danger">❌ Очистить</button>
    </div>

    <!-- Настройки кисти -->
    <div id="brush-settings">
        <label>Радиус <input type="range" id="brush-radius" min="0.5" max="8" step="0.1" value="3"><span id="radius-label">3.0</span></label>
        <label>Сила <input type="range" id="brush-strength" min="0.1" max="2" step="0.1" value="0.6"><span id="strength-label">0.6</span></label>
    </div>

    <!-- Палитра предметов -->
    <div id="object-palette">
        <button data-object="cube" class="active">🧊 Куб</button>
        <button data-object="sphere">⚪ Сфера</button>
        <button data-object="cylinder">🥫 Цилиндр</button>
        <button data-object="tree">🌳 Дерево</button>
        <button data-object="table">🪑 Стол</button>
        <button data-object="chair">💺 Стул</button>
        <button data-object="lamp">💡 Торшер</button>
    </div>

    <!-- Панель свойств -->
    <div id="properties">
        <h3>Свойства</h3>
        <div id="prop-content"></div>
    </div>

    <!-- Статус и подсказка -->
    <div id="status">Режим: Полет — WASD, Shift для ускорения</div>
    <div id="hint">Кликните по сцене, чтобы начать</div>

    <!-- Скрытый input для загрузки проекта -->
    <input type="file" id="file-input" accept=".json" style="display:none">

    <!-- Подключение Three.js и прочего -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- ИМПОРТЫ -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // ----- КОНСТАНТЫ -----
        const MAP_SIZE = 100;
        const SEGMENTS = 64;
        const MAX_HEIGHT = 5;
        const WALL_HEIGHT_DEFAULT = 2.5;
        const WALL_WIDTH_DEFAULT = 0.3;

        // ----- СОСТОЯНИЕ -----
        let currentMode = 'fly';
        let selectedObject = null;
        let selectedObjects = []; // для группировки
        let objectIdCounter = 0;
        const sceneObjects = []; // все объекты { mesh, id, type, data }
        let wallStartPoint = null;
        let clipboard = null; // для копирования
        let physicsEnabled = false;
        let physicsWorld = null;
        let physicsBodies = [];
        let isGrouping = false;

        // Текстуры в base64
        const textureData = {};
        const textureNames = ['trawa', 'stena', 'stena2', 'dpol', 'zemla', 'zemla2', 'nebo', 'bereza'];
        const textureExtensions = { trawa:'jpg', stena:'jpg', stena2:'jpg', dpol:'jpg', zemla:'jpg', zemla2:'jpg', nebo:'jpg', bereza:'png' };

        // ----- СЦЕНА, КАМЕРА, РЕНДЕР -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6da5c9);
        scene.fog = new THREE.Fog(0x6da5c9, 60, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(10, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ----- УПРАВЛЕНИЕ КАМЕРОЙ (Орбит) -----
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.08;
        orbitControls.maxPolarAngle = Math.PI / 2.1;
        orbitControls.minDistance = 0.5;
        orbitControls.maxDistance = 100;
        orbitControls.target.set(0, 0, 0);
        orbitControls.update();

        // ----- TRANSFORM CONTROLS -----
        const transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.setSize(0.6);
        scene.add(transformControls);

        transformControls.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });

        transformControls.addEventListener('objectChange', () => {
            if (selectedObject) {
                // Обновляем данные объекта при изменении
                const mesh = selectedObject.mesh;
                if (mesh) {
                    selectedObject.data.position = mesh.position.clone();
                    selectedObject.data.rotation = mesh.rotation.clone();
                    selectedObject.data.scale = mesh.scale.clone();
                    // Если это стена, обновим её параметры
                    if (selectedObject.type === 'wall') {
                        // Длину, ширину, высоту можно получить из scale и исходных размеров
                        // Для простоты сохраним scale
                    }
                }
            }
        });

        // Переключение режима трансформации
        function setTransformMode(mode) {
            transformControls.setMode(mode);
            document.querySelectorAll('.transform-btn').forEach(b => b.classList.remove('active'));
            if (mode === 'translate') document.getElementById('btn-translate').classList.add('active');
            else if (mode === 'rotate') document.getElementById('btn-rotate').classList.add('active');
            else if (mode === 'scale') document.getElementById('btn-scale').classList.add('active');
        }
        document.getElementById('btn-translate').addEventListener('click', () => setTransformMode('translate'));
        document.getElementById('btn-rotate').addEventListener('click', () => setTransformMode('rotate'));
        document.getElementById('btn-scale').addEventListener('click', () => setTransformMode('scale'));

        // ----- ОСВЕЩЕНИЕ -----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(30, 40, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 100;
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-20, 10, -20);
        scene.add(fill);

        // ----- ЗАГРУЗКА ТЕКСТУР (fetch + base64) -----
        async function loadTextures() {
            const loadPromises = textureNames.map(async (name) => {
                const ext = textureExtensions[name] || 'jpg';
                const path = `textures/${name}.${ext}`;
                try {
                    const response = await fetch(path);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const blob = await response.blob();
                    const reader = new FileReader();
                    return new Promise((resolve) => {
                        reader.onload = () => {
                            textureData[name] = reader.result; // base64
                            resolve();
                        };
                        reader.readAsDataURL(blob);
                    });
                } catch (e) {
                    console.warn(`Не удалось загрузить текстуру ${path}`, e);
                    textureData[name] = null;
                }
            });
            await Promise.all(loadPromises);
            console.log('Текстуры загружены:', Object.keys(textureData).filter(k => textureData[k]));
        }

        // Создание Three.Texture из base64
        function createTextureFromBase64(base64) {
            if (!base64) return null;
            const img = new Image();
            img.src = base64;
            const tex = new THREE.Texture(img);
            tex.needsUpdate = true;
            return tex;
        }

        // ----- ЛАНДШАФТ -----
        const geometry = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, SEGMENTS, SEGMENTS);
        geometry.rotateX(-Math.PI/2);
        const posAttr = geometry.attributes.position;
        const vertexCount = posAttr.count;
        const origX = new Float32Array(vertexCount);
        const origZ = new Float32Array(vertexCount);
        for (let i=0; i<vertexCount; i++) {
            origX[i] = posAttr.getX(i);
            origZ[i] = posAttr.getZ(i);
        }
        const heights = new Float32Array(vertexCount);
        heights.fill(0);

        function updateTerrain() {
            for (let i=0; i<vertexCount; i++) {
                posAttr.setY(i, heights[i]);
            }
            posAttr.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        let terrainMat;
        let terrain;

        function initTerrain() {
            const tex = textureData['trawa'] ? createTextureFromBase64(textureData['trawa']) : null;
            terrainMat = new THREE.MeshStandardMaterial({
                map: tex || undefined,
                color: tex ? 0xffffff : 0x6da56a,
                roughness: 0.8,
                metalness: 0.0,
                side: THREE.DoubleSide,
            });
            terrain = new THREE.Mesh(geometry, terrainMat);
            terrain.receiveShadow = true;
            terrain.castShadow = true;
            terrain.position.y = 0;
            scene.add(terrain);
        }

        // ----- ФУНКЦИИ РАБОТЫ С РЕЛЬЕФОМ -----
        function getClosestVertexIndex(x, z) {
            let minDist = Infinity;
            let idx = -1;
            for (let i=0; i<vertexCount; i++) {
                const dx = origX[i] - x;
                const dz = origZ[i] - z;
                const dist = dx*dx + dz*dz;
                if (dist < minDist) {
                    minDist = dist;
                    idx = i;
                }
            }
            return idx;
        }

        function modifyTerrain(x, z, radius, strength, mode) {
            const radiusSq = radius*radius;
            for (let i=0; i<vertexCount; i++) {
                const dx = origX[i] - x;
                const dz = origZ[i] - z;
                const distSq = dx*dx + dz*dz;
                if (distSq < radiusSq) {
                    const influence = 1 - Math.sqrt(distSq)/radius;
                    const delta = influence * strength;
                    if (mode === 'raise') heights[i] += delta;
                    else if (mode === 'lower') heights[i] -= delta;
                    heights[i] = Math.max(-MAX_HEIGHT, Math.min(MAX_HEIGHT, heights[i]));
                }
            }
            updateTerrain();
        }

        // ----- СОЗДАНИЕ ОБЪЕКТОВ -----
        function createWall(x1, z1, x2, z2, height = WALL_HEIGHT_DEFAULT, width = WALL_WIDTH_DEFAULT) {
            const dx = x2 - x1;
            const dz = z2 - z1;
            const length = Math.sqrt(dx*dx + dz*dz);
            if (length < 0.3) return null;
            const angle = Math.atan2(dx, dz);
            const midX = (x1 + x2) / 2;
            const midZ = (z1 + z2) / 2;

            // Материал стены (попробуем использовать текстуру досок или камня)
            let tex = textureData['stena'] ? createTextureFromBase64(textureData['stena']) : null;
            if (!tex) tex = textureData['dpol'] ? createTextureFromBase64(textureData['dpol']) : null;
            const wallMat = new THREE.MeshStandardMaterial({
                map: tex || undefined,
                color: tex ? 0xffffff : 0xbc8f4f,
                roughness: 0.7,
                metalness: 0.0,
            });
            const wall = new THREE.Mesh(new THREE.BoxGeometry(width, height, length), wallMat);
            wall.position.set(midX, height/2, midZ);
            wall.rotation.y = angle;
            wall.castShadow = true;
            wall.receiveShadow = true;
            wall.userData.isObject = true;
            wall.userData.id = objectIdCounter++;
            wall.userData.type = 'wall';
            wall.userData.width = width;
            wall.userData.height = height;
            wall.userData.length = length;
            scene.add(wall);
            const objData = {
                mesh: wall,
                id: wall.userData.id,
                type: 'wall',
                data: {
                    width, height, length,
                    x1, z1, x2, z2,
                    position: wall.position.clone(),
                    rotation: wall.rotation.clone(),
                    scale: wall.scale.clone(),
                    color: wallMat.color.getHex(),
                    texture: tex ? 'stena' : null,
                    collision: true,
                }
            };
            sceneObjects.push(objData);
            updateObjectList();
            return objData;
        }

        function createObject(type, position, color = 0xffaa00, size = 0.6) {
            let mesh;
            let tex = null;
            if (type === 'tree') {
                const group = new THREE.Group();
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 0.8, 6), trunkMat);
                trunk.position.y = 0.4;
                trunk.castShadow = true;
                group.add(trunk);
                const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
                const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.8, 6), leafMat);
                leaf.position.y = 0.9;
                leaf.castShadow = true;
                group.add(leaf);
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'tree';
                scene.add(group);
                const objData = {
                    mesh: group,
                    id: group.userData.id,
                    type: 'tree',
                    data: {
                        position: position.clone(),
                        rotation: new THREE.Euler(0,0,0),
                        scale: new THREE.Vector3(1,1,1),
                        color: 0x2E7D32,
                        texture: null,
                        collision: true,
                    }
                };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else if (type === 'table') {
                const group = new THREE.Group();
                const topMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
                const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 0.5), topMat);
                top.position.y = 0.6;
                top.castShadow = true;
                group.add(top);
                const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                for (let x of [-0.35, 0.35]) {
                    for (let z of [-0.2, 0.2]) {
                        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.55, 6), legMat);
                        leg.position.set(x, 0.275, z);
                        group.add(leg);
                    }
                }
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'table';
                scene.add(group);
                const objData = {
                    mesh: group,
                    id: group.userData.id,
                    type: 'table',
                    data: {
                        position: position.clone(),
                        rotation: new THREE.Euler(0,0,0),
                        scale: new THREE.Vector3(1,1,1),
                        color: 0xDEB887,
                        texture: null,
                        collision: true,
                    }
                };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else if (type === 'chair') {
                const group = new THREE.Group();
                const seatMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
                const seat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.3), seatMat);
                seat.position.y = 0.35;
                seat.castShadow = true;
                group.add(seat);
                const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                for (let x of [-0.12, 0.12]) {
                    for (let z of [-0.12, 0.12]) {
                        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), legMat);
                        leg.position.set(x, 0.15, z);
                        group.add(leg);
                    }
                }
                const backMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
                const back = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.02), backMat);
                back.position.set(0, 0.55, -0.15);
                group.add(back);
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'chair';
                scene.add(group);
                const objData = {
                    mesh: group,
                    id: group.userData.id,
                    type: 'chair',
                    data: {
                        position: position.clone(),
                        rotation: new THREE.Euler(0,0,0),
                        scale: new THREE.Vector3(1,1,1),
                        color: 0xDEB887,
                        texture: null,
                        collision: true,
                    }
                };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else if (type === 'lamp') {
                const group = new THREE.Group();
                const poleMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.8, roughness: 0.2 });
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 1.0, 8), poleMat);
                pole.position.y = 0.5;
                pole.castShadow = true;
                group.add(pole);
                const shadeMat = new THREE.MeshStandardMaterial({ color: 0xFFE4B5 });
                const shade = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.25, 8), shadeMat);
                shade.position.y = 1.1;
                shade.castShadow = true;
                group.add(shade);
                const bulbMat = new THREE.MeshStandardMaterial({ color: 0xFFFF88, emissive: 0xFFFF88, emissiveIntensity: 0.3 });
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), bulbMat);
                bulb.position.y = 0.95;
                group.add(bulb);
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'lamp';
                scene.add(group);
                const objData = {
                    mesh: group,
                    id: group.userData.id,
                    type: 'lamp',
                    data: {
                        position: position.clone(),
                        rotation: new THREE.Euler(0,0,0),
                        scale: new THREE.Vector3(1,1,1),
                        color: 0xFFE4B5,
                        texture: null,
                        collision: true,
                    }
                };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else {
                // Простые примитивы
                const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.1 });
                if (type === 'cube') {
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                } else if (type === 'sphere') {
                    mesh = new THREE.Mesh(new THREE.SphereGeometry(size/2, 16, 16), mat);
                } else if (type === 'cylinder') {
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(size/2, size/2, size, 12), mat);
                } else {
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
                }
                mesh.position.copy(position);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.isObject = true;
                mesh.userData.id = objectIdCounter++;
                mesh.userData.type = type;
                scene.add(mesh);
                const objData = {
                    mesh: mesh,
                    id: mesh.userData.id,
                    type: type,
                    data: {
                        position: position.clone(),
                        rotation: new THREE.Euler(0,0,0),
                        scale: new THREE.Vector3(1,1,1),
                        color: color,
                        texture: null,
                        collision: true,
                        size: size,
                    }
                };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            }
        }

        function removeObject(objData) {
            scene.remove(objData.mesh);
            const idx = sceneObjects.indexOf(objData);
            if (idx !== -1) sceneObjects.splice(idx, 1);
            if (selectedObject === objData) {
                selectedObject = null;
                transformControls.detach();
            }
            // Удалить из selectedObjects
            const selIdx = selectedObjects.indexOf(objData);
            if (selIdx !== -1) selectedObjects.splice(selIdx, 1);
            updateObjectList();
            hideProperties();
        }

        function clearAll() {
            sceneObjects.forEach(obj => scene.remove(obj.mesh));
            sceneObjects.length = 0;
            selectedObject = null;
            selectedObjects = [];
            transformControls.detach();
            updateObjectList();
            hideProperties();
            for (let i=0; i<vertexCount; i++) heights[i] = 0;
            updateTerrain();

            if (physicsEnabled) disablePhysics();

        // ----- ВЫДЕЛЕНИЕ -----

            if (objData) {

        function applyProperties(objData) {
            const inputs = document.querySelectorAll('#prop-content [data-prop]');
            const newData = {};
            inputs.forEach(inp => {
                const prop = inp.dataset.prop;
                if (prop === 'color') newData[prop] = inp.value;
                else if (prop === 'collision') newData[prop] = inp.checked;
                else if (prop === 'texture') newData[prop] = inp.value || null;
                else newData[prop] = parseFloat(inp.value);
            });

            const d = objData.data;
            // Обновляем позицию
            d.position.set(newData.posX || 0, newData.posY || 0, newData.posZ || 0);
            objData.mesh.position.copy(d.position);

            if (objData.type === 'wall') {
                // Для стены обновляем размеры (пересоздаём стену?)
                // Проще обновить геометрию: удалить старую и создать новую
                // Но мы не храним начальные точки, поэтому проще пересоздать
                // Пока обновим только scale (но это не совсем правильно)
                // Лучше пересоздать стену заново, но тогда потеряем id и привязки
                // Для простоты используем масштабирование
                const w = newData.width || d.width;
                const h = newData.height || d.height;
                const l = newData.length || d.length;
                // Изменим геометрию
                const oldGeo = objData.mesh.geometry;
                const newGeo = new THREE.BoxGeometry(w, h, l);
                objData.mesh.geometry = newGeo;
                objData.mesh.position.y = h/2;
                d.width = w;
                d.height = h;
                d.length = l;
                // Обновим userData
                objData.mesh.userData.width = w;
                objData.mesh.userData.height = h;
                objData.mesh.userData.length = l;
            } else {
                // Для примитивов используем scale
                const sx = newData.scaleX || 1;
                const sy = newData.scaleY || 1;
                const sz = newData.scaleZ || 1;
                objData.mesh.scale.set(sx, sy, sz);
                d.scale.set(sx, sy, sz);
            }

            // Цвет
            const color = newData.color || '#ffffff';
            const hex = parseInt(color.slice(1), 16);
            objData.mesh.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(hex);
                }
            });
            d.color = hex;

            // Текстура
            const texName = newData.texture;
            if (texName && textureData[texName]) {
                const tex = createTextureFromBase64(textureData[texName]);
                objData.mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.map = tex;
                        child.material.needsUpdate = true;
                    }
                });
                d.texture = texName;
            } else {
                objData.mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.map = null;
                        child.material.needsUpdate = true;
                    }
                });
                d.texture = null;
            }

            // Коллизия
            d.collision = newData.collision;

            // Обновить TransformControls
            transformControls.detach();
            transformControls.attach(objData.mesh);

            // Обновить панель
            showProperties(objData);
            updateObjectList();
            setStatus('Свойства обновлены');
        }

        function duplicateObject(objData) {
            // Копируем объект со смещением
            const pos = objData.data.position.clone();
            pos.x += 1;
            pos.z += 1;
            let newObj;
            if (objData.type === 'wall') {
                // Для стены нужно создать новую
                const d = objData.data;
                const halfW = d.length/2;
                // Вычислим начальные точки
                const angle = objData.mesh.rotation.y;
                const dx = Math.sin(angle) * halfW;
                const dz = Math.cos(angle) * halfW;
                const cx = objData.mesh.position.x;
                const cz = objData.mesh.position.z;
                const x1 = cx - dx;
                const z1 = cz - dz;
                const x2 = cx + dx;
                const z2 = cz + dz;
                // Сместим
                const offsetX = 1;
                const offsetZ = 1;
                newObj = createWall(x1+offsetX, z1+offsetZ, x2+offsetX, z2+offsetZ, d.height, d.width);
            } else {
                newObj = createObject(objData.type, pos, objData.data.color, 0.6);
            }
            if (newObj) {
                selectObject(newObj);
                setStatus('Объект дублирован');
            }
        }

        // ----- ВЫДЕЛЕНИЕ НЕСКОЛЬКИХ ОБЪЕКТОВ (Shift+клик) -----

        // ----- ФИЗИКА (Cannon-es) -----
        async function togglePhysics() {
            if (physicsEnabled) {
                disablePhysics();
                return;
            }
            try {
                const module = await import('https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js');
                const CANNON = module.default || module;
                physicsWorld = new CANNON.World();
                physicsWorld.gravity.set(0, -9.82, 0);
                physicsWorld.broadphase = new CANNON.SAPBroadphase(physicsWorld);
                // Материалы
                const groundMat = new CANNON.Material('ground');
                const objectMat = new CANNON.Material('object');
                const contactMat = new CANNON.ContactMaterial(groundMat, objectMat, { friction: 0.3, restitution: 0.0 });
                physicsWorld.addContactMaterial(contactMat);

                // Земля - тримеш
                const vertices = [];
                const indices = [];
                const posAttr2 = geometry.attributes.position;
                const indexAttr = geometry.index;
                for (let i=0; i<posAttr2.count; i++) {
                    vertices.push(posAttr2.getX(i), posAttr2.getY(i), posAttr2.getZ(i));
                }
                if (indexAttr) {
                    for (let i=0; i<indexAttr.count; i++) indices.push(indexAttr.getX(i));
                } else {
                    for (let i=0; i<posAttr2.count; i+=3) indices.push(i, i+1, i+2);
                }
                const trimesh = new CANNON.Trimesh(vertices, indices);
                const groundBody = new CANNON.Body({ mass: 0, material: groundMat });
                groundBody.addShape(trimesh);
                physicsWorld.addBody(groundBody);

                // Для каждого объекта с коллизией создаём физическое тело
                sceneObjects.forEach(obj => {
                    if (!obj.data.collision) return;
                    const mesh = obj.mesh;
                    let shape;
                    const pos = mesh.position;
                    const rot = mesh.quaternion;
                    // Определяем форму
                    if (obj.type === 'wall') {
                        const w = obj.data.width || 0.3;
                        const h = obj.data.height || 2.5;
                        const l = obj.data.length || 1;
                        shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, l/2));
                    } else if (obj.type === 'cube') {
                        const size = 0.6;
                        shape = new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2));
                    } else if (obj.type === 'sphere') {
                        const size = 0.6;
                        shape = new CANNON.Sphere(size/2);
                    } else if (obj.type === 'cylinder') {
                        const size = 0.6;
                        shape = new CANNON.Cylinder(size/2, size/2, size, 8);
                    } else if (obj.type === 'tree' || obj.type === 'table' || obj.type === 'chair' || obj.type === 'lamp') {
                        // Используем box для упрощения
                        const bbox = new THREE.Box3().setFromObject(mesh);
                        const size = bbox.getSize(new THREE.Vector3());
                        shape = new CANNON.Box(new CANNON.Vec3(size.x/2, size.y/2, size.z/2));
                    } else {
                        // По умолчанию box
                        shape = new CANNON.Box(new CANNON.Vec3(0.3, 0.3, 0.3));
                    }
                    const body = new CANNON.Body({ mass: 1, material: objectMat });
                    body.addShape(shape);
                    body.position.set(pos.x, pos.y, pos.z);
                    body.quaternion.set(rot.x, rot.y, rot.z, rot.w);
                    physicsWorld.addBody(body);
                    // Сохраняем связь
                    obj.physicsBody = body;
                    physicsBodies.push(body);
                });

                physicsEnabled = true;
                document.getElementById('btn-physics').style.background = 'rgba(74,158,255,0.4)';
                setStatus('Физика включена');
                // Запускаем цикл физики
                physicsLoop();
            } catch (e) {
                console.error('Ошибка загрузки физики:', e);
                setStatus('Не удалось включить физику');
            }
        }

        function disablePhysics() {
            if (physicsWorld) {
                // Удаляем все тела
                physicsBodies.forEach(body => physicsWorld.removeBody(body));
                physicsBodies = [];
                // Убираем ссылки
                sceneObjects.forEach(obj => delete obj.physicsBody);
                physicsWorld = null;
            }
            physicsEnabled = false;
            document.getElementById('btn-physics').style.background = 'rgba(255,70,70,0.2)';
            setStatus('Физика отключена');
        }

        function physicsLoop() {
            if (!physicsEnabled || !physicsWorld) return;
            // Синхронизируем физику с мешами
            sceneObjects.forEach(obj => {
                if (obj.physicsBody) {
                    const body = obj.physicsBody;
                    obj.mesh.position.copy(body.position);
                    obj.mesh.quaternion.copy(body.quaternion);
                }
            });
            // Шаг физики
            physicsWorld.step(1/60, 0.016, 3);
            requestAnimationFrame(physicsLoop);
        }

        document.getElementById('btn-physics').addEventListener('click', togglePhysics);

        // ----- СОХРАНЕНИЕ / ЗАГРУЗКА ПРОЕКТА -----
        function saveProject() {
            const data = {
                version: '2.0',
                terrain: {
                    size: MAP_SIZE,
                    segments: SEGMENTS,
                    heights: Array.from(heights),
                    origX: Array.from(origX),
                    origZ: Array.from(origZ),
                },
                objects: sceneObjects.map(obj => ({
                    id: obj.id,
                    type: obj.type,
                    data: {
                        position: [obj.data.position.x, obj.data.position.y, obj.data.position.z],
                        rotation: [obj.data.rotation.x, obj.data.rotation.y, obj.data.rotation.z],
                        scale: [obj.data.scale.x, obj.data.scale.y, obj.data.scale.z],
                        color: obj.data.color,
                        texture: obj.data.texture,
                        collision: obj.data.collision,
                        // Для стен
                        width: obj.data.width,
                        height: obj.data.height,
                        length: obj.data.length,
                        // Для примитивов
                        size: obj.data.size,
                    }
                }))
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'project.json';
            a.click();
            URL.revokeObjectURL(url);
            setStatus('Проект сохранён');
        }

        function loadProject(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    // Очищаем сцену
                    clearAll();
                    // Восстанавливаем ландшафт
                    if (data.terrain) {
                        const t = data.terrain;
                        for (let i=0; i<vertexCount; i++) {
                            heights[i] = t.heights[i] || 0;
                        }
                        updateTerrain();
                    }
                    // Восстанавливаем объекты
                    data.objects.forEach(objData => {
                        const pos = new THREE.Vector3(...objData.data.position);
                        const rot = new THREE.Euler(...objData.data.rotation);
                        const sca = new THREE.Vector3(...objData.data.scale);
                        let obj;
                        if (objData.type === 'wall') {
                            // Для стены нужно восстановить по точкам, но у нас нет x1,z1,x2,z2
                            // Создадим стену из позиции и размеров
                            const w = objData.data.width || 0.3;
                            const h = objData.data.height || 2.5;
                            const l = objData.data.length || 1;
                            // Создаём стену в центре
                            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, l), new THREE.MeshStandardMaterial({ color: objData.data.color }));
                            mesh.position.copy(pos);
                            mesh.rotation.copy(rot);

                            setStatus(`Объект "${type}" добавлен`);
                        }
                    }
                }
            } else if (currentMode === 'select') {
                const objData = getObjectIntersection(event);
                if (objData) {
                    selectObject(objData);
                } else {
                    selectObject(null);
                }
            }
        });

        renderer.domElement.addEventListener('contextmenu', (event) => {
            if (currentMode === 'terrain') {
                event.preventDefault();
                // ПКМ обрабатывается в клике
            }
        });

        // ----- ГОРЯЧИЕ КЛАВИШИ ДЛЯ РЕЖИМОВ -----
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const keyMap = {
                '1': 'fly',
                '2': 'terrain',
                '3': 'wall',
                '4': 'object',
                '5': 'select',
            };
            if (e.key in keyMap) {
                setMode(keyMap[e.key]);
                e.preventDefault();
            }
            if (e.key === 'Escape') {
                setMode('fly');
                e.preventDefault();
            }
        });

        // ----- ИНИЦИАЛИЗАЦИЯ -----
        await loadTextures();
        initTerrain();
        setMode('fly');
        // Добавим демо-объекты
        createObject('cube', new THREE.Vector3(2, 0.3, 2), 0xff0000, 0.6);
        createObject('sphere', new THREE.Vector3(-2, 0.3, -1), 0x00ff00, 0.8);
        createObject('tree', new THREE.Vector3(3, 0, -2));
        createObject('table', new THREE.Vector3(-3, 0, 1));
        // Создадим стену демо
        createWall(-1, -1, 2, -1);
        createWall(2, -1, 2, 2);
        createWall(2, 2, -1, 2);
        createWall(-1, 2, -1, -1);

        setStatus('Редактор загружен! Используйте горячие клавиши 1-5 для переключения режимов.');

        // ----- АНИМАЦИЯ -----
        function animate() {
            requestAnimationFrame(animate);
            // Движение в режиме полета
            if (currentMode === 'fly') {
                const delta = 0.016;
                const speed = keys.shift ? 8 * 2.5 : 8;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0;
                forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0;
                right.normalize();
                const move = new THREE.Vector3(0, 0, 0);
                if (keys.w) move.add(forward);
                if (keys.s) move.sub(forward);
                if (keys.a) move.sub(right);
                if (keys.d) move.add(right);
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed * delta);
                    camera.position.add(move);
                    orbitControls.target.add(move);
                }
            }
            orbitControls.update();
            renderer.render(scene, camera);
        }

        // Обработчики клавиш для полета
        document.addEventListener('keydown', (e) => {
            if (currentMode === 'fly') {
                switch(e.code) {
                    case 'KeyW': keys.w = true; e.preventDefault(); break;
                    case 'KeyA': keys.a = true; e.preventDefault(); break;
                    case 'KeyS': keys.s = true; e.preventDefault(); break;
                    case 'KeyD': keys.d = true; e.preventDefault(); break;
                    case 'ShiftLeft': keys.shift = true; e.preventDefault(); break;
                }
            }
        });
        document.addEventListener('keyup', (e) => {
            if (currentMode === 'fly') {
                switch(e.code) {
                    case 'KeyW': keys.w = false; e.preventDefault(); break;
                    case 'KeyA': keys.a = false; e.preventDefault(); break;
                    case 'KeyS': keys.s = false; e.preventDefault(); break;
                    case 'KeyD': keys.d = false; e.preventDefault(); break;
                    case 'ShiftLeft': keys.shift = false; e.preventDefault(); break;
                }
            }
        });

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Редактор миров 2.0 загружен!');
    </script>
</body>
</html>
