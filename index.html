<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>AWANGARD S.T.A.L.K.E.R. 3D демка</title>
<style>
body { background:#222;margin:0;overflow:hidden;}
#hud { position:absolute; left:16px;top:18px;z-index:9;color:#eee;font:22px monospace;}
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">WASD — ходить, Мышь — смотреть, Колёсико — Zoom</div>
<script>
//---- КОНФИГ ----
const BLOCKS = [
  "stena.jpg", "stena2.jpg", "trawa.jpg", "trawa2.jpg",
  "zemla.jpg", "zemla2.jpg", "dpol.jpg", "nebo.jpg"
];
const BER = "bereza.png"; // берёза (tree cross)
const SZ  = 64;           // размер тайла
const MAPX=16, MAPZ=16, H=4; // карта
const MAP = [];
let TEXT = {}, TREE=[], SKY;

//---- ЗАГРУЗКА ----
function loadTex(file) {
  let img = new Image(); img.src = "textures/"+file;
  return img;
}
window.onload = function() {
  // Загрузка плиток блоков в TEXT{}
  for(let f of BLOCKS) TEXT[f]=loadTex(f);
  SKY=TEXT["nebo.jpg"];
  TREE[0]=loadTex(BER); // крест-на-крест
  TREE[1]=loadTex(BER); // второй крест такая же
  // Делаем простую карту
  for(let y=0;y<H;y++) MAP[y]=[];
  for(let x=0;x<MAPX;x++)
    for(let y=0;y<H;y++)
      for(let z=0;z<MAPZ;z++) {
        if(!MAP[y][z])MAP[y][z]=[];
        // Трава+земля и немного стен, дорожка, дом, деревья
        if(y==0) MAP[y][z][x]= (z%5&&x%5) ? (Math.random()<.15?2+Math.floor(Math.random()*2):4+Math.floor(Math.random()*2)) : 4+Math.floor(Math.random()*2);
        else if(y==1) MAP[y][z][x]= (z==8&&x>2&&x<10)?0 : (x==6&&z==3)?-1 : null;
        else if(y==2&&(x>4&&x<7&&z>4&&z<7)) MAP[y][z][x]=6; // дом пол
        else if(y==2&&(x==5||x==6)&&(z==5||z==6)) MAP[y][z][x]=1; // стены дом
        // деревья
        if(y==1&&((x==2&&z==2)||(x==13&&z==12))) MAP[y][z][x]=-2;
      }
  main();
}

//---- РЕНДЕР ----
let c = document.getElementById('c'), ctx = c.getContext('2d');
let W,Hd, mouseX=0,mouseY=0, last=false;
// Камера
let cam = {x:8,y:2.1,z:13, rx:0, ry:Math.PI, fov:1.1, f:1};
let keys = {};
// Управление
document.addEventListener('keydown',e=>keys[e.key]=1);
document.addEventListener('keyup',e=>keys[e.key]=0);

// Мышка и захват мыши
c.requestPointerLock = c.requestPointerLock||c.mozRequestPointerLock;
document.onclick = ()=>c.requestPointerLock();
document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement===c){
    cam.ry-=e.movementX*0.002; cam.rx-=e.movementY*0.002;
    cam.rx=Math.max(-Math.PI/2+.08,Math.min(Math.PI/2-.08,cam.rx));
  }
});
document.addEventListener("wheel",e=>{
  cam.fov-=e.deltaY*0.001;if(cam.fov<0.3)cam.fov=0.3; if(cam.fov>2.2)cam.fov=2.2;
});

// Простейший рейтрейсер для кубов
function cube(x,y,z,T,sz,rx,ry) {
  const faces = [
    [0,0,sz, sz,0,sz, sz,sz,sz, 0,sz,sz],    // front (z+)
    [sz,0,0,0,0,0,0,sz,0, sz,sz,0],          // back  (z-)
    [0,0,0,sz,0,0,sz,0,sz, 0,0,sz],          // top   (y-)
    [0,sz,sz,sz,sz,sz,sz,sz,0, 0,sz,0],      // bottom(y+)
    [0,0,sz,0,sz,sz,0,sz,0, 0,0,0],          // left  (x-)
    [sz,0,0,sz,0,sz,sz,sz,sz, sz,sz,0]       // right (x+)
  ];
  // Проецируем и рисуем только внешние грани
  let vis=[0,0,0,0,0,0];
  for(let f=0;f<6;f++){
    let show=true;
    let dx=[-1,1,0,0,0,0], dy=[0,0,-1,1,0,0], dz=[0,0,0,0,-1,1];
    for(let n=0;n<2;n++){
      let tx=x+dx[f]*sz,ty=y+dy[f]*sz,tz=z+dz[f]*sz;
      if(MAP[ty]?.[tz]?.[tx]!=null)show=false;
    }
    vis[f]=show;
  }
  // Координаты углов
  for(let f=0;f<6;f++) if(vis[f]){
    ctx.save();
    ctx.globalAlpha=0.94-(f==2)*.1;
    let pts=[];
    for(let v=0;v<4;v++){
      let vx=faces[f][v*3],vy=faces[f][v*3+1],vz=faces[f][v*3+2];
      let xx=x+vx,yy=y+vy,zz=z+vz;
      let [X,Y]=project(xx,yy,zz);
      pts.push([X,Y]);
    }
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let v=1;v<4;v++) ctx.lineTo(pts[v][0],pts[v][1]);
    ctx.closePath();
    let img=TEXT[BLOCKS[T]];
    ctx.drawImage(img,pts[0][0],pts[0][1],Math.abs(pts[2][0]-pts[0][0]),Math.abs(pts[2][1]-pts[0][1]));
    ctx.restore();
  }
}

// Берёза (крест)
function drawBirch(x,y,z,near){
  // 2 поверхности-крест (или 1 спрайт если далеко)
  let s=1.2;
  for(let i=0;i<(near?2:1);i++){
    for(let t of [0,Math.PI/2]){
      let pts=[];
      for(let v=0;v<4;v++){
        let dx=[-s,s,s,-s][v], dz=[-s,-s,s,s][v];
        let angle=cam.ry+(i?t:0);
        let xx=x+dx*Math.cos(angle)-dz*Math.sin(angle);
        let yy=y+((v>1)?1.8:0)-0.1;
        let zz=z+dx*Math.sin(angle)+dz*Math.cos(angle);
        pts.push(project(xx,yy,zz));
      }
      ctx.save();
      ctx.globalAlpha=0.98;
      let img=TREE[i];
      ctx.beginPath();
      ctx.moveTo(pts[0][0],pts[0][1]);
      for(let v of [1,2,3,0])ctx.lineTo(pts[v][0],pts[v][1]);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img,pts[0][0],pts[0][1],Math.abs(pts[3][0]-pts[0][0]),Math.abs(pts[3][1]-pts[0][1]));
      ctx.restore();
      if(!near)break;
    }
  }
}

// Проекция 3д→2д
function project(x,y,z){
  let dx=x-cam.x,dy=y-cam.y,dz=z-cam.z;
  let X=dx*Math.cos(cam.ry)-dz*Math.sin(cam.ry),
      Z=dx*Math.sin(cam.ry)+dz*Math.cos(cam.ry),
      Y=dy*Math.cos(cam.rx)-Z*Math.sin(cam.rx),
      D=dy*Math.sin(cam.rx)+Z*Math.cos(cam.rx);
  let f=450/cam.fov/(D+2.e-4);
  return [W/2+X*f,H/2+Y*f];
}

// ---- ГЛАВНЫЙ ЦИКЛ ----
function main(){
  W=window.innerWidth; Hd=window.innerHeight;
  c.width=W;c.height=Hd;
  setInterval(()=>loop(),1000/35);
}
function loop(){
  // === Управление ===
  let speed=0.16;
  let dx=0,dz=0;
  if(keys['w']||keys['W']) dz-=speed;
  if(keys['s']||keys['S']) dz+=speed;
  if(keys['a']||keys['A']) dx-=speed;
  if(keys['d']||keys['D']) dx+=speed;
  cam.x+=Math.sin(cam.ry)*dz+Math.cos(cam.ry)*dx;
  cam.z+=Math.cos(cam.ry)*dz-Math.sin(cam.ry)*dx;

  // === Отрисовка ===
  ctx.clearRect(0,0,W,Hd);

  // НЕБО (полотно)
  ctx.drawImage(SKY,0,0,W,Hd);

  // КУБИКИ, деревья (main render)
  for(let y=0;y<H;y++)
    for(let z=0;z<MAPZ;z++)for(let x=0;x<MAPX;x++){
      let T=MAP[y][z][x];
      if(T==null)continue;
      if(T==-1) continue;
      if(T==-2) { // Берёза
        let d2=(cam.x-x)**2+(cam.z-z)**2;
        drawBirch(x,y+0.6,z, d2<60);
      }
      else cube(x,y,z,T,SZ,cam.rx,cam.ry);
    }
}
</script>
</body>
</html>
