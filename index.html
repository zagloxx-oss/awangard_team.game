<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ----- КОНСТАНТЫ -----
const MAP_SIZE=100, SEGMENTS=80, MAX_HEIGHT=20, MIN_HEIGHT=-20;
const WALL_HEIGHT_DEFAULT=2.5, WALL_WIDTH_DEFAULT=0.3, SNAP_GRID=0.5;
const FALLBACK_TEXTURE_BASE64='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAAARzQklUCAgICHwIZAAAAAlwSFlzAAAOxAAADsQBlSsOGwAAABdJREFUOE9j/P//PwM6YGL8TwD5QCwAEPQBDb2y80cAAAAASUVORK5CYII=';

// ----- СОСТОЯНИЕ -----
let currentMode = 'none'; // 'terrain' | 'objects' | 'walls' | 'select' | 'delete' | 'collision' | 'none'
let reliefAction = 'raise';
let selectedObject = null;
let selectedObjects = [];
let objectIdCounter = 0;
const sceneObjects = [];
let clipboard = null;
let snapEnabled = true;
let physicsEnabled = false;
let physicsWorld = null;
let physicsBodies = [];

let ghostObject = null;
let ghostStartPoint = null;
let isGhostActive = false;
let ghostType = null; // 'wall' | 'object'
let ghostData = {};
let currentWallType = 'wood';
let currentObjectType = 'cube';
let currentTransformMode = 'translate';
let ghostSmoothTarget = null;

const textureData = {};
const textureNames = ['trawa','stena','stena2','dpol','zemla','zemla2','nebo','bereza'];
const textureExtensions = {trawa:'jpg',stena:'jpg',stena2:'jpg',dpol:'jpg',zemla:'jpg',zemla2:'jpg',nebo:'jpg',bereza:'png'};

// ----- СЦЕНА -----
const container = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6da5c9);
scene.fog = new THREE.Fog(0x6da5c9,60,120);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 200);
camera.position.set(15,12,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// ----- УПРАВЛЕНИЕ КАМЕРОЙ -----
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.maxPolarAngle = Math.PI / 2.1;
orbitControls.minDistance = 2;
orbitControls.maxDistance = 80;
orbitControls.target.set(0,0,0);
orbitControls.update();

// ----- TRANSFORM CONTROLS -----
const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.setSize(0.6);
scene.add(transformControls);
transformControls.addEventListener('dragging-changed', (e) => { orbitControls.enabled = !e.value; });
transformControls.addEventListener('objectChange', () => {
    if (selectedObject) {
        const m = selectedObject.mesh;
        if (m) {
            selectedObject.data.position.copy(m.position);
            selectedObject.data.rotation.copy(m.rotation);
            selectedObject.data.scale.copy(m.scale);
        }
    }
});

// ----- ОСВЕЩЕНИЕ -----
const ambient = new THREE.AmbientLight(0x404060,0.5); scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd,1.8);
sun.position.set(30,40,20); sun.castShadow = true;
sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 100;
sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
sun.shadow.camera.top = 50; sun.shadow.camera.bottom = -50;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8888ff,0.3); fill.position.set(-20,10,-20); scene.add(fill);

// ----- ЗАГРУЗКА ТЕКСТУР -----
async function loadTextures() {
    for (const name of textureNames) {
        const ext = textureExtensions[name] || 'jpg';
        try {
            const resp = await fetch(`textures/${name}.${ext}`);
            if (!resp.ok) throw new Error();
            const blob = await resp.blob();
            const reader = new FileReader();
            await new Promise((resolve) => {
                reader.onload = () => { textureData[name] = reader.result; resolve(); };
                reader.readAsDataURL(blob);
            });
        } catch (e) { textureData[name] = null; }
    }
}
function createTextureFromBase64(b64) { if (!b64) return null; const img = new Image(); img.src = b64; const tex = new THREE.Texture(img); tex.needsUpdate = true; return tex; }

// ----- ЛАНДШАФТ -----
const geometry = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, SEGMENTS, SEGMENTS);
geometry.rotateX(-Math.PI/2);
const posAttr = geometry.attributes.position;
const vertexCount = posAttr.count;
const origX = new Float32Array(vertexCount);
const origZ = new Float32Array(vertexCount);
for (let i=0; i<vertexCount; i++) { origX[i] = posAttr.getX(i); origZ[i] = posAttr.getZ(i); }
const heights = new Float32Array(vertexCount); heights.fill(0);
function updateTerrain() {
    for (let i=0; i<vertexCount; i++) posAttr.setY(i, heights[i]);
    posAttr.needsUpdate = true;
    geometry.computeVertexNormals();
}
let terrainMat, terrain;
function initTerrain() {
    terrainMat = new THREE.MeshStandardMaterial({ color:0x6da56a, roughness:0.8, metalness:0, side:THREE.DoubleSide });
    terrain = new THREE.Mesh(geometry, terrainMat);
    terrain.receiveShadow = true; terrain.castShadow = true; terrain.position.y = 0;
    scene.add(terrain);
    if (textureData.trawa) {
        const tex = createTextureFromBase64(textureData.trawa);
        terrainMat.map = tex; terrainMat.color.setHex(0xffffff); terrainMat.needsUpdate = true;
    }
}

// ----- СЕТКА -----
const gridHelper = new THREE.GridHelper(MAP_SIZE, 20, 0x88ff88, 0x44aa44);
gridHelper.position.y = 0.02;
scene.add(gridHelper);
const gridFine = new THREE.GridHelper(MAP_SIZE, 100, 0x88ff88, 0x44aa44);
gridFine.position.y = 0.01;
gridFine.material.transparent = true;
gridFine.material.opacity = 0.3;
scene.add(gridFine);

// ----- ФУНКЦИИ РЕЛЬЕФА -----
function modifyTerrain(x,z,radius,strength,mode) {
    const r2 = radius*radius;
    for (let i=0; i<vertexCount; i++) {
        const dx = origX[i]-x, dz = origZ[i]-z, d = dx*dx+dz*dz;
        if (d < r2) {
            const influence = 1 - Math.sqrt(d)/radius;
            const delta = influence * strength;
            if (mode === 'raise') heights[i] += delta;
            else if (mode === 'lower') heights[i] -= delta;
            heights[i] = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, heights[i]));
        }
    }
    updateTerrain();
}

// ----- СОЗДАНИЕ ОБЪЕКТОВ (упрощённо, но рабочее) -----
function createWall(x1,z1,x2,z2,height=WALL_HEIGHT_DEFAULT,width=WALL_WIDTH_DEFAULT,type='wood') {
    const dx = x2-x1, dz = z2-z1, len = Math.sqrt(dx*dx+dz*dz);
    if (len < 0.3) return null;
    const angle = Math.atan2(dx,dz), mx = (x1+x2)/2, mz = (z1+z2)/2;
    let tex = null;
    if (type === 'wood' && textureData.dpol) tex = createTextureFromBase64(textureData.dpol);
    else if (type === 'stone' && textureData.stena) tex = createTextureFromBase64(textureData.stena);
    else if (type === 'stone2' && textureData.stena2) tex = createTextureFromBase64(textureData.stena2);
    if (!tex) tex = createTextureFromBase64(FALLBACK_TEXTURE_BASE64);
    const mat = new THREE.MeshStandardMaterial({ map:tex, color:0xffffff, roughness:0.7 });
    const wall = new THREE.Mesh(new THREE.BoxGeometry(width,height,len), mat);
    wall.position.set(mx, height/2, mz); wall.rotation.y = angle;
    wall.castShadow = true; wall.receiveShadow = true;
    wall.userData.isObject = true; wall.userData.id = objectIdCounter++;
    wall.userData.type = 'wall'; wall.userData.wallType = type;
    wall.userData.width = width; wall.userData.height = height; wall.userData.length = len;
    scene.add(wall);
    const obj = { mesh:wall, id:wall.userData.id, type:'wall', data: {
        width, height, len,
        position: wall.position.clone(), rotation: wall.rotation.clone(), scale: wall.scale.clone(),
        color: 0xffffff, texture: type, collision: true, wallType: type
    }};
    sceneObjects.push(obj);
    updateObjectList();
    return obj;
}

function createObject(type, pos, color=0xffaa00, size=0.6) {
    // Для простоты реализуем только базовые примитивы (без деревьев, столов и т.д. — их можно добавить позже)
    const mat = new THREE.MeshStandardMaterial({ color, roughness:0.5, metalness:0.1 });
    let mesh;
    if (type === 'cube') mesh = new THREE.Mesh(new THREE.BoxGeometry(size,size,size), mat);
    else if (type === 'sphere') mesh = new THREE.Mesh(new THREE.SphereGeometry(size/2,16,16), mat);
    else if (type === 'cylinder') mesh = new THREE.Mesh(new THREE.CylinderGeometry(size/2,size/2,size,12), mat);
    else mesh = new THREE.Mesh(new THREE.BoxGeometry(size,size,size), mat);
    mesh.position.copy(pos);
    mesh.castShadow = true; mesh.receiveShadow = true;
    mesh.userData.isObject = true; mesh.userData.id = objectIdCounter++;
    mesh.userData.type = type;
    scene.add(mesh);
    const obj = { mesh, id:mesh.userData.id, type, data: {
        position: pos.clone(), rotation: new THREE.Euler(0,0,0), scale: new THREE.Vector3(1,1,1),
        color, texture: null, collision: true, size
    }};
    sceneObjects.push(obj);
    updateObjectList();
    return obj;
}

// ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
function removeObject(obj) {
    scene.remove(obj.mesh);
    const idx = sceneObjects.indexOf(obj);
    if (idx !== -1) sceneObjects.splice(idx, 1);
    if (selectedObject === obj) { selectedObject = null; transformControls.detach(); }
    const si = selectedObjects.indexOf(obj);
    if (si !== -1) selectedObjects.splice(si, 1);
    updateObjectList();
    hideProperties();
}
function clearAll() {
    sceneObjects.forEach(o => scene.remove(o.mesh));
    sceneObjects.length = 0;
    selectedObject = null; selectedObjects = [];
    transformControls.detach();
    updateObjectList();
    hideProperties();
    for (let i=0; i<vertexCount; i++) heights[i] = 0;
    updateTerrain();
    removeGhost();
}
function removeGhost() {
    if (ghostObject) { scene.remove(ghostObject); ghostObject = null; }
    isGhostActive = false;
    ghostStartPoint = null;
    ghostType = null;
    ghostData = {};
    orbitControls.enableZoom = true;
    setHint('Выберите инструмент справа');
}
function selectObject(obj) {
    if (selectedObject === obj) return;
    if (selectedObject) transformControls.detach();
    selectedObject = obj;
    if (obj) {
        transformControls.attach(obj.mesh);
        setStatus(`Выделен ${obj.type} #${obj.id}`);
    } else {
        setStatus('Выделение снято');
    }
    updateObjectList();
}
function showProperties(obj) { /* панель свойств пока не реализована */ }
function hideProperties() {}
function duplicateObject(obj) {
    const pos = obj.data.position.clone(); pos.x += 1; pos.z += 1;
    let n;
    if (obj.type === 'wall') {
        const d = obj.data; const halfW = d.len/2;
        const ang = obj.mesh.rotation.y;
        const dx = Math.sin(ang)*halfW, dz = Math.cos(ang)*halfW;
        const cx = obj.mesh.position.x, cz = obj.mesh.position.z;
        n = createWall(cx-dx+1, cz-dz+1, cx+dx+1, cz+dz+1, d.height, d.width, d.wallType);
    } else {
        n = createObject(obj.type, pos, obj.data.color, 0.6);
    }
    if (n) { selectObject(n); setStatus('Объект дублирован'); }
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setHint(msg) { document.getElementById('hint').textContent = msg; }
function updateObjectList() { setStatus(`Объектов: ${sceneObjects.length}`); }
function snapPoint(x,z) {
    if (!snapEnabled) return {x,y:z};
    const sx = Math.round(x / SNAP_GRID) * SNAP_GRID;
    const sz = Math.round(z / SNAP_GRID) * SNAP_GRID;
    return {x:sx, y:sz};
}

// ----- ОБРАБОТЧИКИ ДВОЙНОГО КЛИКА -----
renderer.domElement.addEventListener('dblclick', (e) => {
    if (currentMode === 'walls') {
        if (!isGhostActive) {
            const hit = getTerrainIntersection(e);
            if (hit) {
                const p = hit.point; const s = snapPoint(p.x, p.z);
                ghostStartPoint = new THREE.Vector3(s.x, 0, s.y);
                const tex = createTextureFromBase64(FALLBACK_TEXTURE_BASE64);
                const mat = new THREE.MeshStandardMaterial({ map:tex, color:0x4a9eff, transparent:true, opacity:0.4, depthWrite:false });
                const w = WALL_WIDTH_DEFAULT, h = WALL_HEIGHT_DEFAULT;
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 1), mat);
                mesh.position.set(ghostStartPoint.x, h/2, ghostStartPoint.z);
                mesh.userData.isGhost = true; mesh.visible = false;
                scene.add(mesh); ghostObject = mesh; isGhostActive = true; ghostType = 'wall';
                ghostData = { width:w, height:h, type:currentWallType };
                ghostSmoothTarget = mesh.position.clone();
                setStatus('Выберите конечную точку стены (двойной клик)');
                setHint('Двойной клик — фиксация, колёсико — ширина');
                orbitControls.enableZoom = false;
            }
        } else {
            const hit = getTerrainIntersection(e);
            if (hit && ghostStartPoint) {
                const p = hit.point; const s = snapPoint(p.x, p.z);
                const w = ghostData.width || WALL_WIDTH_DEFAULT;
                const h = ghostData.height || WALL_HEIGHT_DEFAULT;
                const wall = createWall(ghostStartPoint.x, ghostStartPoint.z, s.x, s.y, h, w, ghostData.type);
                if (wall) setStatus('Стена создана');
                removeGhost();
                orbitControls.enableZoom = true;
            }
        }
    } else if (currentMode === 'objects') {
        if (!isGhostActive) {
            const hit = getTerrainIntersection(e);
            if (hit) {
                const p = hit.point; const s = snapPoint(p.x, p.z);
                const pos = new THREE.Vector3(s.x, 0, s.y);
                const mat = new THREE.MeshStandardMaterial({ color:0x4a9eff, transparent:true, opacity:0.4 });
                let ghost;
                if (currentObjectType === 'cube') ghost = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), mat);
                else if (currentObjectType === 'sphere') ghost = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16), mat);
                else if (currentObjectType === 'cylinder') ghost = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.6,12), mat);
                else ghost = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), mat);
                ghost.position.copy(pos); ghost.userData.isGhost = true;
                scene.add(ghost); ghostObject = ghost; isGhostActive = true; ghostType = 'object';
                ghostData = { type:currentObjectType };
                ghostSmoothTarget = pos.clone();
                setStatus('Выберите место для предмета (двойной клик)');
                setHint('Двойной клик — фиксация');
                orbitControls.enableZoom = false;
            }
        } else {
            const hit = getTerrainIntersection(e);
            if (hit) {
                const p = hit.point; const s = snapPoint(p.x, p.z);
                const pos = new THREE.Vector3(s.x, 0, s.y);
                const obj = createObject(ghostData.type, pos);
                if (obj) { selectObject(obj); setStatus(`Предмет "${ghostData.type}" добавлен`); }
                removeGhost();
                orbitControls.enableZoom = true;
            }
        }
    }
});

// ----- ПЛАВНОЕ ОБНОВЛЕНИЕ ПРИЗМЫ -----
function updateGhostSmooth() {
    if (!isGhostActive || !ghostObject) return;
    if (ghostSmoothTarget) {
        const speed = 0.25;
        const pos = ghostObject.position;
        pos.x += (ghostSmoothTarget.x - pos.x) * speed;
        pos.y += (ghostSmoothTarget.y - pos.y) * speed;
        pos.z += (ghostSmoothTarget.z - pos.z) * speed;
        if (Math.abs(pos.x - ghostSmoothTarget.x) < 0.001) pos.x = ghostSmoothTarget.x;
        if (Math.abs(pos.y - ghostSmoothTarget.y) < 0.001) pos.y = ghostSmoothTarget.y;
        if (Math.abs(pos.z - ghostSmoothTarget.z) < 0.001) pos.z = ghostSmoothTarget.z;
        if (ghostType === 'wall' && ghostStartPoint) {
            const dx = pos.x - ghostStartPoint.x, dz = pos.z - ghostStartPoint.z;
            const len = Math.sqrt(dx*dx + dz*dz);
            if (len > 0.1) {
                const ang = Math.atan2(dx, dz);
                ghostObject.rotation.y = ang;
                ghostObject.scale.z = len;
                ghostObject.visible = true;
            } else {
                ghostObject.visible = false;
            }
        }
    }
    requestAnimationFrame(updateGhostSmooth);
}
updateGhostSmooth();

renderer.domElement.addEventListener('mousemove', (e) => {
    if (!isGhostActive || !ghostObject) return;
    const hit = getTerrainIntersection(e);
    if (!hit) return;
    const p = hit.point; const s = snapPoint(p.x, p.z);
    const target = new THREE.Vector3(s.x, 0, s.y);
    if (ghostType === 'wall' && ghostStartPoint) {
        const mx = (ghostStartPoint.x + s.x) / 2;
        const mz = (ghostStartPoint.z + s.y) / 2;
        target.set(mx, ghostData.height/2, mz);
        ghostSmoothTarget = target;
    } else if (ghostType === 'object') {
        ghostSmoothTarget = target;
    }
});

renderer.domElement.addEventListener('wheel', (e) => {
    if (isGhostActive && ghostType === 'wall') {
        const delta = Math.sign(e.deltaY) * -1;
        let newW = (ghostData.width || WALL_WIDTH_DEFAULT) + delta * 0.05;
        newW = Math.max(0.1, Math.min(1.0, newW));
        ghostData.width = newW;
        if (ghostObject) {
            const oldGeo = ghostObject.geometry;
            const newGeo = new THREE.BoxGeometry(newW, ghostData.height || WALL_HEIGHT_DEFAULT, 1);
            ghostObject.geometry = newGeo;
            oldGeo.dispose();
        }
        setStatus(`Ширина стены: ${newW.toFixed(2)} м`);
        e.preventDefault();
    }
});

// ----- ПОЛУЧЕНИЕ ПЕРЕСЕЧЕНИЙ -----
function getTerrainIntersection(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(terrain);
    if (hits.length > 0) return hits[0];
    return null;
}
function getObjectIntersection(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const meshes = sceneObjects.map(o => o.mesh);
    const hits = raycaster.intersectObjects(meshes, true);
    if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj && !obj.userData.isObject) obj = obj.parent;
        if (obj && obj.userData.isObject) {
            return sceneObjects.find(o => o.id === obj.userData.id);
        }
    }
    return null;
}

// ----- КЛИКИ ПО СЦЕНЕ -----
renderer.domElement.addEventListener('click', (e) => {
    if (currentMode === 'terrain') {
        const hit = getTerrainIntersection(e);
        if (hit) {
            const p = hit.point;
            const radius = parseFloat(document.getElementById('brush-radius').value);
            const strength = parseFloat(document.getElementById('brush-strength').value);
            modifyTerrain(p.x, p.z, radius, strength, reliefAction);
        }
    } else if (currentMode === 'select') {
        const obj = getObjectIntersection(e);
        if (obj) selectObject(obj);
        else selectObject(null);
    } else if (currentMode === 'delete') {
        const obj = getObjectIntersection(e);
        if (obj) { removeObject(obj); setStatus('Объект удалён'); }
    } else if (currentMode === 'collision') {
        const obj = getObjectIntersection(e);
        if (obj) {
            obj.data.collision = !obj.data.collision;
            setStatus(`Коллизия для ${obj.type} #${obj.id}: ${obj.data.collision?'включена':'выключена'}`);
            obj.mesh.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(obj.data.collision ? 0x00ff00 : 0xff0000);
                }
            });
            setTimeout(() => {
                obj.mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.color.setHex(obj.data.color);
                    }
                });
            }, 2000);
        }
    }
});

// ----- ПАНЕЛЬ УПРАВЛЕНИЯ -----
// Рельеф
document.querySelectorAll('#relief-mode button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#relief-mode button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        reliefAction = btn.dataset.relief;
    });
});
document.getElementById('brush-radius').addEventListener('input', (e) => {
    document.getElementById('radius-label').textContent = parseFloat(e.target.value).toFixed(1);
});
document.getElementById('brush-strength').addEventListener('input', (e) => {
    document.getElementById('strength-label').textContent = parseFloat(e.target.value).toFixed(1);
});
document.getElementById('relief-activate').addEventListener('click', () => {
    setMode('terrain');
});

// Предметы
document.querySelectorAll('#object-items button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#object-items button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentObjectType = btn.dataset.object;
    });
});
document.getElementById('object-activate').addEventListener('click', () => {
    setMode('objects');
});

// Стены
document.querySelectorAll('#wall-items button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#wall-items button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentWallType = btn.dataset.wall;
    });
});
document.getElementById('wall-activate').addEventListener('click', () => {
    setMode('walls');
});

// Коллизия
document.getElementById('collision-toggle').addEventListener('click', () => {
    setMode('collision');
    document.getElementById('collision-toggle').classList.toggle('active');
});

// Трансформация
document.getElementById('trans-translate').addEventListener('click', () => {
    currentTransformMode = 'translate';
    setTransformMode('translate');
    document.querySelectorAll('.trans-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('trans-translate').classList.add('active');
});
document.getElementById('trans-rotate').addEventListener('click', () => {
    currentTransformMode = 'rotate';
    setTransformMode('rotate');
    document.querySelectorAll('.trans-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('trans-rotate').classList.add('active');
});
document.getElementById('trans-scale').addEventListener('click', () => {
    currentTransformMode = 'scale';
    setTransformMode('scale');
    document.querySelectorAll('.trans-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('trans-scale').classList.add('active');
});
function setTransformMode(mode) { transformControls.setMode(mode); }

// Действия
document.getElementById('select-mode').addEventListener('click', () => {
    setMode('select');
    document.querySelectorAll('#panel .items button').forEach(b => b.classList.remove('active'));
    document.getElementById('select-mode').classList.add('active');
});
document.getElementById('delete-mode').addEventListener('click', () => {
    setMode('delete');
    document.querySelectorAll('#panel .items button').forEach(b => b.classList.remove('active'));
    document.getElementById('delete-mode').classList.add('active');
});
document.getElementById('group-btn').addEventListener('click', () => {
    if (selectedObjects.length < 2) { setStatus('Выделите хотя бы 2 объекта (Shift+клик)'); return; }
    const g = new THREE.Group();
    g.userData.isObject = true; g.userData.id = objectIdCounter++; g.userData.type = 'group';
    selectedObjects.forEach(o => {
        const m = o.mesh; const p = m.position.clone(), r = m.rotation.clone(), s = m.scale.clone();
        g.add(m); m.position.copy(p); m.rotation.copy(r); m.scale.copy(s);
        const idx = sceneObjects.indexOf(o); if (idx !== -1) sceneObjects.splice(idx, 1);
    });
    scene.add(g);
    const obj = { mesh:g, id:g.userData.id, type:'group', data: {
        position: g.position.clone(), rotation: g.rotation.clone(), scale: g.scale.clone(),
        color: 0xffffff, texture: null, collision: true, children: []
    }};
    sceneObjects.push(obj); selectedObjects = []; selectObject(obj); setStatus('Группа создана');
});
document.getElementById('ungroup-btn').addEventListener('click', () => {
    if (!selectedObject || selectedObject.type !== 'group') { setStatus('Выделите группу'); return; }
    const g = selectedObject.mesh; const children = [...g.children];
    children.forEach(c => {
        scene.add(c); const p = c.position.clone(), r = c.rotation.clone(), s = c.scale.clone();
        const obj = { mesh:c, id:c.userData.id || objectIdCounter++, type:c.userData.type || 'unknown', data: {
            position:p, rotation:r, scale:s,
            color: c.material ? c.material.color.getHex() : 0xffaa00,
            texture: null, collision: true
        }};
        sceneObjects.push(obj);
    });
    scene.remove(g); const idx = sceneObjects.indexOf(selectedObject); if (idx !== -1) sceneObjects.splice(idx, 1);
    selectedObject = null; transformControls.detach(); updateObjectList(); hideProperties(); setStatus('Группа разгруппирована');
});

// ----- ВЕРХНЯЯ ПЛАШКА -----
document.getElementById('save-json').addEventListener('click', () => {
    const data = {
        version: '5.1',
        objects: sceneObjects.map(o => ({
            id: o.id, type: o.type,
            data: {
                ...o.data,
                position: o.data.position.toArray(),
                rotation: o.data.rotation.toArray(),
                scale: o.data.scale.toArray()
            }
        })),
        terrain: { heights: Array.from(heights) }
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'project.json'; a.click();
    URL.revokeObjectURL(url);
    setStatus('Проект сохранён');
});
document.getElementById('export-html').addEventListener('click', () => {
    setStatus('Экспорт в разработке');
});
document.getElementById('clear-all').addEventListener('click', () => {
    if (confirm('Удалить всё?')) { clearAll(); setStatus('Всё очищено'); }
});

// ----- ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ -----
function setMode(mode) {
    // Если активна призма — сбрасываем
    if (isGhostActive) removeGhost();
    currentMode = mode;
    const names = {
        terrain: 'Рельеф',
        objects: 'Предметы',
        walls: 'Стены',
        select: 'Выделение',
        delete: 'Удаление',
        collision: 'Коллизия',
        none: 'Нет'
    };
    setStatus(`Режим: ${names[mode] || mode}`);
    const hints = {
        terrain: 'Клик по земле для изменения рельефа',
        objects: 'Двойной клик для размещения',
        walls: 'Двойной клик начало, двойной клик конец',
        select: 'Клик по объекту для выделения',
        delete: 'Клик по объекту для удаления',
        collision: 'Клик по объекту для переключения коллизии'
    };
    setHint(hints[mode] || '');
    // Включаем/выключаем зум в зависимости от режима
    orbitControls.enableZoom = (mode !== 'walls' && mode !== 'objects');
}

// ----- ESCAPE -----
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        // Сбрасываем текущий режим и призму
        if (isGhostActive) removeGhost();
        setMode('none');
        // Деактивируем все кнопки в панели
        document.querySelectorAll('#panel .items button, #panel .toggle-group button').forEach(b => b.classList.remove('active'));
        // Убираем подсветку с кнопок активации
        document.querySelectorAll('#panel .category button').forEach(b => b.style.background = '');
        setStatus('Действие отменено');
        setHint('Нажмите Escape для отмены');
        orbitControls.enableZoom = true;
        e.preventDefault();
    }
});

// ----- ИНИЦИАЛИЗАЦИЯ -----
await loadTextures();
initTerrain();
setMode('none');

// Демо-объекты
createObject('cube', new THREE.Vector3(2,0.3,2), 0xff0000, 0.6);
createObject('sphere', new THREE.Vector3(-2,0.3,-1), 0x00ff00, 0.8);
createWall(-1,-1,2,-1,2.5,0.3,'stone');
createWall(2,-1,2,2,2.5,0.3,'stone');
createWall(2,2,-1,2,2.5,0.3,'stone2');
createWall(-1,2,-1,-1,2.5,0.3,'wood');

setStatus('Редактор 5.1 загружен. Нажмите Escape для отмены.');

// ----- АНИМАЦИЯ -----
function animate() {
    requestAnimationFrame(animate);
    orbitControls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

console.log('Редактор 5.1 загружен');
</script>
