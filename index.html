<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALKER TEST — SWILL EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #blocker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
        }
        #blocker span {
            background: #000;
            padding: 20px 40px;
            border: 2px solid #0f0;
            border-radius: 8px;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>
    <div id="blocker"><span>КЛИКНИ, ЧТОБЫ ВОЙТИ В ЗОНУ</span></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ИНИЦИАЛИЗАЦИЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // запасной цвет, если небо не загрузится

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.80, 5); // рост игрока 1.80

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- БЛОКИРОВКА КУРСОРА ---
        const blocker = document.getElementById('blocker');
        blocker.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            blocker.style.display = document.pointerLockElement ? 'none' : 'flex';
        });

        // --- УПРАВЛЕНИЕ ---
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; break;
                case 'KeyA': keys.a = true; break;
                case 'KeyS': keys.s = true; break;
                case 'KeyD': keys.d = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; break;
                case 'KeyA': keys.a = false; break;
                case 'KeyS': keys.s = false; break;
                case 'KeyD': keys.d = false; break;
            }
        });

        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== renderer.domElement) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        });

        // --- СВЕТ ---
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
        sun.position.set(20, 30, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 60;
        sun.shadow.camera.left = -30;
        sun.shadow.camera.right = 30;
        sun.shadow.camera.top = 30;
        sun.shadow.camera.bottom = -30;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-20, 10, -20);
        scene.add(fill);

        // --- ТЕКСТУРЫ (ЗАГРУЖАЕМ) ---
        const loader = new THREE.TextureLoader();
        const textures = {};

        function loadTex(name) {
            return new Promise((resolve) => {
                loader.load(`textures/${name}`, (tex) => {
                    tex.needsUpdate = true;
                    resolve(tex);
                }, undefined, () => resolve(null));
            });
        }

        // Ждём загрузки всех текстур
        const texList = {
            zemla: 'zemla.jpg',
            trawa: 'trawa.jpg',
            stena: 'stena.jpg',
            nebo: 'nebo.jpg',
            bereza: 'bereza.png', // PNG с прозрачностью
            elka: 'elka.png'      // PNG с прозрачностью
        };

        const loadPromises = Object.entries(texList).map(async ([key, file]) => {
            const tex = await loadTex(file);
            if (tex) textures[key] = tex;
            else console.warn(`SWILL: не загрузилась хуйня ${file}`);
        });

        await Promise.all(loadPromises);
        console.log('SWILL: все текстуры загружены, ебать!');

        // --- СОЗДАНИЕ МИРА ---

        // 1. ЗЕМЛЯ (трава + дорога)
        if (textures.zemla) {
            const groundGeom = new THREE.PlaneGeometry(60, 60);
            const groundMat = new THREE.MeshStandardMaterial({ 
                map: textures.zemla,
                roughness: 0.8,
                metalness: 0.0
            });
            const ground = new THREE.Mesh(groundGeom, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // Дорожка из травы (второй слой сверху, маленький кусок)
        if (textures.trawa) {
            const grassGeom = new THREE.PlaneGeometry(20, 20);
            const grassMat = new THREE.MeshStandardMaterial({
                map: textures.trawa,
                roughness: 0.9,
                metalness: 0.0
            });
            const grass = new THREE.Mesh(grassGeom, grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.set(0, 0.01, 0); // чуть выше, чтобы не перекрывать
            grass.receiveShadow = true;
            scene.add(grass);
        }

        // 2. СТЕНА
        if (textures.stena) {
            const wallGeom = new THREE.BoxGeometry(8, 4, 0.5);
            const wallMat = new THREE.MeshStandardMaterial({
                map: textures.stena,
                roughness: 0.7,
                metalness: 0.1
            });
            const wall = new THREE.Mesh(wallGeom, wallMat);
            wall.position.set(-5, 2, -8);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
        }

        // 3. ДЕРЕВЬЯ (спрайты)
        function createTree(texture, x, z, scale = 1.0) {
            if (!texture) return null;
            const mat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                opacity: 1.0
            });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(x, 1.25, z); // центр на половине высоты 2.5м
            sprite.scale.set(2.5 * scale, 2.5 * scale, 1);
            sprite.castShadow = false;
            return sprite;
        }

        if (textures.bereza) {
            const t1 = createTree(textures.bereza, -3, -2, 1.0);
            if (t1) scene.add(t1);
            const t2 = createTree(textures.bereza, 4, -3, 0.9);
            if (t2) scene.add(t2);
        }

        if (textures.elka) {
            const t3 = createTree(textures.elka, 2, 5, 1.1);
            if (t3) scene.add(t3);
            const t4 = createTree(textures.elka, -4, 4, 1.0);
            if (t4) scene.add(t4);
            const t5 = createTree(textures.elka, 6, 2, 0.8);
            if (t5) scene.add(t5);
        }

        // 4. НЕБО (сфера)
        if (textures.nebo) {
            const skyGeom = new THREE.SphereGeometry(200, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                map: textures.nebo,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeom, skyMat);
            sky.position.y = 0;
            scene.add(sky);
        }

        // --- ДЕБАГ (для ориентира) ---
        // helper grid
        // const grid = new THREE.GridHelper(40, 20, 0xff0000, 0x444444);
        // grid.position.y = 0.01;
        // scene.add(grid);

        console.log('SWILL: сцена готова, иди играй!');

        // --- ЦИКЛ АНИМАЦИИ ---
        function animate() {
            requestAnimationFrame(animate);

            // Движение
            if (document.pointerLockElement === renderer.domElement) {
                const speed = 0.08;
                const dir = new THREE.Vector3(0, 0, 0);
                if (keys.w) dir.z -= speed;
                if (keys.s) dir.z += speed;
                if (keys.a) dir.x -= speed;
                if (keys.d) dir.x += speed;

                // Поворот камеры
                const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);

                // Движение в локальном пространстве камеры
                if (dir.lengthSq() > 0) {
                    const forward = new THREE.Vector3(0, 0, -1);
                    forward.applyQuaternion(camera.quaternion);
                    forward.y = 0;
                    forward.normalize();

                    const right = new THREE.Vector3(1, 0, 0);
                    right.applyQuaternion(camera.quaternion);
                    right.y = 0;
                    right.normalize();

                    const move = new THREE.Vector3()
                        .addScaledVector(forward, -dir.z)
                        .addScaledVector(right, dir.x);
                    camera.position.add(move);
                }

                // Не улетать под землю
                if (camera.position.y < 1.80) camera.position.y = 1.80;
            }

            renderer.render(scene, camera);
        }

        animate();

        // --- АДАПТИВНЫЙ РАЗМЕР ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
