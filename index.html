<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор миров</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#fff}
        #container{display:flex;width:100vw;height:100vh}
        #canvas-wrap{flex:1;position:relative}
        #canvas-wrap canvas{display:block;width:100%;height:100%}
        #panel{width:280px;background:rgba(20,20,36,0.95);backdrop-filter:blur(10px);border-left:1px solid rgba(255,255,255,0.06);padding:16px 14px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
        #panel h2{font-size:16px;font-weight:400;color:#aaa;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:8px;margin-bottom:2px}
        #panel .category{background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 10px}
        #panel .category .title{font-size:13px;font-weight:500;color:#ccc;margin-bottom:4px;display:flex;align-items:center;gap:6px}
        #panel .category .items{display:flex;flex-wrap:wrap;gap:4px}
        #panel .category .items button{background:rgba(255,255,255,0.06);border:none;color:#ccc;padding:4px 10px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;border:1px solid transparent}
        #panel .category .items button:hover{background:rgba(255,255,255,0.15)}
        #panel .category .items button.active{background:#4a9eff;color:#fff;border-color:#4a9eff}
        #panel .category .items button.danger{background:rgba(255,70,70,0.2)}
        #panel .category .items button.danger:hover{background:rgba(255,70,70,0.4)}
        #panel .slider-group{display:flex;flex-direction:column;gap:4px;margin-top:4px}
        #panel .slider-group label{font-size:12px;color:#aaa;display:flex;justify-content:space-between}
        #panel .slider-group input[type=range]{width:100%;accent-color:#4a9eff;background:#333;height:4px;border-radius:2px}
        #panel .toggle-group{display:flex;gap:6px;flex-wrap:wrap}
        #panel .toggle-group button{flex:1;background:rgba(255,255,255,0.06);border:none;color:#ccc;padding:4px 0;border-radius:16px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid transparent}
        #panel .toggle-group button.active{background:#4a9eff;color:#fff;border-color:#4a9eff}
        #panel .toggle-group button.danger{background:rgba(255,70,70,0.2)}
        #panel .toggle-group button.danger.active{background:#ff4444;color:#fff}
        #panel .category .items button.col-btn{background:rgba(255,255,255,0.04);padding:4px 12px}
        #panel .category .items button.col-btn.active{background:#6c5ce7;border-color:#6c5ce7}
        #panel .category .items button.trans-btn{background:rgba(255,255,255,0.04);padding:4px 12px}
        #panel .category .items button.trans-btn.active{background:#6c5ce7;border-color:#6c5ce7}
        #topbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,0.7);backdrop-filter:blur(8px);padding:6px 18px;border-radius:30px;border:1px solid rgba(255,255,255,0.06);z-index:20;display:flex;gap:12px;align-items:center;pointer-events:auto;font-size:13px}
        #topbar button{background:rgba(255,255,255,0.06);border:none;color:#ccc;padding:4px 14px;border-radius:20px;cursor:pointer;transition:.2s;font-size:12px}
        #topbar button:hover{background:rgba(255,255,255,0.15)}
        #topbar .sep{width:1px;height:20px;background:rgba(255,255,255,0.1)}
        #status{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);padding:6px 20px;border-radius:30px;font-size:13px;color:#ccc;z-index:15;pointer-events:none;border:1px solid rgba(255,255,255,0.05);white-space:nowrap}
        #hint{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.4);padding:4px 16px;border-radius:20px;font-size:12px;color:#999;z-index:15;pointer-events:none;white-space:nowrap}
        .crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.06);font-size:36px;pointer-events:none;z-index:5;font-weight:100}
        #modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:100;display:none;justify-content:center;align-items:center}
        #modal-box{background:#2a2a3a;border-radius:16px;padding:24px;width:400px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.06)}
        #modal-box h3{font-size:18px;margin-bottom:16px;color:#fff}
        #modal-box label{display:block;font-size:13px;color:#aaa;margin:12px 0 4px}
        #modal-box input[type=text],#modal-box select{width:100%;padding:8px 12px;background:#1a1a2e;border:1px solid #444;border-radius:8px;color:#fff;font-size:14px}
        #modal-box .file-drop{width:100%;padding:30px;border:2px dashed #555;border-radius:12px;text-align:center;color:#aaa;cursor:pointer;transition:.2s;margin-top:8px}
        #modal-box .file-drop:hover{border-color:#4a9eff;background:rgba(74,158,255,0.05)}
        #modal-box .file-drop.dragover{border-color:#4a9eff;background:rgba(74,158,255,0.1)}
        #modal-box .file-drop input{display:none}
        #modal-box .buttons{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
        #modal-box .buttons button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:.2s}
        #modal-box .buttons .cancel{background:rgba(255,255,255,0.1);color:#ccc}
        #modal-box .buttons .cancel:hover{background:rgba(255,255,255,0.2)}
        #modal-box .buttons .add{background:#4a9eff;color:#fff}
        #modal-box .buttons .add:hover{background:#3a8eef}
        #modal-box .preview{margin-top:12px;text-align:center}
        #modal-box .preview img{max-width:100px;max-height:100px;border-radius:8px;border:1px solid #444}
        #sound-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:100;justify-content:center;align-items:center}
        #sound-modal > div{background:#2a2a3a;border-radius:16px;padding:24px;width:400px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.06)}
        #sound-modal h3{color:#fff;margin-bottom:16px}
        #sound-modal label{color:#aaa;display:block;margin:8px 0 4px}
        #sound-modal input[type=file]{width:100%;padding:8px;background:#1a1a2e;border:1px solid #444;border-radius:8px;color:#fff}
        #sound-modal input[type=range]{width:100%;accent-color:#4a9eff;background:#333;height:4px;border-radius:2px}
        #sound-modal .buttons{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
        #sound-modal .buttons button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
        #sound-modal .buttons .cancel{background:rgba(255,255,255,0.1);color:#ccc}
        #sound-modal .buttons .add{background:#4a9eff;color:#fff}
        #func-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:110;display:none;justify-content:center;align-items:center}
        #func-box{background:#2a2a3a;border-radius:16px;padding:24px;width:350px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.06)}
        #func-box h3{font-size:18px;margin-bottom:12px;color:#fff}
        #func-box label{display:block;font-size:13px;color:#aaa;margin:8px 0 4px}
        #func-box select{width:100%;padding:8px 12px;background:#1a1a2e;border:1px solid #444;border-radius:8px;color:#fff;font-size:14px}
        #func-box .buttons{display:flex;gap:12px;margin-top:16px;justify-content:flex-end}
        #func-box .buttons button{padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
        #func-box .buttons .cancel{background:rgba(255,255,255,0.1);color:#ccc}
        #func-box .buttons .apply{background:#6c5ce7;color:#fff}
        @media(max-width:768px){#panel{width:200px;padding:10px 8px}#topbar{font-size:11px;padding:4px 12px}#topbar button{font-size:10px;padding:2px 10px}#modal-box{width:95%}#sound-modal > div{width:95%}#func-box{width:95%}}
    </style>
</head>
<body>

<!-- Модалка текстур -->
<div id="modal-overlay">
    <div id="modal-box">
        <h3>Добавить текстуру</h3>
        <label>Название</label>
        <input type="text" id="tex-name" placeholder="Моя текстура">
        <label>Тип объекта</label>
        <select id="tex-type">
            <option value="wall">Стена</option>
            <option value="object">Предмет (спрайт)</option>
            <option value="brush">Кисть (рисование)</option>
        </select>
        <label>Изображение (PNG, JPG)</label>
        <div class="file-drop" id="file-drop">
            <span>Перетащите файл или кликните для выбора</span>
            <input type="file" accept="image/png,image/jpeg" id="file-input">
        </div>
        <div class="preview" id="preview-container" style="display:none;">
            <img id="preview-image" src="" alt="Preview">
        </div>
        <div class="buttons">
            <button class="cancel" id="modal-cancel">Отмена</button>
            <button class="add" id="modal-add">Добавить</button>
        </div>
    </div>
</div>

<!-- Модалка звука -->
<div id="sound-modal">
    <div>
        <h3>Настройки звука</h3>
        <label>Аудиофайл (MP3, WAV)</label>
        <input type="file" accept="audio/*" id="sound-file-input">
        <label>Громкость</label>
        <input type="range" id="sound-volume" min="0" max="1" step="0.01" value="0.8">
        <label>Дальность (м)</label>
        <input type="range" id="sound-distance" min="1" max="50" step="0.5" value="10">
        <div class="buttons">
            <button class="cancel" id="sound-cancel">Отмена</button>
            <button class="add" id="sound-apply">Добавить</button>
        </div>
    </div>
</div>

<!-- Модалка функций -->
<div id="func-modal">
    <div id="func-box">
        <h3>Функции предмета</h3>
        <label>Выберите действие</label>
        <select id="func-select">
            <option value="raise">Поднять на 1 м</option>
            <option value="lower">Опустить на 1 м</option>
            <option value="move">Переместить в случайную точку</option>
            <option value="rotate">Повернуть на 45°</option>
            <option value="scale_up">Увеличить на 20%</option>
            <option value="scale_down">Уменьшить на 20%</option>
        </select>
        <div class="buttons">
            <button class="cancel" id="func-cancel">Отмена</button>
            <button class="apply" id="func-apply">Применить</button>
        </div>
    </div>
</div>

<div id="container">
    <div id="canvas-wrap">
        <div class="crosshair">+</div>
        <div id="topbar">
            <span style="color:#aaa;">📁 Проект</span>
            <button id="save-json">💾 Сохранить JSON</button>
            <button id="load-json-btn">📂 Загрузить JSON</button>
            <button id="export-html">⬇️ Экспорт HTML</button>
            <button id="import-html-btn">📂 Импорт HTML</button>
            <button id="add-texture-btn">🖼️ Добавить текстуру</button>
            <button id="add-brush-btn">🖌️ Загрузить кисть</button>
            <div class="sep"></div>
            <button id="clear-all" style="color:#ff6b6b;">❌ Очистить</button>
        </div>
        <div id="status">Нажмите Escape для отмены</div>
        <div id="hint">Выберите инструмент справа</div>
    </div>
    <div id="panel">
        <h2>🛠 Инструменты</h2>

        <div class="category">
            <div class="title">⛰️ Рельеф</div>
            <div class="toggle-group" id="relief-mode">
                <button data-relief="raise" class="active">Поднять</button>
                <button data-relief="lower">Опустить</button>
                <button data-relief="smooth">Сгладить</button>
            </div>
            <div class="slider-group">
                <label>Радиус <span id="radius-label">3.0</span></label>
                <input type="range" id="brush-radius" min="0.5" max="10" step="0.1" value="3">
                <label>Сила <span id="strength-label">0.6</span></label>
                <input type="range" id="brush-strength" min="0.1" max="2" step="0.1" value="0.6">
            </div>
            <div style="margin-top:6px;">
                <button id="relief-activate" style="background:#4a9eff;border:none;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;">Включить рельеф</button>
            </div>
        </div>

        <div class="category">
            <div class="title">🖌️ Кисть текстур</div>
            <div class="items" id="brush-textures"></div>
            <div style="margin-top:6px;">
                <button id="brush-activate" style="background:#4a9eff;border:none;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;">Включить кисть</button>
                <label style="font-size:12px;color:#aaa;display:block;margin-top:4px;">Размер: <span id="brush-size-label">0.5</span></label>
                <input type="range" id="brush-size" min="0.05" max="2" step="0.05" value="0.5" style="width:100%;accent-color:#4a9eff;background:#333;height:4px;border-radius:2px;">
                <div style="display:flex;gap:6px;margin-top:4px;">
                    <button id="brush-shape-circle" class="active" style="flex:1;background:rgba(255,255,255,0.06);border:none;color:#ccc;padding:4px;border-radius:16px;font-size:12px;cursor:pointer;">Круг</button>
                    <button id="brush-shape-square" style="flex:1;background:rgba(255,255,255,0.06);border:none;color:#ccc;padding:4px;border-radius:16px;font-size:12px;cursor:pointer;">Квадрат</button>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="title">📦 Предметы</div>
            <div class="items" id="object-items">
                <button data-object="cube" class="active">Куб</button>
                <button data-object="sphere">Сфера</button>
                <button data-object="cylinder">Цил.</button>
                <button data-object="tree">Дерево</button>
                <button data-object="birch">🌳 Берёза</button>
                <button data-object="pine">🌲 Сосна</button>
                <button data-object="oak">🌳 Дуб</button>
                <button data-object="bush1">🌿 Куст 1</button>
                <button data-object="bush2">🌿 Куст 2</button>
                <button data-object="bush3">🌿 Куст 3</button>
                <button data-object="glass">🪟 Стекло</button>
                <button data-object="rock1">🪨 Камень мал.</button>
                <button data-object="rock2">🪨 Камень сред.</button>
                <button data-object="rock3">🪨 Камень бол.</button>
                <button data-object="table">Стол</button>
                <button data-object="chair">Стул</button>
                <button data-object="lamp">Торшер</button>
                <button data-object="street_lamp">💡 Фонарный столб</button>
                <button data-object="bulb">💡 Лампочка</button>
                <button data-object="stairs_stone">🗿 Лестница кам.</button>
                <button data-object="stairs_wood">🪵 Лестница дер.</button>
                <button data-object="door">🚪 Дверь</button>
                <button data-object="sound">🔊 Звук</button>
            </div>
            <div style="margin-top:6px;">
                <button id="object-activate" style="background:#4a9eff;border:none;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;">Включить предметы</button>
            </div>
        </div>

        <div class="category">
            <div class="title">💡 Источники света</div>
            <div class="items">
                <button data-light="point_light" class="active">💡 Точечный</button>
            </div>
            <div class="slider-group">
                <label>Интенсивность <span id="intensity-label">1.0</span></label>
                <input type="range" id="light-intensity" min="0.1" max="10" step="0.1" value="1.0">
                <label>Дальность <span id="distance-label">50</span></label>
                <input type="range" id="light-distance" min="1" max="100" step="0.5" value="50">
                <label style="font-size:11px;color:#666;">(1 – 100 м)</label>
                <div style="margin-top:4px;">
                    <button id="set-sun-intensity" style="background:rgba(255,200,50,0.2);border:1px solid #ffaa00;color:#ffaa00;padding:2px 10px;border-radius:12px;font-size:11px;cursor:pointer;">☀️ Солнце (10)</button>
                    <button id="set-normal-intensity" style="background:rgba(255,255,255,0.05);border:1px solid #666;color:#ccc;padding:2px 10px;border-radius:12px;font-size:11px;cursor:pointer;">🔆 Обычный (1.0)</button>
                </div>
            </div>
            <div style="margin-top:6px;">
                <button id="light-activate" style="background:#4a9eff;border:none;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;">Включить свет</button>
            </div>
        </div>

        <div class="category">
            <div class="title">🧱 Стены</div>
            <div class="items" id="wall-items">
                <button data-wall="wood" class="active">Дерево</button>
                <button data-wall="stone">Камень</button>
                <button data-wall="stone2">Камень 2</button>
                <button data-wall="triangle">△ Треугольная</button>
            </div>
            <div class="slider-group" id="triangle-angle-group" style="display:none;">
                <label>Угол при вершине <span id="triangle-angle-label">60°</span></label>
                <input type="range" id="triangle-angle" min="10" max="170" step="1" value="60">
            </div>
            <div style="margin-top:6px;">
                <button id="wall-activate" style="background:#4a9eff;border:none;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;">Включить стены</button>
            </div>
        </div>

        <div id="user-category" class="category" style="display:none;">
            <div class="title">👤 Пользовательские</div>
            <div class="items" id="user-items"></div>
        </div>

        <div class="category">
            <div class="title">⚡ Коллизия</div>
            <div class="items"><button id="collision-toggle" class="col-btn">Назначить</button></div>
        </div>

        <div class="category">
            <div class="title">🔄 Трансформация</div>
            <div class="items">
                <button id="trans-translate" class="trans-btn active">⟷</button>
                <button id="trans-rotate" class="trans-btn">↻</button>
                <button id="trans-scale" class="trans-btn">⤡</button>
            </div>
        </div>

        <div class="category">
            <div class="title">🎯 Действия</div>
            <div class="items">
                <button id="select-mode" class="active">Выделить</button>
                <button id="delete-mode" class="danger">Удалить</button>
                <button id="group-btn">📁 Группа</button>
                <button id="ungroup-btn">📂 Разгр.</button>
            </div>
        </div>
    </div>
</div>

// ----- ТЕКСТУРЫ (с улучшенным качеством) -----
async function loadTextures() {
    for (const name of textureNames) {
        const ext = textureExtensions[name] || 'jpg';
        try {
            const resp = await fetch(`textures/${name}.${ext}`);
            if (!resp.ok) throw new Error();
            const blob = await resp.blob();
            const reader = new FileReader();
            await new Promise((resolve) => {
                reader.onload = () => { textureData[name] = reader.result; resolve(); };
                reader.readAsDataURL(blob);
            });
        } catch (e) { textureData[name] = null; }
    }
}
function createTextureFromBase64(b64) {
    if (!b64) return null;
    const img = new Image();
    img.src = b64;
    const tex = new THREE.Texture(img);
    tex.needsUpdate = true;
    // Улучшаем качество: фильтрация и повторение
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    // Устанавливаем повторение для стен (будет переопределено в createWall)
    tex.repeat.set(1, 1);
    return tex;
}

// ----- ЛАНДШАФТ (с улучшенной текстурой) -----
const geometry = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, SEGMENTS, SEGMENTS);
geometry.rotateX(-Math.PI/2);
const posAttr = geometry.attributes.position;
const vertexCount = posAttr.count;
const origX = new Float32Array(vertexCount);
const origZ = new Float32Array(vertexCount);
for (let i=0; i<vertexCount; i++) { origX[i] = posAttr.getX(i); origZ[i] = posAttr.getZ(i); }
const heights = new Float32Array(vertexCount); heights.fill(0);
function updateTerrain() {
    for (let i=0; i<vertexCount; i++) posAttr.setY(i, heights[i]);
    posAttr.needsUpdate = true;
    geometry.computeVertexNormals();
    if (brushTextureLayer) {
        const pos2 = brushTextureLayer.geometry.attributes.position;
        for (let i=0; i<vertexCount; i++) {
            pos2.setY(i, heights[i] + 0.01);
        }
        pos2.needsUpdate = true;
        brushTextureLayer.geometry.computeVertexNormals();
    }
}
let terrainMat, terrain;
function initTerrain() {
    terrainMat = new THREE.MeshStandardMaterial({ color:0x6da56a, roughness:0.8, metalness:0, side:THREE.DoubleSide });

    terrain.receiveShadow = true; terrain.castShadow = true; terrain.position.y = 0;
    scene.add(terrain);

        if (tex) {

            terrainMat.map = tex;
            terrainMat.color.setHex(0xffffff);
            terrainMat.needsUpdate = true;
        }
    }
    initBrushLayer();
}

function initBrushLayer() {
    brushCanvas = document.createElement('canvas');
    brushCanvas.width = 1024;
    brushCanvas.height = 1024;
    brushCtx = brushCanvas.getContext('2d');
    brushCtx.fillStyle = 'rgba(0,0,0,0)';
    brushCtx.fillRect(0,0,1024,1024);
    brushTexture = new THREE.CanvasTexture(brushCanvas);
    brushTexture.needsUpdate = true;

    const brushMat = new THREE.MeshStandardMaterial({
        map: brushTexture,
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
        blending: THREE.NormalBlending
    });
    const brushGeo = geometry.clone();
    for (let i=0; i<vertexCount; i++) {
        brushGeo.attributes.position.setY(i, heights[i] + 0.01);
    }
    brushGeo.attributes.position.needsUpdate = true;
    brushGeo.computeVertexNormals();
    brushTextureLayer = new THREE.Mesh(brushGeo, brushMat);
    brushTextureLayer.receiveShadow = false;
    brushTextureLayer.castShadow = false;
    scene.add(brushTextureLayer);
}

// ----- РЕЛЬЕФ (без изменений) -----
function averageHeightInRadius(x, z, radius) {
    let sum = 0, count = 0;
    const r2 = radius * radius;
    for (let i = 0; i < vertexCount; i++) {
        const dx = origX[i] - x, dz = origZ[i] - z;
        if (dx * dx + dz * dz < r2) {
            sum += heights[i];
            count++;
        }
    }
    return count > 0 ? sum / count : 0;
}
function modifyTerrain(x, z, radius, strength, mode) {
    const r2 = radius * radius;
    if (mode === 'smooth') {
        for (let i = 0; i < vertexCount; i++) {
            const dx = origX[i] - x, dz = origZ[i] - z, d = dx * dx + dz * dz;
            if (d < r2) {
                const avg = averageHeightInRadius(origX[i], origZ[i], radius);
                const influence = 1 - Math.sqrt(d) / radius;
                heights[i] += (avg - heights[i]) * influence * strength;
                heights[i] = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, heights[i]));
            }
        }
    } else {
        for (let i = 0; i < vertexCount; i++) {
            const dx = origX[i] - x, dz = origZ[i] - z, d = dx * dx + dz * dz;
            if (d < r2) {
                const influence = 1 - Math.sqrt(d) / radius;
                const delta = influence * strength;
                if (mode === 'raise') heights[i] += delta;
                else if (mode === 'lower') heights[i] -= delta;
                heights[i] = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, heights[i]));
            }
        }
    }
    updateTerrain();
}

// ----- КИСТЬ РИСОВАНИЯ (без изменений) -----
function paintTextureOnTerrain(event) {
    if (!brushSelectedTexture) { setStatus('Сначала выберите текстуру кисти'); return; }
    const hit = getTerrainIntersection(event);
    if (!hit) return;
    const uv = hit.uv;
    if (!uv) return;
    const x = uv.x * 1024;
    const y = (1 - uv.y) * 1024;
    const sizePixels = brushSize * 64;
    const halfSize = sizePixels / 2;
    const img = new Image();
    img.onload = () => {
        brushCtx.save();
        brushCtx.globalAlpha = 1.0;
        if (brushShape === 'circle') {
            brushCtx.beginPath();
            brushCtx.arc(x, y, halfSize, 0, Math.PI * 2);
            brushCtx.closePath();
            brushCtx.clip();
            brushCtx.drawImage(img, x - halfSize, y - halfSize, sizePixels, sizePixels);
        } else {
            brushCtx.drawImage(img, x - halfSize, y - halfSize, sizePixels, sizePixels);
        }
        brushCtx.restore();
        brushTexture.needsUpdate = true;
    };
    img.src = brushSelectedTexture;
}

// ----- СОЗДАНИЕ ОБЪЕКТОВ (СТЕКЛО, КАМНИ, ДЕРЕВЬЯ, КУСТЫ, ЛЕСТНИЦЫ, ФОНАРИ) -----
function createObject(type, pos, color = 0xffaa00, size = 0.6) {
    // Пользовательские спрайты
    if (type.startsWith('user_')) {
        const u = userTextures.find(t => t.name === type.substring(5) && t.type === 'object');
        if (u) {
            const tex = createTextureFromBase64(u.dataURL);
            if (tex) {
                const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: true, depthWrite: false });
                const sprite = new THREE.Sprite(mat);
                sprite.position.copy(pos);
                sprite.scale.set(1, 1, 1);
                sprite.userData.isObject = true;
                sprite.userData.id = objectIdCounter++;
                sprite.userData.type = 'user_sprite';
                sprite.userData.userName = u.name;
                sprite.userData.collision = true;
                scene.add(sprite);
                const obj = {
                    mesh: sprite, id: sprite.userData.id, type: 'user_sprite', data: {
                        position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                        color: 0xffffff, texture: u.name, collision: true, size: 1
                    }
                };
                sceneObjects.push(obj);
                updateObjectList();
                return obj;
            }
        }
        type = 'cube';
    }

    // ----- ЗВУК -----
    if (type === 'sound') {
        const group = new THREE.Group();
        const marker = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 0.2 }));
        group.add(marker);
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🔊', 32, 32);
        const tex = new THREE.CanvasTexture(canvas);
        const sMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sText = new THREE.Sprite(sMat);
        sText.scale.set(0.4, 0.4, 1);
        sText.position.y = 0.3;
        group.add(sText);
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'sound';
        group.userData.soundData = { file: null, volume: 0.8, distance: 10 };
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: 'sound', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0xffaa00, texture: null, collision: true,
                soundData: { file: null, volume: 0.8, distance: 10 }
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- ТОЧЕЧНЫЙ СВЕТ (с интенсивностью и дальностью) -----
    if (type === 'point_light') {
        let finalPos = pos.clone();
        if (finalPos.y < 0.5) {
            finalPos.y = 2.0;
            setStatus('Свет поднят на высоту 2 м (нельзя ставить на землю)');
        }
        const intensity = parseFloat(document.getElementById('light-intensity').value) || 1.0;
        const distance = parseFloat(document.getElementById('light-distance').value) || 50;
        const color = 0xffeedd;
        const light = new THREE.PointLight(color, intensity, distance);
        light.position.copy(finalPos);
        // Тени отключаем для производительности
        // light.castShadow = true;

        const marker = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.5 })
        );
        marker.position.copy(finalPos);

        const group = new THREE.Group();
        group.position.copy(finalPos);
        group.add(marker);
        group.userData.light = light;
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'point_light';
        group.userData.collision = false;
        scene.add(group);

        const obj = {
            mesh: group, id: group.userData.id, type: 'point_light', data: {
                position: finalPos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0xffdd44, texture: null, collision: false,
                lightData: { type: 'point_light', color: color, intensity: intensity, distance: distance }
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- ДВЕРЬ -----
    if (type === 'door') {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 });
        const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.0, 0.05), mat);
        doorMesh.position.y = 1.0;
        doorMesh.castShadow = true;
        group.add(doorMesh);
        const hMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.2 });

        handle.position.set(0.35, 1.0, 0.04);
        group.add(handle);
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'door';
        group.userData.isOpen = false;
        group.userData.doorMesh = doorMesh;
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: 'door', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0x8B5A2B, texture: null, collision: true, isOpen: false
            }
        };
        sceneObjects.push(obj);
        doorObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- СТЕКЛО (новый тип) -----
    if (type === 'glass') {
        const mat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.35,
            roughness: 0.05,
            metalness: 0.0,
            clearcoat: 0.3,
            clearcoatRoughness: 0.2,

            envMapIntensity: 0.5

        const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.05), mat);
        mesh.position.copy(pos);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.isObject = true;
        mesh.userData.id = objectIdCounter++;
        mesh.userData.type = 'glass';
        mesh.userData.collision = true;
        scene.add(mesh);
        const obj = {
            mesh, id: mesh.userData.id, type: 'glass', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0x88ccff, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- ДЕРЕВЬЯ -----
    if (type === 'birch' || type === 'pine' || type === 'oak' || type === 'tree') {
        const group = new THREE.Group();
        let trunkMat, crownMat;
        if (type === 'birch') {
            trunkMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.8 });
            crownMat = new THREE.MeshStandardMaterial({ color: 0x8fc77a, roughness: 0.6 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.9, 6), trunkMat);
            trunk.position.y = 0.45;
            group.add(trunk);
            const crown = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6, 6), crownMat);
            crown.position.y = 1.2;
            crown.scale.x = 0.7;
            crown.scale.z = 0.7;
            group.add(crown);
        } else if (type === 'pine') {
            trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 });
            crownMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.7 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.15, 0.7, 6), trunkMat);
            trunk.position.y = 0.35;
            group.add(trunk);
            const layers = [0.3, 0.6, 0.9];
            layers.forEach((h, i) => {
                const r = 0.5 - i * 0.1;
                const cone = new THREE.Mesh(new THREE.ConeGeometry(r, 0.4, 6), crownMat);
                cone.position.y = 0.4 + i * 0.35;
                group.add(cone);
            });
        } else if (type === 'oak') {
            trunkMat = new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.8 });
            crownMat = new THREE.MeshStandardMaterial({ color: 0x4c7a34, roughness: 0.6 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 0.8, 6), trunkMat);
            trunk.position.y = 0.4;
            group.add(trunk);
            const crown = new THREE.Mesh(new THREE.SphereGeometry(0.7, 6, 6), crownMat);
            crown.position.y = 1.0;
            crown.scale.x = 0.9;
            crown.scale.z = 0.9;
            group.add(crown);
        } else { // обычное дерево
            trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            crownMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 0.8, 6), trunkMat);
            trunk.position.y = 0.4;
            group.add(trunk);
            const crown = new THREE.Mesh(new THREE.SphereGeometry(0.5, 6, 6), crownMat);
            crown.position.y = 1.0;
            group.add(crown);
        }
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = type;
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: type, data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),

            }

        const group = new THREE.Group();
        const colors = [0x3a7d34, 0x4c8b3a, 0x5a9e4a];
        const idx = type === 'bush1' ? 0 : type === 'bush2' ? 1 : 2;
        const mat = new THREE.MeshStandardMaterial({ color: colors[idx], roughness: 0.8 });
        const count = type === 'bush1' ? 2 : type === 'bush2' ? 3 : 4;

            }

    // ----- ЛЕСТНИЦЫ -----

        const mat = type === 'stairs_stone' ? new THREE.MeshStandardMaterial({ color: 0x9a8a7a, roughness: 0.9 }) : new THREE.MeshStandardMaterial({ color: 0x8B6B4A, roughness: 0.8 });
        for (let i = 0; i < stepCount; i++) {

            step.position.set(0, i * stepHeight + stepHeight / 2, -i * stepDepth);

        }
        group.position.copy(pos);
        group.userData.isObject = true;

        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 2.0, 8), poleMat);
        pole.position.y = 1.0;

        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.03, 0.03), poleMat);
        arm.position.set(0.2, 2.0, 0);
        group.add(arm);
        const lightSphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.5 }));
        lightSphere.position.set(0.4, 2.0, 0);

        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'street_lamp';
        group.userData.collision = true;
        scene.add(group);

            mesh: group, id: group.userData.id, type: 'street_lamp', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0x444444, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- ЛАМПОЧКА (подвесная) -----
    if (type === 'bulb') {
        const group = new THREE.Group();
        const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 0.3, 4), new THREE.MeshStandardMaterial({ color: 0x888888 }));
        wire.position.y = 0.15;
        group.add(wire);
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffaa00, emissiveIntensity: 0.8 }));
        bulb.position.y = 0.3;
        group.add(bulb);
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'bulb';
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: 'bulb', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0xffdd44, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- КАМНИ -----
    if (type === 'rock1' || type === 'rock2' || type === 'rock3') {
        const group = new THREE.Group();
        const color = 0x888888;
        const roughness = 0.9;
        const mat = new THREE.MeshStandardMaterial({ color, roughness });
        if (type === 'rock1') {
            const mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15, 0), mat);
            mesh.position.y = 0.15;
            group.add(mesh);
        } else if (type === 'rock2') {
            const mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.3, 1), mat);
            mesh.position.y = 0.3;
            group.add(mesh);
            const mesh2 = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2, 1), mat);
            mesh2.position.set(0.2, 0.2, 0.1);
            group.add(mesh2);
        } else if (type === 'rock3') {
            const mesh = new THREE.Mesh(new THREE.DodecahedronGeometry(0.5, 1), mat);
            mesh.position.y = 0.5;
            group.add(mesh);
            const mesh2 = new THREE.Mesh(new THREE.DodecahedronGeometry(0.3, 1), mat);
            mesh2.position.set(-0.3, 0.3, 0.2);
            group.add(mesh2);
            const mesh3 = new THREE.Mesh(new THREE.DodecahedronGeometry(0.2, 1), mat);
            mesh3.position.set(0.3, 0.25, -0.3);
            group.add(mesh3);
        }
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = type;
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: type, data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0x888888, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }

    // ----- МЕБЕЛЬ И ПРИМИТИВЫ (куб, сфера, цилиндр, стол, стул, торшер) -----
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.1 });
    let mesh;
    if (type === 'cube') mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
    else if (type === 'sphere') mesh = new THREE.Mesh(new THREE.SphereGeometry(size / 2, 16, 16), mat);
    else if (type === 'cylinder') mesh = new THREE.Mesh(new THREE.CylinderGeometry(size / 2, size / 2, size, 12), mat);
    else if (type === 'table') {
        const group = new THREE.Group();
        const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
        top.position.y = 0.55;
        group.add(top);
        for (let x of [-0.35, 0.35]) {
            for (let z of [-0.2, 0.2]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0x654321 }));
                leg.position.set(x, 0.25, z);
                group.add(leg);
            }
        }
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'table';
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: 'table', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0x8B4513, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    } else if (type === 'chair') {
        const group = new THREE.Group();
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.4), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
        seat.position.y = 0.3;
        group.add(seat);
        for (let x of [-0.15, 0.15]) {
            for (let z of [-0.15, 0.15]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), new THREE.MeshStandardMaterial({ color: 0x654321 }));
                leg.position.set(x, 0.15, z);
                group.add(leg);
            }
        }
        const back = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.02), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
        back.position.set(0, 0.45, -0.2);
        group.add(back);
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'chair';
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: 'chair', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0x8B4513, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    } else if (type === 'lamp') {
        const group = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8, 6), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        pole.position.y = 0.4;
        group.add(pole);
        const shade = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.5 }));
        shade.position.y = 0.8;
        group.add(shade);
        group.position.copy(pos);
        group.userData.isObject = true;
        group.userData.id = objectIdCounter++;
        group.userData.type = 'lamp';
        group.userData.collision = true;
        scene.add(group);
        const obj = {
            mesh: group, id: group.userData.id, type: 'lamp', data: {
                position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
                color: 0xffaa00, texture: null, collision: true, size: 1
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    } else {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
    }
    mesh.position.copy(pos);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData.isObject = true;
    mesh.userData.id = objectIdCounter++;
    mesh.userData.type = type;
    mesh.userData.collision = true;
    scene.add(mesh);
    const obj = {
        mesh, id: mesh.userData.id, type, data: {
            position: pos.clone(), rotation: new THREE.Euler(0, 0, 0), scale: new THREE.Vector3(1, 1, 1),
            color, texture: null, collision: true, size
        }
    };
    sceneObjects.push(obj);
    updateObjectList();
    return obj;
}

// ----- СОЗДАНИЕ СТЕН (с улучшенными текстурами) -----
function createWall(x1, z1, x2, z2, height = WALL_HEIGHT_DEFAULT, width = WALL_WIDTH_DEFAULT, type = 'wood', angleDeg = 60) {
    if (type === 'triangle') {
        // Треугольная стена (остаётся без текстур, только цвет)
        const dx = x2 - x1, dz = z2 - z1;
        const baseLen = Math.sqrt(dx * dx + dz * dz);
        if (baseLen < 0.3) return null;
        const angleRad = angleDeg * Math.PI / 180;
        const halfBase = baseLen / 2;
        const triHeight = halfBase * Math.tan(angleRad / 2);
        const shape = new THREE.Shape();
        shape.moveTo(-halfBase, 0);
        shape.lineTo(0, triHeight);
        shape.lineTo(halfBase, 0);
        shape.lineTo(-halfBase, 0);
        const extrudeSettings = { depth: height, bevelEnabled: false };
        const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        const mat = new THREE.MeshStandardMaterial({ color: 0xbc8f4f, roughness: 0.7, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(0, 0, 0);
        const angle = Math.atan2(dx, dz);
        mesh.rotation.y = -angle;
        mesh.position.set(x1, 0, z1);
        mesh.position.y = height / 2;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.isObject = true;
        mesh.userData.id = objectIdCounter++;
        mesh.userData.type = 'wall_triangle';
        mesh.userData.wallType = 'triangle';
        mesh.userData.width = baseLen;
        mesh.userData.height = height;
        mesh.userData.length = triHeight;
        mesh.userData.collision = true;
        scene.add(mesh);
        const obj = {
            mesh: mesh, id: mesh.userData.id, type: 'wall_triangle', data: {
                width: baseLen, height: height, len: triHeight,
                position: mesh.position.clone(), rotation: mesh.rotation.clone(), scale: mesh.scale.clone(),
                color: 0xbc8f4f, texture: null, collision: true, wallType: 'triangle', angle: angleDeg
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    } else {
        // Обычная стена (прямоугольная) с улучшенной текстурой
        const dx = x2 - x1, dz = z2 - z1, len = Math.sqrt(dx * dx + dz * dz);
        if (len < 0.3) return null;
        const angle = Math.atan2(dx, dz), mx = (x1 + x2) / 2, mz = (z1 + z2) / 2;
        let tex = null;
        if (type.startsWith('user_')) {
            const u = userTextures.find(t => t.name === type.substring(5) && t.type === 'wall');
            if (u) tex = createTextureFromBase64(u.dataURL);
        }
        if (!tex) {
            if (type === 'wood' && textureData.dpol) tex = createTextureFromBase64(textureData.dpol);
            else if (type === 'stone' && textureData.stena) tex = createTextureFromBase64(textureData.stena);
            else if (type === 'stone2' && textureData.stena2) tex = createTextureFromBase64(textureData.stena2);
        }
        if (!tex) tex = createTextureFromBase64(FALLBACK_TEXTURE_BASE64);
        // Улучшаем качество текстуры для стен: увеличиваем повторение
        if (tex) {
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(1, 1); // можно настроить под размер стены
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
        }
        const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0xffffff, roughness: 0.7 });
        const wall = new THREE.Mesh(new THREE.BoxGeometry(width, height, len), mat);
        wall.position.set(mx, height / 2, mz);
        wall.rotation.y = angle;
        wall.castShadow = true;
        wall.receiveShadow = true;
        wall.userData.isObject = true;
        wall.userData.id = objectIdCounter++;
        wall.userData.type = 'wall';
        wall.userData.wallType = type;
        wall.userData.width = width;
        wall.userData.height = height;
        wall.userData.length = len;
        wall.userData.collision = true;
        scene.add(wall);
        const obj = {
            mesh: wall, id: wall.userData.id, type: 'wall', data: {
                width, height, len,
                position: wall.position.clone(), rotation: wall.rotation.clone(), scale: wall.scale.clone(),
                color: 0xffffff, texture: type, collision: true, wallType: type
            }
        };
        sceneObjects.push(obj);
        updateObjectList();
        return obj;
    }
}

// ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (без изменений) -----
function removeObject(obj) {
    scene.remove(obj.mesh);
    const idx = sceneObjects.indexOf(obj);
    if (idx !== -1) sceneObjects.splice(idx, 1);
    if (selectedObject === obj) { selectedObject = null; transformControls.detach(); }
    const si = selectedObjects.indexOf(obj);
    if (si !== -1) selectedObjects.splice(si, 1);
    if (obj.type === 'door') {
        const di = doorObjects.indexOf(obj);
        if (di !== -1) doorObjects.splice(di, 1);
    }
    updateObjectList();
}
function clearAll() {
    sceneObjects.forEach(o => scene.remove(o.mesh));
    sceneObjects.length = 0;
    selectedObject = null;
    selectedObjects = [];
    transformControls.detach();
    doorObjects = [];
    for (let i = 0; i < vertexCount; i++) heights[i] = 0;
    updateTerrain();
    removeGhost();
    updateObjectList();
    if (brushCtx) {
        brushCtx.fillStyle = 'rgba(0,0,0,0)';
        brushCtx.fillRect(0, 0, 1024, 1024);
        brushTexture.needsUpdate = true;
    }
}
function removeGhost() {
    if (ghostObject) { scene.remove(ghostObject); ghostObject = null; }
    isGhostActive = false;
    ghostStartPoint = null;
    ghostType = null;
    ghostData = {};
    orbitControls.enableZoom = true;
    setHint('Выберите инструмент справа');
}
function selectObject(obj) {
    if (selectedObject === obj) return;
    if (selectedObject) transformControls.detach();
    selectedObject = obj;
    if (obj) {
        transformControls.attach(obj.mesh);
        setStatus(`Выделен ${obj.type} #${obj.id}`);
    } else {
        setStatus('Выделение снято');
    }
    updateObjectList();
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setHint(msg) { document.getElementById('hint').textContent = msg; }
function updateObjectList() { setStatus(`Объектов: ${sceneObjects.length}`); }
function snapPoint(x, z) {
    if (!snapEnabled) return { x: x, y: z };
    const sx = Math.round(x / SNAP_GRID) * SNAP_GRID;
    const sz = Math.round(z / SNAP_GRID) * SNAP_GRID;
    return { x: sx, y: sz };
}
function duplicateObject(obj) {
    const pos = obj.data.position.clone();
    pos.x += 1;
    pos.z += 1;
    let n;
    if (obj.type === 'wall' || obj.type === 'wall_triangle') {
        setStatus('Дублирование стен пока не поддерживается');
        return;
    } else if (obj.type === 'user_sprite') {
        const u = userTextures.find(t => t.name === obj.data.texture);
        if (u) n = createObject('user_' + u.name, pos);
        else n = createObject('cube', pos);
    } else {
        n = createObject(obj.type, pos, obj.data.color, 0.6);
    }
    if (n) { selectObject(n); setStatus('Объект дублирован'); }
}

// ----- ПОЛЬЗОВАТЕЛЬСКИЕ ТЕКСТУРЫ И КИСТИ (без изменений) -----
function addUserTexture(name, type, dataURL) {
    if (userTextures.some(u => u.name === name)) {
        setStatus('Текстура с таким именем уже существует');
        return false;
    }
    userTextures.push({ name, type, dataURL });
    if (type === 'brush') {
        brushTextures.push({ name, dataURL });
        updateBrushPanel();
    } else {
        updateUserPanel();
    }
    setStatus(`Текстура "${name}" добавлена`);
    return true;
}
function updateUserPanel() {
    const cat = document.getElementById('user-category');
    const items = document.getElementById('user-items');
    const wallItems = userTextures.filter(t => t.type === 'wall');
    const objItems = userTextures.filter(t => t.type === 'object');
    if (wallItems.length === 0 && objItems.length === 0) {
        cat.style.display = 'none';
        return;
    }
    cat.style.display = 'block';
    items.innerHTML = '';
    [...wallItems, ...objItems].forEach(ut => {
        const btn = document.createElement('button');
        btn.textContent = ut.name;
        btn.dataset.userName = ut.name;
        btn.dataset.userType = ut.type;
        btn.addEventListener('click', () => {
            if (ut.type === 'wall') {
                currentWallType = 'user_' + ut.name;
                setMode('walls');
                document.querySelectorAll('#user-items button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                currentObjectType = 'user_' + ut.name;
                setMode('objects');
                document.querySelectorAll('#user-items button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            setStatus(`Выбран пользовательский объект: ${ut.name}`);
        });
        items.appendChild(btn);
    });
}
function updateBrushPanel() {
    const container = document.getElementById('brush-textures');
    container.innerHTML = '';
    brushTextures.forEach((bt, index) => {
        const btn = document.createElement('button');
        btn.textContent = bt.name;
        btn.dataset.brushIndex = index;
        btn.addEventListener('click', () => {
            brushSelectedTexture = bt.dataURL;
            document.querySelectorAll('#brush-textures button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setStatus(`Выбрана кисть: ${bt.name}`);
        });
        container.appendChild(btn);
    });
}

// ----- ФУНКЦИИ ДЛЯ ПРЕДМЕТОВ (без изменений) -----
function applyFunctionToObject(obj, func) {
    if (!obj) return;
    const pos = obj.data.position;
    const rot = obj.data.rotation;
    const scale = obj.data.scale;
    switch (func) {
        case 'raise': pos.y += 1; break;
        case 'lower': pos.y -= 1; break;
        case 'move':
            pos.x += (Math.random() - 0.5) * 10;
            pos.z += (Math.random() - 0.5) * 10;
            break;
        case 'rotate': rot.y += Math.PI / 4; break;
        case 'scale_up': scale.multiplyScalar(1.2); break;
        case 'scale_down': scale.multiplyScalar(0.8); break;
    }
    obj.mesh.position.copy(pos);
    obj.mesh.rotation.copy(rot);
    obj.mesh.scale.copy(scale);
    setStatus(`Применено: ${func} к ${obj.type} #${obj.id}`);
}
function toggleDoor(obj) {
    if (obj.type !== 'door') return;
    const isOpen = obj.data.isOpen || false;
    obj.data.isOpen = !isOpen;
    const group = obj.mesh;
    const doorMesh = group.children[0];
    if (doorMesh) {
        doorMesh.rotation.y = isOpen ? 0 : Math.PI / 2;
    }
    setStatus(`Дверь ${obj.data.isOpen ? 'открыта' : 'закрыта'}`);
}

// ----- ПЕРЕСЕЧЕНИЯ (без изменений) -----
function getTerrainIntersection(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(terrain);
    if (hits.length > 0) return hits[0];
    return null;
}
function getObjectIntersection(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const meshes = sceneObjects.map(o => o.mesh);
    const hits = raycaster.intersectObjects(meshes, true);
    if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj && !obj.userData.isObject) obj = obj.parent;
        if (obj && obj.userData.isObject) {
            return sceneObjects.find(o => o.id === obj.userData.id);
        }
    }
    return null;
}

// ----- ОБРАБОТЧИКИ ДВОЙНОГО КЛИКА (стены и объекты) -----
renderer.domElement.addEventListener('dblclick', (e) => {
    if (currentMode === 'walls') {
        if (!isGhostActive) {
            const hit = getTerrainIntersection(e);
            if (hit) {
                const p = hit.point;
                const s = snapPoint(p.x, p.z);
                ghostStartPoint = new THREE.Vector3(s.x, 0, s.y);
                let tex = null;
                if (currentWallType.startsWith('user_')) {
                    const u = userTextures.find(t => t.name === currentWallType.substring(5) && t.type === 'wall');
                    if (u) tex = createTextureFromBase64(u.dataURL);
                }
                if (!tex) {
                    if (currentWallType === 'wood' && textureData.dpol) tex = createTextureFromBase64(textureData.dpol);
                    else if (currentWallType === 'stone' && textureData.stena) tex = createTextureFromBase64(textureData.stena);
                    else if (currentWallType === 'stone2' && textureData.stena2) tex = createTextureFromBase64(textureData.stena2);
                }
                if (!tex) tex = createTextureFromBase64(FALLBACK_TEXTURE_BASE64);
                const w = WALL_WIDTH_DEFAULT, h = WALL_HEIGHT_DEFAULT;
                let mesh;
                if (currentWallType === 'triangle') {
                    const mat = new THREE.MeshStandardMaterial({ color: 0x4a9eff, transparent: true, opacity: 0.4, depthWrite: false });
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), mat);
                } else {
                    // Улучшенный призрак с текстурой
                    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0x4a9eff, transparent: true, opacity: 0.4, depthWrite: false });
                    mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 1), mat);
                }
                mesh.position.set(ghostStartPoint.x, h / 2, ghostStartPoint.z);
                mesh.userData.isGhost = true;
                mesh.visible = false;
                scene.add(mesh);
                ghostObject = mesh;
                isGhostActive = true;
                ghostType = 'wall';
                ghostData = { width: w, height: h, type: currentWallType, angle: parseFloat(document.getElementById('triangle-angle').value) || 60 };
                ghostSmoothTarget = ghostStartPoint.clone();
                setStatus('Выберите конечную точку стены');
                setHint('Двойной клик — фиксация, колёсико — ширина/угол');
                orbitControls.enableZoom = false;
            }
        } else {
            const hit = getTerrainIntersection(e);
            if (hit && ghostStartPoint) {
                const p = hit.point;
                const s = snapPoint(p.x, p.z);
                const w = ghostData.width || WALL_WIDTH_DEFAULT;
                const h = ghostData.height || WALL_HEIGHT_DEFAULT;
                const angle = ghostData.angle || 60;
                const wall = createWall(ghostStartPoint.x, ghostStartPoint.z, s.x, s.y, h, w, ghostData.type, angle);
                if (wall) setStatus('Стена создана');
                removeGhost();
                orbitControls.enableZoom = true;
            }
        }
    } else if (currentMode === 'objects') {
        if (!isGhostActive) {
            const hit = getTerrainIntersection(e);
            if (hit) {
                const p = hit.point;
                const s = snapPoint(p.x, p.z);
                const pos = new THREE.Vector3(s.x, 0, s.y);
                let ghost;
                if (currentObjectType.startsWith('user_')) {
                    const u = userTextures.find(t => t.name === currentObjectType.substring(5) && t.type === 'object');
                    if (u) {
                        const tex = createTextureFromBase64(u.dataURL);
                        if (tex) {
                            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.4, depthTest: true, depthWrite: false });
                            ghost = new THREE.Sprite(mat);
                            ghost.scale.set(1, 1, 1);
                        }
                    }
                }
                if (!ghost) {
                    const mat = new THREE.MeshStandardMaterial({ color: 0x4a9eff, transparent: true, opacity: 0.4 });
                    if (currentObjectType === 'cube') ghost = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), mat);
                    else if (currentObjectType === 'sphere') ghost = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), mat);
                    else if (currentObjectType === 'cylinder') ghost = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.6, 12), mat);
                    else if (currentObjectType === 'door') ghost = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.0, 0.05), mat);
                    else if (currentObjectType === 'sound') ghost = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), mat);
                    else if (currentObjectType === 'point_light') ghost = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), mat);
                    else if (['birch', 'pine', 'oak', 'tree'].includes(currentObjectType)) {
                        ghost = new THREE.Mesh(new THREE.SphereGeometry(0.5, 6, 6), mat);
                    } else if (['bush1', 'bush2', 'bush3'].includes(currentObjectType)) {
                        ghost = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 6), mat);
                    } else if (['stairs_stone', 'stairs_wood'].includes(currentObjectType)) {
                        ghost = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.6), mat);
                    } else if (currentObjectType === 'street_lamp') {
                        ghost = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2, 6), mat);
                    } else if (currentObjectType === 'bulb') {
                        ghost = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), mat);
                    } else if (currentObjectType === 'glass') {
                        ghost = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.05), mat);
                    } else if (['rock1', 'rock2', 'rock3'].includes(currentObjectType)) {
                        ghost = new THREE.Mesh(new THREE.DodecahedronGeometry(0.3, 0), mat);
                    } else {
                        ghost = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), mat);
                    }
                }
                if (ghost) {
                    ghost.position.copy(pos);
                    ghost.userData.isGhost = true;
                    scene.add(ghost);
                    ghostObject = ghost;
                    isGhostActive = true;
                    ghostType = 'object';
                    ghostData = { type: currentObjectType };
                    ghostSmoothTarget = pos.clone();
                    setStatus('Выберите место для предмета');
                    setHint('Двойной клик — фиксация');
                    orbitControls.enableZoom = false;
                }
            }
        } else {
            const hit = getTerrainIntersection(e);
            if (hit) {
                const p = hit.point;
                const s = snapPoint(p.x, p.z);
                const pos = new THREE.Vector3(s.x, 0, s.y);
                const obj = createObject(ghostData.type, pos);
                if (obj) { selectObject(obj); setStatus(`Предмет "${ghostData.type}" добавлен`); }
                removeGhost();
                orbitControls.enableZoom = true;
            }
        }
    }
});

// ----- ФУНКЦИЯ ОБНОВЛЕНИЯ ПРИЗРАКА (для стен и объектов) -----
function updateGhostSmooth() {
    if (!isGhostActive || !ghostObject) return;
    if (ghostType === 'wall' && ghostStartPoint) {
        const endPoint = ghostSmoothTarget;
        if (!endPoint) return;
        const dx = endPoint.x - ghostStartPoint.x;
        const dz = endPoint.z - ghostStartPoint.z;
        const len = Math.sqrt(dx * dx + dz * dz);
        if (len > 0.1) {
            const ang = Math.atan2(dx, dz);
            ghostObject.rotation.y = ang;
            ghostObject.scale.z = len;
            ghostObject.visible = true;
            ghostObject.position.x = ghostStartPoint.x;
            ghostObject.position.z = ghostStartPoint.z;
            ghostObject.position.y = (ghostData.height || WALL_HEIGHT_DEFAULT) / 2;
        } else {
            ghostObject.visible = false;
        }
    } else if (ghostType === 'object' && ghostSmoothTarget) {
        const speed = 0.25;
        const pos = ghostObject.position;
        pos.x += (ghostSmoothTarget.x - pos.x) * speed;
        pos.y += (ghostSmoothTarget.y - pos.y) * speed;
        pos.z += (ghostSmoothTarget.z - pos.z) * speed;
        if (Math.abs(pos.x - ghostSmoothTarget.x) < 0.001) pos.x = ghostSmoothTarget.x;
        if (Math.abs(pos.y - ghostSmoothTarget.y) < 0.001) pos.y = ghostSmoothTarget.y;
        if (Math.abs(pos.z - ghostSmoothTarget.z) < 0.001) pos.z = ghostSmoothTarget.z;
    }
}

// ----- MOUSEMOVE ДЛЯ ОБНОВЛЕНИЯ КОНЕЧНОЙ ТОЧКИ -----
renderer.domElement.addEventListener('mousemove', (e) => {
    if (!isGhostActive || !ghostObject) return;
    const hit = getTerrainIntersection(e);
    if (!hit) return;
    const p = hit.point;
    const s = snapPoint(p.x, p.z);
    const target = new THREE.Vector3(s.x, 0, s.y);
    if (ghostType === 'wall') {
        ghostSmoothTarget = target;
    } else if (ghostType === 'object') {
        ghostSmoothTarget = target;
    }
});

// ----- WHEEL ДЛЯ ИЗМЕНЕНИЯ ШИРИНЫ/УГЛА СТЕНЫ -----
renderer.domElement.addEventListener('wheel', (e) => {
    if (isGhostActive && ghostType === 'wall') {
        const delta = Math.sign(e.deltaY) * -1;
        if (ghostData.type === 'triangle') {
            let newAngle = (ghostData.angle || 60) + delta * 2;
            newAngle = Math.max(10, Math.min(170, newAngle));
            ghostData.angle = newAngle;
            document.getElementById('triangle-angle').value = newAngle;
            document.getElementById('triangle-angle-label').textContent = newAngle + '°';
            setStatus(`Угол стены: ${newAngle}°`);
        } else {
            let newW = (ghostData.width || WALL_WIDTH_DEFAULT) + delta * 0.05;
            newW = Math.max(0.1, Math.min(1.0, newW));
            ghostData.width = newW;
            if (ghostObject) {
                const oldGeo = ghostObject.geometry;
                const newGeo = new THREE.BoxGeometry(newW, ghostData.height || WALL_HEIGHT_DEFAULT, 1);
                ghostObject.geometry = newGeo;
                oldGeo.dispose();
            }
            setStatus(`Ширина стены: ${newW.toFixed(2)} м`);
        }
        e.preventDefault();
    }
});

    } else if (currentMode === 'brush') {

        if (obj) {
            selectObject(obj);
            if (obj.type !== 'wall' && obj.type !== 'wall_triangle' && obj.type !== 'tree' && obj.type !== 'user_sprite' && obj.type !== 'door' && obj.type !== 'sound' && obj.type !== 'point_light' && !obj.type.includes('lamp') && !obj.type.includes('bulb') && !obj.type.includes('bush') && !obj.type.includes('stairs') && !obj.type.includes('rock') && obj.type !== 'glass') {

        if (obj) { removeObject(obj); setStatus('Объект удалён'); }
    } else if (currentMode === 'collision') {
        const obj = getObjectIntersection(e);
        if (obj) {
            obj.data.collision = !obj.data.collision;
            setStatus(`Коллизия ${obj.data.collision ? 'включена' : 'выключена'}`);
            obj.mesh.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(obj.data.collision ? 0x00ff00 : 0xff0000);
                }
            });
            setTimeout(() => {
                obj.mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.color.setHex(obj.data.color);
                    }
                });
            }, 2000);
        }
    }
});

// ----- ВРЕМЯ СУТОК В РЕДАКТОРЕ -----
function updateTimeDisplay(hours) {
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    document.getElementById('time-label').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function applyTimeOfDay(hours) {
    hours = ((hours % 24) + 24) % 24;
    currentTime = hours;
    document.getElementById('time-slider').value = hours;
    updateTimeDisplay(hours);
    const sunAngle = (hours / 24) * Math.PI * 2;
    const sunHeight = Math.sin(sunAngle);
    const dayFactor = Math.max(0, Math.min(1, (sunHeight + 0.3) / 1.3));
    const bgColor = new THREE.Color(0x0a0a2a).lerp(new THREE.Color(0x6da5c9), dayFactor);
    scene.background = bgColor;
    scene.fog.color = bgColor;
    ambient.intensity = 0.2 + dayFactor * 0.5;
    const sunIntensity = 0.5 + dayFactor * 1.5;
    sun.intensity = sunIntensity;
    const sunY = Math.max(-10, sunHeight * 40);
    sun.position.set(30, sunY, 20);
    sun.target.position.set(0, 0, 0);
    sun.target.updateMatrixWorld();
    const color = new THREE.Color().setHSL(0.08 + dayFactor * 0.05, 0.8, 0.5 + dayFactor * 0.3);
    sun.color.copy(color);
}

        try {
            const data = JSON.parse(ev.target.result);
            clearAll();

                userTextures = data.userTextures;
                updateUserPanel();
            }
            if (data.brushTextures) {
                brushTextures = data.brushTextures;
                updateBrushPanel();
            }
            if (data.brushImage) {
                const img = new Image();
                img.onload = () => {
                    brushCtx.clearRect(0, 0, 1024, 1024);
                    brushCtx.drawImage(img, 0, 0);
                    brushTexture.needsUpdate = true;
                };
                img.src = data.brushImage;
            }
            if (data.lightIntensity !== undefined) {
                lightIntensity = data.lightIntensity;
                document.getElementById('light-intensity').value = lightIntensity;
                document.getElementById('intensity-label').textContent = lightIntensity.toFixed(1);
            }

                    heights[i] = data.terrain.heights[i] || 0;

function generateGameHTML(data) {
    const dataJSON = JSON.stringify(data);
    return `<!DOCTYPE html>
<html>

</head>
<body>

</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
<\/script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

const DATA = ${dataJSON};

// ЗАГРУЗОЧНЫЙ ЭКРАН
const tips = [
    "Используй WASD для ходьбы, пробел для прыжка.",
    "Нажимай F, чтобы открывать двери.",
    "Ставь стены двойным кликом, регулируй ширину колёсиком.",
    "Точечный свет можно перемещать как любой объект.",
    "Экспортируй уровень в HTML и делись с друзьями!",
    "В редакторе можно менять время суток для атмосферы.",
