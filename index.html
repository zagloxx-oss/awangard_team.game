<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой 3D Дом</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            font-size: 14px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            font-size: 30px;
            pointer-events: none;
            z-index: 100;
        }
        #lock-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="info">🏠 Самый простой дом</div>
    <div id="crosshair">+</div>
    <div id="lock-hint">Кликни, чтобы захватить мышь | WASD — ходьба</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. СЦЕНА, КАМЕРА, РЕНДЕР ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // голубое небо

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 2, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. ОСВЕЩЕНИЕ ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(10, 15, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- 3. ЗЕМЛЯ (просто зелёная плоскость) ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 0.9 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- 4. ДОМ (из простых фигур) ---
        const house = new THREE.Group();

        // 4.1 Стены (куб)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf0e6d2, roughness: 0.8 }); // бежевый
        const walls = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), wallMat);
        walls.position.y = 1.25;
        walls.castShadow = true;
        walls.receiveShadow = true;
        house.add(walls);

        // 4.2 Крыша (конус)
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 }); // коричневый
        const roof = new THREE.Mesh(new THREE.ConeGeometry(2.4, 1.2, 4), roofMat); // 4 стороны = пирамида
        roof.position.y = 2.5 + 0.6;
        roof.rotation.y = Math.PI / 4; // повернуть, чтобы углы совпали со стенами
        roof.castShadow = true;
        roof.receiveShadow = true;
        house.add(roof);

        // 4.3 Дверь (прямоугольник)
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
        const door = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 1.6), doorMat);
        door.position.set(0, 0.8, 1.51);
        house.add(door);

        // Ручка двери
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), handleMat);
        handle.position.set(0.2, 0.8, 1.52);
        house.add(handle);

        // 4.4 Окна (два синих квадратика)
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x4FC3F7, emissive: 0x4FC3F7, emissiveIntensity: 0.2 });
        
        const window1 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), glassMat);
        window1.position.set(-0.9, 1.5, 1.51);
        house.add(window1);

        const window2 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), glassMat);
        window2.position.set(0.9, 1.5, 1.51);
        house.add(window2);

        // Окно сбоку
        const window3 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), glassMat);
        window3.position.set(1.51, 1.5, -0.5);
        window3.rotation.y = Math.PI / 2;
        house.add(window3);

        // 4.5 Труба (для красоты)
        const pipeMat = new THREE.MeshStandardMaterial({ color: 0xB71C1C });
        const pipe = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), pipeMat);
        pipe.position.set(-0.8, 3.0, -0.8);
        pipe.castShadow = true;
        house.add(pipe);

        scene.add(house);

        // --- 5. ДЕРЕВЬЯ (просто конус на палочке) ---
        function createTree(x, z) {
            const group = new THREE.Group();
            
            // Ствол
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 1.2), trunkMat);
            trunk.position.y = 0.6;
            trunk.castShadow = true;
            group.add(trunk);
            
            // Крона
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
            const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.2, 6), leafMat);
            leaf.position.y = 1.4;
            leaf.castShadow = true;
            group.add(leaf);
            
            group.position.set(x, 0, z);
            return group;
        }

        const trees = [
            [-3, -3], [4, -2], [-4, 3], [5, 4], [-2, -4], [3, -4]
        ];
        trees.forEach(([x, z]) => scene.add(createTree(x, z)));

        // --- 6. УПРАВЛЕНИЕ ОТ ПЕРВОГО ЛИЦА ---
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        let isLocked = false;

        renderer.domElement.addEventListener('click', () => {
            if (!isLocked) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
            document.getElementById('lock-hint').style.opacity = isLocked ? '0' : '1';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            euler.y -= (e.movementX || 0) * 0.002;
            euler.x -= (e.movementY || 0) * 0.002;
            euler.x = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, euler.x));
            camera.quaternion.setFromEuler(euler);
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
            }
        });

        const speed = 0.07;

        // --- 7. АНИМАЦИЯ ---
        function animate() {
            requestAnimationFrame(animate);

            if (isLocked) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const move = new THREE.Vector3(0, 0, 0);
                if (keys.w) move.add(forward);
                if (keys.s) move.sub(forward);
                if (keys.a) move.sub(right);
                if (keys.d) move.add(right);
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed);
                    const newPos = camera.position.clone().add(move);
                    // Ограничение, чтобы не уйти далеко
                    newPos.x = Math.max(-8, Math.min(8, newPos.x));
                    newPos.z = Math.max(-8, Math.min(8, newPos.z));
                    camera.position.copy(newPos);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Дом загружен!');
    </script>
</body>
</html>
