<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Строим дом</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #222; }
        #toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 60px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            max-width: 95%;
        }
        #toolbar button {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #eee;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        #toolbar button:hover {
            background: rgba(255,255,255,0.2);
        }
        #toolbar button.active {
            background: #4a9eff;
            color: #fff;
            border-color: #4a9eff;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.4);
        }
        #toolbar button.danger {
            background: rgba(255,70,70,0.3);
        }
        #toolbar button.danger:hover {
            background: rgba(255,70,70,0.6);
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            z-index: 10;
            pointer-events: none;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #status {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 15px;
            backdrop-filter: blur(4px);
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #time-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 16px 20px;
            border-radius: 16px;
            color: #fff;
            backdrop-filter: blur(4px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            min-width: 140px;
        }
        #time-control input[type="range"] {
            width: 100%;
            accent-color: #4a9eff;
        }
        #time-control label {
            font-size: 13px;
            opacity: 0.7;
        }
        #furniture-select {
            display: none;
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            z-index: 10;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #furniture-select button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #eee;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        #furniture-select button:hover {
            background: rgba(255,255,255,0.25);
        }
        #furniture-select button.active {
            background: #4a9eff;
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3);
            font-size: 40px;
            pointer-events: none;
            z-index: 5;
            font-weight: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        @media (max-width: 700px) {
            #toolbar button { font-size: 12px; padding: 6px 12px; }
            #info { font-size: 12px; padding: 8px 14px; }
            #time-control { padding: 12px 14px; min-width: 100px; }
        }
    </style>
</head>
<body>
    <div class="crosshair">+</div>
    <div id="info">🏗️ Строим дом — клик по сцене для размещения</div>
    <div id="status">Выберите режим</div>
    <div id="time-control">
        <label>☀️ Время суток</label>
        <input type="range" id="time-slider" min="0" max="1" step="0.01" value="0.7">
        <span id="time-label" style="font-size:12px; opacity:0.6;">день</span>
    </div>
    <div id="toolbar">
        <button data-mode="wall" class="active">🧱 Стена</button>
        <button data-mode="door">🚪 Дверь</button>
        <button data-mode="window">🪟 Окно</button>
        <button data-mode="furniture">🛋️ Мебель</button>
        <button data-mode="delete" class="danger">🗑️ Удалить</button>
        <button data-mode="clear" class="danger">❌ Очистить всё</button>
    </div>
    <div id="furniture-select">
        <button data-furniture="sofa">Диван</button>
        <button data-furniture="table">Стол</button>
        <button data-furniture="chair">Стул</button>
        <button data-furniture="bed">Кровать</button>
        <button data-furniture="lamp">Торшер</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 8, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- Управление ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 3;
        controls.maxDistance = 30;
        controls.update();

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0);
        sunLight.position.set(15, 20, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        // Дополнительный свет для интерьера
        const interiorLight = new THREE.PointLight(0xffeedd, 0.5, 20);
        interiorLight.position.set(0, 5, 0);
        scene.add(interiorLight);

        // --- Земля ---
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x6da56a,
            roughness: 0.9,
            metalness: 0.0
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка для удобства
        const grid = new THREE.GridHelper(30, 20, 0x88aa88, 0x446644);
        grid.position.y = 0;
        scene.add(grid);

        // --- Переменные для строительства ---
        let currentMode = 'wall';
        let furnitureType = 'sofa';
        let wallStart = null; // точка начала стены
        const objects = []; // все созданные объекты (для удаления)
        let isBuilding = false;

        // --- Загрузка текстур (если есть) ---
        const loader = new THREE.TextureLoader();
        const texPath = 'textures/';
        let textures = {};
        try {
            // Попытка загрузить текстуры (если есть)
            const texNames = ['stena', 'stena2', 'trawa', 'dpol', 'zemla'];
            texNames.forEach(name => {
                loader.load(`${texPath}${name}.jpg`, (tex) => {
                    textures[name] = tex;
                }, undefined, () => {});
            });
        } catch (e) {}

        // --- Функции создания объектов ---

        // Создать стену
        function createWall(x1, z1, x2, z2) {
            const dx = x2 - x1;
            const dz = z2 - z1;
            const length = Math.sqrt(dx*dx + dz*dz);
            if (length < 0.3) return null;
            const angle = Math.atan2(dx, dz);
            const midX = (x1 + x2) / 2;
            const midZ = (z1 + z2) / 2;
            const wallMat = new THREE.MeshStandardMaterial({
                map: textures.stena || null,
                color: textures.stena ? 0xffffff : 0xd4b8a0,
                roughness: 0.7
            });
            const wall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 2.5, length), wallMat);
            wall.position.set(midX, 1.25, midZ);
            wall.rotation.y = angle;
            wall.castShadow = true;
            wall.receiveShadow = true;
            wall.userData = { type: 'wall', start: [x1, z1], end: [x2, z2] };
            scene.add(wall);
            objects.push(wall);
            return wall;
        }

        // Создать дверь (на стене)
        function createDoor(x, z, angle = 0) {
            const doorMat = new THREE.MeshStandardMaterial({
                map: textures.dpol || null,
                color: textures.dpol ? 0xffffff : 0x8b5a2b,
                roughness: 0.8
            });
            const door = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.05), doorMat);
            door.position.set(x, 0.9, z);
            door.rotation.y = angle;
            door.castShadow = true;
            door.receiveShadow = true;
            door.userData = { type: 'door' };
            scene.add(door);
            objects.push(door);
            return door;
        }

        // Создать окно
        function createWindow(x, z, angle = 0) {
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.5,
                roughness: 0.1,
                metalness: 0.3
            });
            const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
            const group = new THREE.Group();
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.8), glassMat);
            glass.position.z = 0.01;
            group.add(glass);
            // Рама
            const hbar = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            hbar.position.y = 0.4;
            group.add(hbar);
            const hbar2 = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            hbar2.position.y = -0.4;
            group.add(hbar2);
            const vbar = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            vbar.position.x = 0.3;
            group.add(vbar);
            const vbar2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            vbar2.position.x = -0.3;
            group.add(vbar2);
            const border = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.85, 0.05), frameMat);
            border.position.z = -0.01;
            group.add(border);
            group.position.set(x, 1.6, z);
            group.rotation.y = angle;
            group.userData = { type: 'window' };
            scene.add(group);
            objects.push(group);
            return group;
        }

        // Создать мебель
        function createFurniture(type, x, z, angle = 0) {
            let group = new THREE.Group();
            let matWood = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7 });
            let matLightWood = new THREE.MeshStandardMaterial({ color: 0xDEB887, roughness: 0.7 });
            let matFabric = new THREE.MeshStandardMaterial({ color: 0x4A6FA5, roughness: 0.9 });
            let matMetal = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.8, roughness: 0.2 });

            switch(type) {
                case 'sofa': {
                    const seat = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.6), matFabric);
                    seat.position.y = 0.15;
                    seat.castShadow = true; seat.receiveShadow = true;
                    group.add(seat);
                    const back = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.1), new THREE.MeshStandardMaterial({ color: 0x6A8FC5, roughness: 0.9 }));
                    back.position.set(0, 0.35, -0.3);
                    back.castShadow = true; back.receiveShadow = true;
                    group.add(back);
                    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.6), new THREE.MeshStandardMaterial({ color: 0x6A8FC5, roughness: 0.9 }));
                    armL.position.set(-0.6, 0.2, 0);
                    armL.castShadow = true; armL.receiveShadow = true;
                    group.add(armL);
                    const armR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.6), new THREE.MeshStandardMaterial({ color: 0x6A8FC5, roughness: 0.9 }));
                    armR.position.set(0.6, 0.2, 0);
                    armR.castShadow = true; armR.receiveShadow = true;
                    group.add(armR);
                    break;
                }
                case 'table': {
                    const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 0.6), matLightWood);
                    top.position.y = 0.7;
                    top.castShadow = true; top.receiveShadow = true;
                    group.add(top);
                    for (let x of [-0.35, 0.35]) {
                        for (let z of [-0.25, 0.25]) {
                            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.65, 6), matWood);
                            leg.position.set(x, 0.325, z);
                            group.add(leg);
                        }
                    }
                    break;
                }
                case 'chair': {
                    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.3), matLightWood);
                    seat.position.y = 0.4;
                    seat.castShadow = true; seat.receiveShadow = true;
                    group.add(seat);
                    for (let x of [-0.12, 0.12]) {
                        for (let z of [-0.12, 0.12]) {
                            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.35, 6), matWood);
                            leg.position.set(x, 0.175, z);
                            group.add(leg);
                        }
                    }
                    const back = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.02), matLightWood);
                    back.position.set(0, 0.55, -0.15);
                    group.add(back);
                    break;
                }
                case 'bed': {
                    const base = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 1.8), matWood);
                    base.position.y = 0.1;
                    base.castShadow = true; base.receiveShadow = true;
                    group.add(base);
                    const mattress = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.15, 1.7), new THREE.MeshStandardMaterial({ color: 0xE8D5B7, roughness: 0.9 }));
                    mattress.position.y = 0.25;
                    mattress.castShadow = true; mattress.receiveShadow = true;
                    group.add(mattress);
                    const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.3), new THREE.MeshStandardMaterial({ color: 0xF5F5F5, roughness: 0.9 }));
                    pillow.position.set(0, 0.35, -0.5);
                    pillow.castShadow = true; pillow.receiveShadow = true;
                    group.add(pillow);
                    break;
                }
                case 'lamp': {
                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 1.2, 8), matMetal);
                    pole.position.y = 0.6;
                    pole.castShadow = true;
                    group.add(pole);
                    const shade = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0xFFE4B5, roughness: 0.8 }));
                    shade.position.y = 1.3;
                    shade.castShadow = true;
                    group.add(shade);
                    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0xFFFF88, emissive: 0xFFFF88, emissiveIntensity: 0.5 }));
                    bulb.position.y = 1.15;
                    group.add(bulb);
                    break;
                }
                default: return null;
            }
            group.position.set(x, 0, z);
            group.rotation.y = angle;
            group.userData = { type: 'furniture', furnitureType: type };
            scene.add(group);
            objects.push(group);
            return group;
        }

        // --- Вспомогательные функции ---

        // Получить точку пересечения с землёй (луч из камеры)
        function getGroundPoint(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const point = new THREE.Vector3();
            const intersect = raycaster.ray.intersectPlane(plane, point);
            if (intersect) {
                return point;
            }
            return null;
        }

        // Получить ближайшую стену для двери/окна
        function getNearestWall(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            // Ищем все стены
            const wallMeshes = objects.filter(o => o.userData.type === 'wall');
            const intersects = raycaster.intersectObjects(wallMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0];
                const wall = hit.object;
                // Найдём точку на поверхности стены и нормаль
                const point = hit.point;
                // Проверим, что точка на грани стены (в пределах)
                const local = wall.worldToLocal(point.clone());
                const halfHeight = 1.25;
                const halfLength = wall.geometry.parameters.height / 2; // т.к. высота = длина
                // Упрощённо: проверим, что попадание в пределах стены
                if (Math.abs(local.y) < halfHeight && Math.abs(local.z) < halfLength) {
                    // Определим угол стены
                    const angle = wall.rotation.y;
                    // Сместим точку наружу
                    const normal = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0,1,0), angle);
                    const offset = normal.clone().multiplyScalar(0.05);
                    const pos = point.clone().add(offset);
                    return { position: pos, angle: angle, wall: wall };
                }
            }
            return null;
        }

        // --- Обработка кликов ---
        renderer.domElement.addEventListener('click', (event) => {
            if (currentMode === 'wall') {
                const point = getGroundPoint(event);
                if (!point) return;
                if (!wallStart) {
                    wallStart = point.clone();
                    // Показать временную точку
                    setStatus('Кликните вторую точку для стены');
                } else {
                    // Создать стену
                    createWall(wallStart.x, wallStart.z, point.x, point.z);
                    wallStart = null;
                    setStatus('Стена создана');
                }
            } else if (currentMode === 'door') {
                const wallInfo = getNearestWall(event);
                if (wallInfo) {
                    createDoor(wallInfo.position.x, wallInfo.position.z, wallInfo.angle);
                    setStatus('Дверь установлена');
                } else {
                    setStatus('Кликните на стену для двери');
                }
            } else if (currentMode === 'window') {
                const wallInfo = getNearestWall(event);
                if (wallInfo) {
                    createWindow(wallInfo.position.x, wallInfo.position.z, wallInfo.angle);
                    setStatus('Окно установлено');
                } else {
                    setStatus('Кликните на стену для окна');
                }
            } else if (currentMode === 'furniture') {
                const point = getGroundPoint(event);
                if (point) {
                    // Небольшое случайное вращение
                    const angle = Math.random() * Math.PI * 0.2 - 0.1;
                    createFurniture(furnitureType, point.x, point.z, angle);
                    setStatus(`Мебель "${furnitureType}" установлена`);
                } else {
                    setStatus('Кликните на землю для мебели');
                }
            } else if (currentMode === 'delete') {
                // Удаление объекта по клику
                const rect = renderer.domElement.getBoundingClientRect();
                const mouse = new THREE.Vector2(
                    ((event.clientX - rect.left) / rect.width) * 2 - 1,
                    -((event.clientY - rect.top) / rect.height) * 2 + 1
                );
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(objects, true);
                if (intersects.length > 0) {
                    // Найдём родительский объект (группу) или сам объект
                    let obj = intersects[0].object;
                    while (obj && !obj.userData.type) {
                        obj = obj.parent;
                    }
                    if (obj && obj.userData.type) {
                        const index = objects.indexOf(obj);
                        if (index !== -1) {
                            scene.remove(obj);
                            objects.splice(index, 1);
                            setStatus('Объект удалён');
                        }
                    } else {
                        setStatus('Не удалось удалить');
                    }
                } else {
                    setStatus('Кликните на объект для удаления');
                }
            }
        });

        // --- Кнопки режимов ---
        document.querySelectorAll('#toolbar button[data-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                if (mode === 'clear') {
                    // Очистить всё
                    if (confirm('Удалить все объекты?')) {
                        objects.forEach(obj => scene.remove(obj));
                        objects.length = 0;
                        wallStart = null;
                        setStatus('Всё очищено');
                    }
                    return;
                }
                // Сброс активного режима
                document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = mode;
                // Показать/скрыть выбор мебели
                document.getElementById('furniture-select').style.display = (mode === 'furniture') ? 'flex' : 'none';
                wallStart = null;
                setStatus(`Режим: ${btn.textContent.trim()}`);
            });
        });

        // --- Выбор мебели ---
        document.querySelectorAll('#furniture-select button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#furniture-select button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                furnitureType = btn.dataset.furniture;
                setStatus(`Выбрана мебель: ${btn.textContent}`);
            });
        });
        // По умолчанию выбрать первую
        document.querySelector('#furniture-select button').classList.add('active');

        // --- Управление временем суток ---
        const timeSlider = document.getElementById('time-slider');
        const timeLabel = document.getElementById('time-label');
        timeSlider.addEventListener('input', () => {
            const val = parseFloat(timeSlider.value);
            // Меняем цвет неба и интенсивность солнца
            const color = new THREE.Color().setHSL(0.58, 0.3, 0.3 + val * 0.5);
            scene.background = color;
            const sunIntensity = 0.3 + val * 1.7;
            sunLight.intensity = sunIntensity;
            // Цвет солнца
            const sunColor = new THREE.Color().setHSL(0.08, 0.8, 0.6 + val * 0.3);
            sunLight.color.copy(sunColor);
            // Дополнительный свет
            interiorLight.intensity = 0.2 + (1 - val) * 0.8;
            const timeOfDay = val < 0.3 ? 'ночь' : (val < 0.6 ? 'утро' : (val < 0.8 ? 'день' : 'вечер'));
            timeLabel.textContent = timeOfDay;
        });
        timeSlider.dispatchEvent(new Event('input'));

        // --- Статус ---
        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        // --- Добавим несколько готовых объектов для демонстрации ---
        // Создадим комнату из стен
        const demoWalls = [
            [-2, -2, 2, -2],
            [2, -2, 2, 2],
            [2, 2, -2, 2],
            [-2, 2, -2, -2]
        ];
        demoWalls.forEach(([x1, z1, x2, z2]) => {
            createWall(x1, z1, x2, z2);
        });
        // Добавим дверь
        createDoor(0, 2.1, 0);
        // Окна
        createWindow(2.1, 0, Math.PI/2);
        createWindow(-2.1, 0, -Math.PI/2);
        // Мебель
        createFurniture('sofa', -0.5, -0.5, 0.2);
        createFurniture('table', 0.5, -1.0, 0);
        createFurniture('chair', 0.8, -1.0, 0);
        createFurniture('bed', -0.5, 1.2, 0.1);
        createFurniture('lamp', 0.5, 1.5, 0);

        setStatus('Дом готов! Стройте дальше.');

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- Адаптация под размер ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Строитель дома запущен!');
    </script>
</body>
</html>
