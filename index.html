<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL 3D ИГРА - СТАТИЧНЫЙ ГИДХАБ</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 10px #00ffcc;
        }
        #info span {
            color: #ff3366;
            font-weight: bold;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 24px;
            z-index: 200;
            text-shadow: 0 0 20px #00ffcc;
        }
    </style>
</head>
<body>
    <div id="loading">SWILL ENGINE v3.0 ЗАГРУЗКА...</div>
    <div id="info">SWILL 3D | <span>WASD</span> — движение | <span>Мышь</span> — осмотр | <span>Shift</span> — бег</div>

    <!-- Подключаем THREE.js с CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ---------------------------------------------------------------
        // SWILL 3D - АБСОЛЮТНЫЙ ТРЁХМЕРНЫЙ ПИЗДЕЦ
        // Дата: 30.06.2026
        // ВСЕ ТЕКСТУРЫ ИЗ ПАПКИ textures
        // ---------------------------------------------------------------
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо голубое (будет заменено текстурой)
        scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

        // Камера
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 5, 15);
        camera.lookAt(0, 0, 0);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0001;
        document.body.appendChild(renderer.domElement);

        // Управление от первого лица
        const controls = new PointerLockControls(camera, renderer.domElement);
        
        // Клик для захвата мыши
        renderer.domElement.addEventListener('click', () => {
            controls.lock();
        });

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 60;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.4);
        scene.add(hemiLight);

        // Загрузка текстур
        const textureLoader = new THREE.TextureLoader();
        const textures = {};

        function loadTextures() {
            return new Promise((resolve) => {
                const textureList = [
                    'stena.jpg', 'stena2.jpg', 'trawa.jpg', 'trawa2.jpg',
                    'zemla.jpg', 'zemla2.jpg', 'dpol.jpg', 'nebo.jpg', 'bereza.png'
                ];
                
                let loaded = 0;
                const total = textureList.length;

                textureList.forEach((name) => {
                    const key = name.split('.')[0];
                    textureLoader.load(
                        `textures/${name}`,
                        (texture) => {
                            textures[key] = texture;
                            loaded++;
                            if (loaded === total) resolve();
                        },
                        undefined,
                        () => {
                            // Если не загрузилось - создаём заглушку
                            console.warn(`SWILL: Не загрузилась ${name}, создаю заглушку`);
                            const canvas = document.createElement('canvas');
                            canvas.width = 256;
                            canvas.height = 256;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = `#${Math.floor(Math.random()*16777215).toString(16)}`;
                            ctx.fillRect(0, 0, 256, 256);
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 5;
                            ctx.strokeRect(0, 0, 256, 256);
                            ctx.fillStyle = '#fff';
                            ctx.font = '24px monospace';
                            ctx.fillText(key, 50, 130);
                            const fakeTexture = new THREE.CanvasTexture(canvas);
                            textures[key] = fakeTexture;
                            loaded++;
                            if (loaded === total) resolve();
                        }
                    );
                });
            });
        }

        // Создание мира
        function createWorld() {
            const group = new THREE.Group();
            
            // Размеры мира
            const worldSize = 30;
            const tileSize = 2;
            const halfWorld = worldSize / 2;

            // Массив для коллизий
            const collisionObjects = [];

            // Генерация карты
            for (let x = -halfWorld; x < halfWorld; x++) {
                for (let z = -halfWorld; z < halfWorld; z++) {
                    // Случайный выбор текстур
                    let textureKey;
                    let isWall = false;
                    let isTree = false;
                    let isFloor = false;

                    // Создаём структуру: стены, пол, траву, деревья
                    const rand = Math.random();
                    
                    // Центральная область - земля с травой
                    if (Math.abs(x) < 8 && Math.abs(z) < 8) {
                        if (Math.abs(x) < 3 && Math.abs(z) < 3) {
                            // Внутренний дворик - деревянный пол
                            textureKey = 'dpol';
                            isFloor = true;
                        } else if ((Math.abs(x) < 4 && Math.abs(z) < 4) && (Math.abs(x) > 2 || Math.abs(z) > 2)) {
                            // Стены вокруг дворика
                            textureKey = Math.random() > 0.5 ? 'stena' : 'stena2';
                            isWall = true;
                        } else {
                            // Земля с травой
                            textureKey = Math.random() > 0.5 ? 'trawa' : 'trawa2';
                        }
                    } else {
                        // Остальная территория - трава и земля
                        textureKey = Math.random() > 0.5 ? 'trawa' : 'trawa2';
                        // Иногда земляные тропинки
                        if (Math.random() < 0.2) {
                            textureKey = Math.random() > 0.5 ? 'zemla' : 'zemla2';
                        }
                    }

                    // Деревья (берёзы) с LOD
                    if (Math.random() < 0.08 && !isWall && !isFloor) {
                        isTree = true;
                        // Создаём берёзу
                        const treeGroup = createTree(x, z);
                        group.add(treeGroup);
                        collisionObjects.push({ x, z, radius: 0.8 });
                    }

                    // Создаём пол
                    const geometry = new THREE.BoxGeometry(tileSize, 0.2, tileSize);
                    const material = new THREE.MeshStandardMaterial({
                        map: textures[textureKey] || textures['trawa'],
                        roughness: 0.8,
                        metalness: 0.1
                    });
                    const tile = new THREE.Mesh(geometry, material);
                    tile.position.set(x, -0.1, z);
                    tile.receiveShadow = true;
                    tile.castShadow = false;
                    group.add(tile);

                    // Если стена - добавляем надстройку
                    if (isWall) {
                        const wallGeom = new THREE.BoxGeometry(tileSize, 2, tileSize);
                        const wallMat = new THREE.MeshStandardMaterial({
                            map: textures[textureKey],
                            roughness: 0.9,
                            metalness: 0.1
                        });
                        const wall = new THREE.Mesh(wallGeom, wallMat);
                        wall.position.set(x, 1, z);
                        wall.castShadow = true;
                        wall.receiveShadow = true;
                        group.add(wall);
                        collisionObjects.push({ x, z, radius: 0.9, height: 2 });
                    }
                }
            }

            // Небо (большой купол с текстурой)
            const skyGeom = new THREE.SphereGeometry(80, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                map: textures['nebo'] || textures['trawa'],
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeom, skyMat);
            sky.position.y = 20;
            group.add(sky);

            return { group, collisionObjects };
        }

        // Создание дерева с LOD
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Ствол (берёза)
            const trunkGeom = new THREE.CylinderGeometry(0.15, 0.2, 2, 8);
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0x8B7355,
                roughness: 0.9
            });
            const trunk = new THREE.Mesh(trunkGeom, trunkMat);
            trunk.position.y = 1;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);

            // Крона - крест-накрест с текстурой берёзы
            const leafMat = new THREE.MeshStandardMaterial({
                map: textures['bereza'],
                transparent: true,
                side: THREE.DoubleSide,
                roughness: 0.7
            });

            // Первый крест
            const leafGeom1 = new THREE.PlaneGeometry(2, 2);
            const leaf1 = new THREE.Mesh(leafGeom1, leafMat);
            leaf1.position.y = 2.5;
            leaf1.rotation.y = 0;
            leaf1.castShadow = true;
            leaf1.receiveShadow = true;
            treeGroup.add(leaf1);

            // Второй крест
            const leafGeom2 = new THREE.PlaneGeometry(2, 2);
            const leaf2 = new THREE.Mesh(leafGeom2, leafMat);
            leaf2.position.y = 2.5;
            leaf2.rotation.y = Math.PI / 2;
            leaf2.castShadow = true;
            leaf2.receiveShadow = true;
            treeGroup.add(leaf2);

            // LOD: при отдалении заменяем на простой спрайт
            // Используем трюк с видимостью в зависимости от расстояния
            treeGroup.userData = {
                distanceCheck: (camPos) => {
                    const dist = camPos.distanceTo(new THREE.Vector3(x, 0, z));
                    // На расстоянии > 15 метров убираем кресты, оставляем просто текстуру на плоскости
                    if (dist > 15) {
                        leaf1.visible = false;
                        leaf2.visible = false;
                    } else {
                        leaf1.visible = true;
                        leaf2.visible = true;
                    }
                }
            };

            treeGroup.position.set(x, 0, z);
            return treeGroup;
        }

        // Проверка коллизий
        function checkCollision(newPos, collisionObjects) {
            const radius = 0.5;
            for (const obj of collisionObjects) {
                const dx = newPos.x - obj.x;
                const dz = newPos.z - obj.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < radius + obj.radius) {
                    return true;
                }
            }
            return false;
        }

        // Основной код
        async function init() {
            // Загружаем текстуры
            document.getElementById('loading').textContent = 'SWILL: ЗАГРУЗКА ТЕКСТУР...';
            await loadTextures();
            
            document.getElementById('loading').textContent = 'SWILL: СОЗДАНИЕ МИРА...';
            
            // Создаём мир
            const { group, collisionObjects } = createWorld();
            scene.add(group);

            // Добавляем игрока (куб для наглядности)
            const playerGeom = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const playerMesh = new THREE.Mesh(playerGeom, playerMat);
            playerMesh.position.set(0, 0.4, 0);
            playerMesh.castShadow = true;
            scene.add(playerMesh);

            // Управление движением
            const keys = {};
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);

            // Скрываем загрузку
            document.getElementById('loading').style.display = 'none';

            // Основной цикл
            function animate() {
                requestAnimationFrame(animate);

                // Движение игрока
                const speed = keys['ShiftLeft'] ? 0.15 : 0.05;
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                direction.y = 0;
                direction.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(direction, new THREE.Vector3(0, 1, 0)).normalize();

                const newPos = playerMesh.position.clone();

                if (keys['KeyW']) newPos.add(direction.clone().multiplyScalar(speed));
                if (keys['KeyS']) newPos.sub(direction.clone().multiplyScalar(speed));
                if (keys['KeyA']) newPos.sub(right.clone().multiplyScalar(speed));
                if (keys['KeyD']) newPos.add(right.clone().multiplyScalar(speed));

                // Коллизия
                if (!checkCollision(newPos, collisionObjects)) {
                    playerMesh.position.copy(newPos);
                    camera.position.copy(newPos.clone().add(new THREE.Vector3(0, 2, 0)));
                }

                // Обновление LOD для деревьев
                group.children.forEach(child => {
                    if (child.userData && child.userData.distanceCheck) {
                        child.userData.distanceCheck(camera.position);
                    }
                });

                renderer.render(scene, camera);
            }

            animate();

            // Обработка изменения размера окна
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Запуск
        init().catch(err => {
            console.error('SWILL ОШИБКА:', err);
            document.getElementById('loading').textContent = 'SWILL: ОШИБКА! СМОТРИ КОНСОЛЬ';
        });

    </script>
</body>
</html>
