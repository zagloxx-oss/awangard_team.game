<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поляна с домиком – игра</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            font-size: 14px;
            z-index: 100;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">🌳 Поляна с домиком</div>
    <div id="controls-hint">WASD – ходьба | Мышь – вращение камеры | Колёсико – зум</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ---------- Инициализация ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 60); // лёгкий туман для атмосферы

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ---------- Управление камерой (будет привязано к персонажу) ----------
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 15;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.update();

        // ---------- Освещение ----------
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
        sunLight.position.set(10, 15, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 15;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 30;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-5, 0, -10);
        scene.add(fillLight);

        // ---------- Загрузчик текстур ----------
        const loader = new THREE.TextureLoader();
        const texPath = 'textures/';

        const textures = {};
        const textureNames = [
            'stena', 'stena2', 'trawa', 'trawa2',
            'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'
        ];
        textureNames.forEach(name => {
            const ext = (name === 'bereza') ? 'png' : 'jpg';
            textures[name] = loader.load(`${texPath}${name}.${ext}`);
        });

        // ---------- Небо ----------
        const skyGeo = new THREE.SphereGeometry(80, 32, 32);
        const skyMat = new THREE.MeshBasicMaterial({ map: textures.nebo, side: THREE.BackSide });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        scene.add(sky);

        // ---------- Земля (поляна) ----------
        const groundMat = new THREE.MeshStandardMaterial({
            map: textures.trawa,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // Тропинка (несколько прямоугольников)
        function createPathPiece(x, z, w, h) {
            const mat = new THREE.MeshStandardMaterial({ map: textures.zemla, roughness: 0.9 });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x, 0.0, z);
            mesh.receiveShadow = true;
            return mesh;
        }
        const pathPositions = [
            [0, 0, 1.2, 0.8], [0, 1.5, 1.2, 0.8], [0, 3.0, 1.2, 0.8], [0, 4.5, 1.2, 0.8],
            [-1.5, -1.0, 1.0, 1.0], [1.5, -1.0, 1.0, 1.0]
        ];
        pathPositions.forEach(([x, z, w, h]) => scene.add(createPathPiece(x, z, w, h)));

        // ---------- Дом (улучшенный) ----------
        const houseGroup = new THREE.Group();

        const wallW = 3.0;
        const wallD = 4.0;
        const wallH = 2.5;
        const roofOverhang = 0.4;
        const roofHeight = 1.2;

        // Пол
        const floorMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.7 });
        const floor = new THREE.Mesh(new THREE.BoxGeometry(wallW, 0.1, wallD), floorMat);
        floor.position.y = 0.05;
        floor.receiveShadow = true;
        floor.castShadow = true;
        houseGroup.add(floor);

        // Стены
        const wallMat1 = new THREE.MeshStandardMaterial({ map: textures.stena, roughness: 0.6 });
        const wallMat2 = new THREE.MeshStandardMaterial({ map: textures.stena2, roughness: 0.6 });

        // Функция создания стены
        function addWall(w, h, d, x, y, z, mat, rotY = 0) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.rotation.y = rotY;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            houseGroup.add(mesh);
            return mesh;
        }

        // Передняя стена (Z+), с дверью и окнами – делаем её отдельно, чтобы вырезать проёмы?
        // Проще: сделаем сплошные стены, а дверь и окна наложим поверх как отдельные объекты.
        addWall(wallW, wallH, 0.1, 0, wallH/2, wallD/2, wallMat1);
        addWall(wallW, wallH, 0.1, 0, wallH/2, -wallD/2, wallMat2);
        addWall(0.1, wallH, wallD, -wallW/2, wallH/2, 0, wallMat2);
        addWall(0.1, wallH, wallD, wallW/2, wallH/2, 0, wallMat1);

        // --- Дверь (на передней стене) ---
        const doorMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8 });
        const door = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 1.8), doorMat);
        door.position.set(0, 0.9, wallD/2 + 0.01);
        houseGroup.add(door);
        // Ручка
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), handleMat);
        handle.position.set(0.25, 0.9, wallD/2 + 0.05);
        houseGroup.add(handle);

        // --- Окна (два на передней стене, по бокам от двери) ---
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.6,
            roughness: 0.1,
            metalness: 0.3
        });
        const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });

        function createWindow(x, y, z, rotY = 0) {
            const group = new THREE.Group();
            // Стекло
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.8), glassMat);
            glass.position.set(0, 0, 0.01);
            group.add(glass);
            // Рама (четыре палочки)
            const barH = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            barH.position.set(0, 0.4, 0);
            group.add(barH);
            const barH2 = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            barH2.position.set(0, -0.4, 0);
            group.add(barH2);
            const barV = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            barV.position.set(0.3, 0, 0);
            group.add(barV);
            const barV2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            barV2.position.set(-0.3, 0, 0);
            group.add(barV2);
            // Внешняя рамка
            const border = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.85, 0.05), frameMat);
            border.position.set(0, 0, -0.01);
            group.add(border);

            group.position.set(x, y, z);
            group.rotation.y = rotY;
            return group;
        }

        houseGroup.add(createWindow(-0.9, 1.6, wallD/2 + 0.01, 0));
        houseGroup.add(createWindow(0.9, 1.6, wallD/2 + 0.01, 0));
        // Окна на боковых стенах (по одному)
        houseGroup.add(createWindow(-wallW/2 - 0.01, 1.6, 0.8, Math.PI/2));
        houseGroup.add(createWindow(wallW/2 + 0.01, 1.6, -0.8, -Math.PI/2));

        // --- Крыша (правильная двускатная) ---
        const roofMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8, side: THREE.DoubleSide });

        // Скаты – два прямоугольника, наклонённых
        const roofLength = wallD + roofOverhang * 2;
        const roofWidth = wallW + roofOverhang * 2;
        const slopeLen = Math.sqrt((roofLength/2)**2 + roofHeight**2);

        // Скат 1 (передний, Z+)
        const slopeGeo = new THREE.PlaneGeometry(roofWidth, slopeLen);
        const slope1 = new THREE.Mesh(slopeGeo, roofMat);
        const angle = Math.atan2(roofHeight, roofLength/2);
        slope1.rotation.x = -angle;
        slope1.position.set(0, wallH, wallD/2 + roofOverhang/2);
        slope1.castShadow = true;
        slope1.receiveShadow = true;
        houseGroup.add(slope1);

        // Скат 2 (задний, Z-)
        const slope2 = new THREE.Mesh(slopeGeo, roofMat);
        slope2.rotation.x = angle;
        slope2.position.set(0, wallH, -wallD/2 - roofOverhang/2);
        slope2.castShadow = true;
        slope2.receiveShadow = true;
        houseGroup.add(slope2);

        // Фронтоны (треугольные стенки)
        const triShape = new THREE.Shape();
        triShape.moveTo(-roofWidth/2, 0);
        triShape.lineTo(0, roofHeight);
        triShape.lineTo(roofWidth/2, 0);
        triShape.lineTo(-roofWidth/2, 0);
        const triGeo = new THREE.ShapeGeometry(triShape);
        const triMat = new THREE.MeshStandardMaterial({ map: textures.stena2, side: THREE.DoubleSide });
        const fronton1 = new THREE.Mesh(triGeo, triMat);
        fronton1.position.set(0, wallH, wallD/2 + roofOverhang/2 + 0.01);
        fronton1.castShadow = true;
        fronton1.receiveShadow = true;
        houseGroup.add(fronton1);

        const fronton2 = new THREE.Mesh(triGeo, triMat);
        fronton2.position.set(0, wallH, -wallD/2 - roofOverhang/2 - 0.01);
        fronton2.rotation.y = Math.PI;
        fronton2.castShadow = true;
        fronton2.receiveShadow = true;
        houseGroup.add(fronton2);

        // Конёк (брусок)
        const ridgeMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 });
        const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, roofLength), ridgeMat);
        ridge.position.set(0, wallH + roofHeight, 0);
        ridge.castShadow = true;
        houseGroup.add(ridge);

        // Добавляем дом в сцену
        houseGroup.position.set(0, 0, 0);
        scene.add(houseGroup);

        // ---------- Берёзы (с LOD, подняты над землёй) ----------
        function createBirch() {
            const lod = new THREE.LOD();
            const map = textures.bereza;
            map.alphaTest = 0.5;

            const spriteMat = new THREE.SpriteMaterial({
                map: map,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                sizeAttenuation: true
            });

            // Высота дерева ~3.0, поднимаем на половину (1.5), чтобы стояло на земле
            const treeHeight = 3.0;
            const halfHeight = treeHeight / 2;

            // Уровень high (крест-накрест)
            const groupHigh = new THREE.Group();
            const s1 = new THREE.Sprite(spriteMat);
            s1.scale.set(1.8, treeHeight, 1);
            s1.position.y = halfHeight;
            groupHigh.add(s1);

            const s2 = new THREE.Sprite(spriteMat.clone());
            s2.scale.set(1.8, treeHeight, 1);
            s2.rotation.y = Math.PI / 2;
            s2.position.y = halfHeight;
            groupHigh.add(s2);
            lod.addLevel(groupHigh, 0);

            // Уровень low (один спрайт)
            const groupLow = new THREE.Group();
            const sLow = new THREE.Sprite(spriteMat.clone());
            sLow.scale.set(1.8, treeHeight, 1);
            sLow.position.y = halfHeight;
            groupLow.add(sLow);
            lod.addLevel(groupLow, 8);

            return lod;
        }

        const treePositions = [
            [-4, -3], [5, -2], [-5, 4], [6, 5], [-3, -5], [4, -5], [-6, 0], [0, -6]
        ];
        treePositions.forEach(pos => {
            const tree = createBirch();
            tree.position.set(pos[0], 0, pos[1]);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // ---------- Персонаж (игрок) ----------
        const playerGroup = new THREE.Group();

        // Тело
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a6ea5, roughness: 0.4 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 8), bodyMat);
        body.position.y = 0.6;
        body.castShadow = true;
        playerGroup.add(body);

        // Голова
        const headMat = new THREE.MeshStandardMaterial({ color: 0xf5d0b8, roughness: 0.3 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), headMat);
        head.position.y = 1.3;
        head.castShadow = true;
        playerGroup.add(head);

        // Ноги
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.5, 6);
        const legL = new THREE.Mesh(legGeo, legMat);
        legL.position.set(-0.15, 0.25, 0);
        legL.castShadow = true;
        playerGroup.add(legL);
        const legR = new THREE.Mesh(legGeo, legMat);
        legR.position.set(0.15, 0.25, 0);
        legR.castShadow = true;
        playerGroup.add(legR);

        // Руки
        const armMat = new THREE.MeshStandardMaterial({ color: 0x3a6ea5 });
        const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 6);
        const armL = new THREE.Mesh(armGeo, armMat);
        armL.position.set(-0.55, 0.8, 0);
        armL.rotation.z = 0.2;
        armL.castShadow = true;
        playerGroup.add(armL);
        const armR = new THREE.Mesh(armGeo, armMat);
        armR.position.set(0.55, 0.8, 0);
        armR.rotation.z = -0.2;
        armR.castShadow = true;
        playerGroup.add(armR);

        // Ставим игрока на поляну
        playerGroup.position.set(2.5, 0, -2.0);
        playerGroup.rotation.y = -0.5;
        scene.add(playerGroup);

        // ---------- Управление игроком (WASD) ----------
        const keyState = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
            }
        });

        const moveSpeed = 0.08;
        // Ограничим зону ходьбы (чтобы не уйти за край)
        const boundary = 12;

        // ---------- Анимация и обновление ----------
        function animate() {
            requestAnimationFrame(animate);

            // Движение игрока
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerGroup.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(playerGroup.quaternion);
            const moveVec = new THREE.Vector3(0, 0, 0);
            if (keyState.w) moveVec.add(forward);
            if (keyState.s) moveVec.sub(forward);
            if (keyState.a) moveVec.sub(right);
            if (keyState.d) moveVec.add(right);
            if (moveVec.length() > 0) {
                moveVec.normalize().multiplyScalar(moveSpeed);
                const newPos = playerGroup.position.clone().add(moveVec);
                // Ограничение по X и Z (чтобы не упасть с поляны)
                newPos.x = Math.max(-boundary, Math.min(boundary, newPos.x));
                newPos.z = Math.max(-boundary, Math.min(boundary, newPos.z));
                playerGroup.position.copy(newPos);
                // Поворачиваем игрока в сторону движения (плавно)
                const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                let currentAngle = playerGroup.rotation.y;
                let diff = targetAngle - currentAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                playerGroup.rotation.y += diff * 0.1;
            }

            // Обновляем цель камеры (следим за игроком)
            controls.target.copy(playerGroup.position).add(new THREE.Vector3(0, 1.2, 0));
            controls.update();

            renderer.render(scene, camera);
        }

        animate();

        // ---------- Ресайз ----------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Игра загружена! Управляйте персонажем WASD.');
    </script>
</body>
</html>
