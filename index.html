<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL 3D СТАБИЛЬНЫЙ ПИЗДЕЦ</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 10px #00ffcc;
        }
        #info span {
            color: #ff3366;
            font-weight: bold;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 24px;
            z-index: 200;
            text-shadow: 0 0 20px #00ffcc;
        }
    </style>
</head>
<body>
    <div id="loading">SWILL STABLE ENGINE ЗАГРУЗКА...</div>
    <div id="info">SWILL СТАБИЛЬНЫЙ | <span>WASD</span> — движение | <span>Мышь</span> — осмотр | <span>Shift</span> — бег</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ---------------------------------------------------------------
        // SWILL СТАБИЛЬНЫЙ - БЕЗ ДРОЖАНИЯ И БЕЗ ПАЛОК
        // ---------------------------------------------------------------
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // Инициализация
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 5, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Управление
        const controls = new PointerLockControls(camera, renderer.domElement);
        renderer.domElement.addEventListener('click', () => controls.lock());

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(30, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 80;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        scene.add(dirLight);

        // Загрузка текстур
        const textureLoader = new THREE.TextureLoader();
        const textures = {};
        
        // ВСЕ ТЕКСТУРЫ НАХУЙ
        const textureNames = ['stena', 'stena2', 'trawa', 'trawa2', 'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'];
        
        function loadAllTextures() {
            return new Promise((resolve) => {
                let loaded = 0;
                const total = textureNames.length;
                
                textureNames.forEach(name => {
                    const ext = name === 'bereza' ? 'png' : 'jpg';
                    textureLoader.load(
                        `textures/${name}.${ext}`,
                        (texture) => {
                            textures[name] = texture;
                            loaded++;
                            if (loaded === total) resolve();
                        },
                        undefined,
                        () => {
                            // Заглушка
                            console.warn(`SWILL: ${name} не загрузилась`);
                            const canvas = document.createElement('canvas');
                            canvas.width = 256;
                            canvas.height = 256;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
                            ctx.fillRect(0, 0, 256, 256);
                            ctx.fillStyle = '#fff';
                            ctx.font = '30px monospace';
                            ctx.textAlign = 'center';
                            ctx.fillText(name, 128, 128);
                            textures[name] = new THREE.CanvasTexture(canvas);
                            loaded++;
                            if (loaded === total) resolve();
                        }
                    );
                });
            });
        }

        // Создание мира СТАБИЛЬНОГО
        function createStableWorld() {
            const group = new THREE.Group();
            const worldSize = 40;
            const tileSize = 2;
            const halfWorld = worldSize / 2;
            
            const collisionObjects = [];

            // Генерация карты
            for (let x = -halfWorld; x < halfWorld; x += tileSize) {
                for (let z = -halfWorld; z < halfWorld; z += tileSize) {
                    let textureKey = 'trawa'; // По умолчанию трава
                    let isWall = false;
                    
                    // Рандомные структуры
                    const rand = Math.random();
                    
                    // Создаём стены в центре
                    if (Math.abs(x) < 6 && Math.abs(z) < 6) {
                        if (Math.abs(x) < 3 && Math.abs(z) < 3) {
                            // Внутренний дворик - пол
                            textureKey = 'dpol';
                        } else if ((Math.abs(x) < 4.5 && Math.abs(z) < 4.5) && (Math.abs(x) > 2.5 || Math.abs(z) > 2.5)) {
                            textureKey = Math.random() > 0.5 ? 'stena' : 'stena2';
                            isWall = true;
                        } else {
                            textureKey = Math.random() > 0.5 ? 'trawa' : 'trawa2';
                        }
                    } else if (Math.abs(x) < 10 && Math.abs(z) < 10) {
                        // Земляные тропинки вокруг
                        textureKey = Math.random() > 0.5 ? 'zemla' : 'zemla2';
                    } else {
                        // Остальное - трава
                        textureKey = Math.random() > 0.5 ? 'trawa' : 'trawa2';
                    }

                    // СОЗДАЁМ ТОЛЬКО ПЛОСКИЕ ТЕКСТУРКИ НА ЗЕМЛЕ
                    const geometry = new THREE.PlaneGeometry(tileSize - 0.05, tileSize - 0.05);
                    const material = new THREE.MeshStandardMaterial({
                        map: textures[textureKey] || textures['trawa'],
                        roughness: 0.8,
                        metalness: 0.1,
                        side: THREE.DoubleSide
                    });
                    
                    const tile = new THREE.Mesh(geometry, material);
                    tile.rotation.x = -Math.PI / 2; // Кладём на землю
                    tile.position.set(x, 0.01, z); // Чуть выше, чтобы не пересекалось
                    tile.receiveShadow = true;
                    tile.castShadow = false;
                    group.add(tile);

                    // Коллизия для стен (но не для текстур!)
                    if (isWall) {
                        // Добавляем коллизию, но без видимой стены
                        collisionObjects.push({ 
                            x: x, 
                            z: z, 
                            radius: 0.9,
                            isWall: true 
                        });
                    }

                    // БЕРЁЗЫ - только коллизия без палок
                    if (rand < 0.05 && !isWall && Math.abs(x) > 6 && Math.abs(z) > 6) {
                        collisionObjects.push({
                            x: x,
                            z: z,
                            radius: 0.7,
                            isTree: true
                        });
                        
                        // Оставляем просто текстуру берёзы на земле (как листья)
                        if (textures['bereza']) {
                            const leafGeom = new THREE.PlaneGeometry(1.5, 1.5);
                            const leafMat = new THREE.MeshStandardMaterial({
                                map: textures['bereza'],
                                transparent: true,
                                side: THREE.DoubleSide,
                                roughness: 0.8
                            });
                            const leaf = new THREE.Mesh(leafGeom, leafMat);
                            leaf.rotation.x = -Math.PI / 2;
                            leaf.position.set(x, 0.02, z);
                            leaf.receiveShadow = true;
                            group.add(leaf);
                        }
                    }
                }
            }

            // НЕБО - большой купол
            const skyGeom = new THREE.SphereGeometry(70, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                map: textures['nebo'] || textures['trawa'],
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeom, skyMat);
            sky.position.y = 15;
            group.add(sky);

            return { group, collisionObjects };
        }

        // Проверка коллизий
        function checkCollision(newPos, collisionObjects) {
            const radius = 0.5;
            for (const obj of collisionObjects) {
                const dx = newPos.x - obj.x;
                const dz = newPos.z - obj.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < radius + obj.radius) {
                    return true;
                }
            }
            return false;
        }

        // Запуск игры
        async function init() {
            document.getElementById('loading').textContent = 'SWILL: ЗАГРУЗКА ТЕКСТУР...';
            await loadAllTextures();
            
            document.getElementById('loading').textContent = 'SWILL: СОЗДАНИЕ МИРА...';
            
            const { group, collisionObjects } = createStableWorld();
            scene.add(group);

            // Игрок
            const playerGeom = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
            const player = new THREE.Mesh(playerGeom, playerMat);
            player.position.set(0, 0.3, 0);
            player.castShadow = true;
            scene.add(player);

            // Управление
            const keys = {};
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);

            document.getElementById('loading').style.display = 'none';

            // Игровой цикл
            function animate() {
                requestAnimationFrame(animate);

                // Движение
                const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? 0.12 : 0.04;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0;
                dir.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();

                const newPos = player.position.clone();

                if (keys['KeyW']) newPos.add(dir.clone().multiplyScalar(speed));
                if (keys['KeyS']) newPos.sub(dir.clone().multiplyScalar(speed));
                if (keys['KeyA']) newPos.sub(right.clone().multiplyScalar(speed));
                if (keys['KeyD']) newPos.add(right.clone().multiplyScalar(speed));

                // Коллизия
                if (!checkCollision(newPos, collisionObjects)) {
                    player.position.copy(newPos);
                    camera.position.copy(newPos.clone().add(new THREE.Vector3(0, 2, 0)));
                }

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        init().catch(err => {
            console.error('SWILL ОШИБКА:', err);
            document.getElementById('loading').textContent = 'SWILL: ОШИБКА!';
        });

    </script>
</body>
</html>
