<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор миров</title>
    <style>
        /* Стили редактора */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* Панель инструментов */
        #toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        #toolbar button {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #ddd;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        #toolbar button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #toolbar button.active {
            background: #4a9eff;
            color: #fff;
            border-color: #4a9eff;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }
        #toolbar button.danger {
            background: rgba(255, 70, 70, 0.3);
        }
        #toolbar button.danger:hover {
            background: rgba(255, 70, 70, 0.6);
        }
        #toolbar .separator {
            width: 1px;
            background: rgba(255,255,255,0.15);
            margin: 0 4px;
        }
        /* Панель свойств */
        #properties {
            position: absolute;
            right: 20px;
            top: 80px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(8px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 220px;
            z-index: 10;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: auto;
            color: #ccc;
        }
        #properties h3 {
            margin: 0 0 12px 0;
            font-size: 16px;
            color: #fff;
        }
        #properties label {
            display: block;
            font-size: 13px;
            margin: 8px 0 4px;
        }
        #properties input[type="color"],
        #properties input[type="number"],
        #properties input[type="checkbox"] {
            width: 100%;
            padding: 4px 8px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
        }
        #properties input[type="color"] {
            height: 36px;
            padding: 2px;
        }
        #properties input[type="checkbox"] {
            width: auto;
            margin-top: 6px;
        }
        #properties .row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #properties .row label {
            margin: 0;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            color: #fff;
            backdrop-filter: blur(4px);
            z-index: 10;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        #brush-settings {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.85);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 16px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            font-size: 13px;
            color: #ddd;
            pointer-events: auto;
        }
        #brush-settings input[type="range"] {
            width: 100px;
            accent-color: #4a9eff;
        }
        #brush-settings label {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #texture-select {
            display: none;
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 30px;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }
        #texture-select button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #eee;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        #texture-select button:hover {
            background: rgba(255,255,255,0.25);
        }
        #texture-select button.active {
            background: #4a9eff;
        }
        #object-list {
            position: absolute;
            left: 20px;
            top: 80px;
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 180px;
            z-index: 10;
            max-height: 60vh;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #object-list h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #fff;
        }
        #object-list .object-item {
            padding: 4px 8px;
            margin: 2px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #object-list .object-item:hover {
            background: rgba(255,255,255,0.15);
        }
        #object-list .object-item.selected {
            background: #4a9eff44;
            border-left: 2px solid #4a9eff;
        }
        #object-list .object-item .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 14px;
        }
        #object-list .object-item .delete-btn:hover {
            color: #ff0000;
        }
        /* Кросс-курсор */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.2);
            font-size: 40px;
            pointer-events: none;
            z-index: 5;
            font-weight: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        /* Для мобильных */
        @media (max-width: 768px) {
            #toolbar button { font-size: 12px; padding: 6px 12px; }
            #properties { width: 180px; right: 10px; }
            #object-list { width: 150px; left: 10px; }
            #brush-settings { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="crosshair">+</div>
    <div id="canvas-container"></div>

    <!-- Панель инструментов -->
    <div id="toolbar">
        <button data-mode="raise" class="active">⬆️ Поднять</button>
        <button data-mode="lower">⬇️ Опустить</button>
        <button data-mode="smooth">🌀 Сгладить</button>
        <button data-mode="texture">🎨 Текстура</button>
        <div class="separator"></div>
        <button data-mode="add-object">📦 Объект</button>
        <button data-mode="select">🖱️ Выделить</button>
        <button data-mode="delete" class="danger">🗑️ Удалить</button>
        <div class="separator"></div>
        <button id="export-btn" style="background:#4a9eff; color:#fff;">⬇️ Экспорт</button>
        <button id="clear-btn" class="danger">❌ Очистить</button>
    </div>

    <!-- Настройки кисти -->
    <div id="brush-settings">
        <label>
            Радиус
            <input type="range" id="brush-radius" min="0.5" max="5" step="0.1" value="2">
            <span id="radius-label">2.0</span>
        </label>
        <label>
            Сила
            <input type="range" id="brush-strength" min="0.1" max="2" step="0.1" value="0.5">
            <span id="strength-label">0.5</span>
        </label>
    </div>

    <!-- Выбор текстуры (для режима текстуры) -->
    <div id="texture-select">
        <button data-texture="grass" class="active">🌿 Трава</button>
        <button data-texture="earth">🟫 Земля</button>
        <button data-texture="stone">🪨 Камень</button>
        <button data-texture="sand">🏖️ Песок</button>
    </div>

    <!-- Панель свойств объекта -->
    <div id="properties">
        <h3>Свойства</h3>
        <div id="prop-content"></div>
    </div>

    <!-- Список объектов -->
    <div id="object-list">
        <h3>Объекты</h3>
        <div id="object-items"></div>
    </div>

    <!-- Статус -->
    <div id="status">Выберите режим</div>

    <!-- Импорт Three.js и др. -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- Импорт -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ----- Константы -----
        const TERRAIN_SIZE = 20;
        const SEGMENTS = 32; // 32x32 = 1024 вершин
        const HEIGHT_SCALE = 3;

        // ----- Переменные состояния -----
        let currentMode = 'raise';
        let selectedObject = null;
        let objectIdCounter = 0;
        const objects = []; // массив объектов с метаданными { mesh, id, type, collision, color, position, rotation, scale }

        // ----- Сцена, камера, рендер -----
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 50);

        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(10, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // ----- Управление камерой в редакторе (OrbitControls) -----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 3;
        controls.maxDistance = 30;
        controls.update();

        // ----- Освещение -----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(10, 15, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 40;
        sun.shadow.camera.left = -15;
        sun.shadow.camera.right = 15;
        sun.shadow.camera.top = 15;
        sun.shadow.camera.bottom = -15;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-5, 0, -10);
        scene.add(fill);

        // ----- Создание ландшафта -----
        // Используем PlaneGeometry с сегментами, будем менять вершины
        const geometry = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, SEGMENTS, SEGMENTS);
        geometry.rotateX(-Math.PI / 2);
        const positionAttribute = geometry.attributes.position;
        const vertexCount = positionAttribute.count;

        // Сохраняем исходные x,z (они не изменятся)
        const origX = new Float32Array(vertexCount);
        const origZ = new Float32Array(vertexCount);
        for (let i = 0; i < vertexCount; i++) {
            origX[i] = positionAttribute.getX(i);
            origZ[i] = positionAttribute.getZ(i);
        }

        // Массив высот (для быстрого доступа)
        const heights = new Float32Array(vertexCount);
        // Инициализируем нулями
        for (let i = 0; i < vertexCount; i++) {
            heights[i] = 0;
        }

        // Функция обновления геометрии по массиву высот
        function updateTerrain() {
            for (let i = 0; i < vertexCount; i++) {
                positionAttribute.setY(i, heights[i]);
            }
            positionAttribute.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        // Материал ландшафта (пока с одной текстурой)
        const textureLoader = new THREE.TextureLoader();
        let grassTex = null;
        try {
            grassTex = textureLoader.load('textures/trawa.jpg');
        } catch (e) {}

        const terrainMat = new THREE.MeshStandardMaterial({
            map: grassTex,
            color: grassTex ? 0xffffff : 0x6da56a,
            roughness: 0.8,
            metalness: 0.0,
            side: THREE.DoubleSide,
        });
        const terrain = new THREE.Mesh(geometry, terrainMat);
        terrain.receiveShadow = true;
        terrain.castShadow = true;
        terrain.position.y = 0;
        scene.add(terrain);

        // Сетка для удобства
        const gridHelper = new THREE.GridHelper(TERRAIN_SIZE, 20, 0x88aa88, 0x446644);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // ----- Функции для работы с вершинами -----

        // Найти ближайшую вершину к точке (x, z)
        function getClosestVertexIndex(x, z) {
            let minDist = Infinity;
            let idx = -1;
            for (let i = 0; i < vertexCount; i++) {
                const dx = origX[i] - x;
                const dz = origZ[i] - z;
                const dist = dx*dx + dz*dz;
                if (dist < minDist) {
                    minDist = dist;
                    idx = i;
                }
            }
            return idx;
        }

        // Поднять/опустить вершины в радиусе
        function modifyTerrain(x, z, radius, strength, mode) {
            const radiusSq = radius * radius;
            for (let i = 0; i < vertexCount; i++) {
                const dx = origX[i] - x;
                const dz = origZ[i] - z;
                const distSq = dx*dx + dz*dz;
                if (distSq < radiusSq) {
                    const influence = 1 - Math.sqrt(distSq) / radius;
                    const delta = influence * strength;
                    if (mode === 'raise') {
                        heights[i] += delta;
                    } else if (mode === 'lower') {
                        heights[i] -= delta;
                    } else if (mode === 'smooth') {
                        // Усреднение с соседями (упрощённо)
                        // Пока пропустим
                    }
                    // Ограничим высоту
                    heights[i] = Math.max(-HEIGHT_SCALE, Math.min(HEIGHT_SCALE, heights[i]));
                }
            }
            updateTerrain();
        }

        // Сглаживание (усреднение с соседями) - можно реализовать позже
        function smoothTerrain(x, z, radius) {
            // Пока оставим заглушку
        }

        // ----- Функции работы с объектами -----

        function createObject(type, position, color = 0xffaa00, size = 1, collision = true) {
            let mesh;
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.1 });
            if (type === 'box') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
            } else if (type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(size/2, 16, 16), mat);
            } else if (type === 'cylinder') {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(size/2, size/2, size, 12), mat);
            } else {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
            }
            mesh.position.copy(position);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData.isObject = true;
            mesh.userData.id = objectIdCounter++;
            mesh.userData.collision = collision;
            mesh.userData.type = type;
            mesh.userData.size = size;
            mesh.userData.color = color;
            scene.add(mesh);

            const objData = {
                mesh,
                id: mesh.userData.id,
                type,
                collision,
                color,
                position: position.clone(),
                rotation: new THREE.Euler(0,0,0),
                scale: new THREE.Vector3(1,1,1),
                size,
            };
            objects.push(objData);
            updateObjectList();
            return objData;
        }

        function removeObject(objData) {
            scene.remove(objData.mesh);
            const idx = objects.indexOf(objData);
            if (idx !== -1) objects.splice(idx, 1);
            if (selectedObject === objData) {
                selectedObject = null;
                hideProperties();
            }
            updateObjectList();
        }

        function clearAll() {
            objects.forEach(obj => scene.remove(obj.mesh));
            objects.length = 0;
            selectedObject = null;
            hideProperties();
            updateObjectList();
            // Сброс высот
            for (let i = 0; i < vertexCount; i++) heights[i] = 0;
            updateTerrain();
        }

        // ----- UI: список объектов -----
        function updateObjectList() {
            const container = document.getElementById('object-items');
            container.innerHTML = '';
            objects.forEach(obj => {
                const div = document.createElement('div');
                div.className = 'object-item' + (selectedObject === obj ? ' selected' : '');
                div.textContent = `${obj.type} #${obj.id}`;
                const del = document.createElement('button');
                del.className = 'delete-btn';
                del.textContent = '✕';
                del.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeObject(obj);
                });
                div.appendChild(del);
                div.addEventListener('click', () => {
                    selectObject(obj);
                });
                container.appendChild(div);
            });
        }

        // ----- Выделение объекта -----
        function selectObject(objData) {
            if (selectedObject) {
                // убрать выделение
                // можно добавить обводку, но для простоты пока просто подсветка в списке
            }
            selectedObject = objData;
            showProperties(objData);
            updateObjectList();
        }

        // ----- Панель свойств -----
        function showProperties(objData) {
            const panel = document.getElementById('properties');
            panel.style.display = 'block';
            const content = document.getElementById('prop-content');
            content.innerHTML = `
                <label>ID: ${objData.id}</label>
                <label>Тип: ${objData.type}</label>
                <label>Позиция X</label>
                <input type="number" step="0.1" value="${objData.position.x}" data-prop="posX">
                <label>Позиция Y</label>
                <input type="number" step="0.1" value="${objData.position.y}" data-prop="posY">
                <label>Позиция Z</label>
                <input type="number" step="0.1" value="${objData.position.z}" data-prop="posZ">
                <label>Размер</label>
                <input type="number" step="0.1" value="${objData.size}" data-prop="size">
                <label>Цвет</label>
                <input type="color" value="#${objData.color.toString(16).padStart(6,'0')}" data-prop="color">
                <label style="display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" ${objData.collision ? 'checked' : ''} data-prop="collision">
                    Коллизия
                </label>
                <button id="apply-prop-btn" style="margin-top:12px;background:#4a9eff;border:none;color:#fff;padding:6px;border-radius:6px;cursor:pointer;">Применить</button>
            `;
            // Применить изменения
            document.getElementById('apply-prop-btn').addEventListener('click', () => {
                const inputs = content.querySelectorAll('[data-prop]');
                const newData = {};
                inputs.forEach(inp => {
                    const prop = inp.dataset.prop;
                    if (prop === 'color') newData[prop] = inp.value;
                    else if (prop === 'collision') newData[prop] = inp.checked;
                    else newData[prop] = parseFloat(inp.value);
                });
                // Обновить объект
                objData.position.set(newData.posX || 0, newData.posY || 0, newData.posZ || 0);
                objData.mesh.position.copy(objData.position);
                objData.size = newData.size || 1;
                objData.color = newData.color;
                objData.collision = newData.collision;
                objData.mesh.material.color.set(newData.color);
                // Масштабируем меш
                objData.mesh.scale.set(newData.size, newData.size, newData.size);
                // Обновить данные
                updateObjectList();
                // Обновить свойства
                showProperties(objData);
            });
        }

        function hideProperties() {
            document.getElementById('properties').style.display = 'none';
        }

        // ----- Экспорт в HTML-игру -----
        function exportGame() {
            // Собираем данные
            const terrainData = {
                size: TERRAIN_SIZE,
                segments: SEGMENTS,
                heights: Array.from(heights),
                origX: Array.from(origX),
                origZ: Array.from(origZ),
            };
            const objectsData = objects.map(obj => ({
                type: obj.type,
                position: [obj.position.x, obj.position.y, obj.position.z],
                rotation: [obj.rotation.x, obj.rotation.y, obj.rotation.z],
                scale: [obj.scale.x, obj.scale.y, obj.scale.z],
                color: obj.color,
                size: obj.size,
                collision: obj.collision,
            }));

            // Генерируем HTML
            const htmlContent = generateGameHTML(terrainData, objectsData);
            // Скачиваем
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_world.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateGameHTML(terrainData, objectsData) {
            // Встраиваем Three.js и Cannon-es из CDN
            return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мой мир</title>
    <style>
        body { margin:0; overflow:hidden; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,0.3); font-size:30px; pointer-events:none; z-index:5; }
        #info { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:6px 16px; border-radius:20px; font-size:14px; z-index:10; pointer-events:none; }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="info">WASD — ходьба | Мышь — осмотр | Пробел — прыжок</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    <\/script>
    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        // Импортируем Cannon-es для физики
        import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

        // Данные из редактора
        const terrainData = ${JSON.stringify(terrainData)};
        const objectsData = ${JSON.stringify(objectsData)};

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 50);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Управление от первого лица
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        // Освещение
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(10, 15, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 40;
        sun.shadow.camera.left = -15;
        sun.shadow.camera.right = 15;
        sun.shadow.camera.top = 15;
        sun.shadow.camera.bottom = -15;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-5, 0, -10);
        scene.add(fill);

        // Ландшафт
        const geo = new THREE.PlaneGeometry(terrainData.size, terrainData.size, terrainData.segments, terrainData.segments);
        geo.rotateX(-Math.PI/2);
        const pos = geo.attributes.position;
        for (let i=0; i<pos.count; i++) {
            pos.setX(i, terrainData.origX[i]);
            pos.setZ(i, terrainData.origZ[i]);
            pos.setY(i, terrainData.heights[i]);
        }
        pos.needsUpdate = true;
        geo.computeVertexNormals();

        // Текстура (пока одна)
        const textureLoader = new THREE.TextureLoader();
        let grassTex = null;
        try { grassTex = textureLoader.load('textures/trawa.jpg'); } catch(e) {}
        const mat = new THREE.MeshStandardMaterial({
            map: grassTex || null,
            color: grassTex ? 0xffffff : 0x6da56a,
            roughness: 0.8,
            metalness: 0.0,
            side: THREE.DoubleSide,
        });
        const terrain = new THREE.Mesh(geo, mat);
        terrain.receiveShadow = true;
        terrain.castShadow = true;
        scene.add(terrain);

        // Сетка для ориентира
        const grid = new THREE.GridHelper(terrainData.size, 20, 0x88aa88, 0x446644);
        grid.position.y = 0.01;
        scene.add(grid);

        // Объекты
        objectsData.forEach(objData => {
            const color = objData.color || 0xffaa00;
            const matObj = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.1 });
            let mesh;
            const size = objData.size || 1;
            if (objData.type === 'box') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), matObj);
            } else if (objData.type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(size/2, 16, 16), matObj);
            } else if (objData.type === 'cylinder') {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(size/2, size/2, size, 12), matObj);
            } else {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), matObj);
            }
            mesh.position.set(objData.position[0], objData.position[1], objData.position[2]);
            mesh.rotation.set(objData.rotation[0], objData.rotation[1], objData.rotation[2]);
            mesh.scale.set(objData.scale[0], objData.scale[1], objData.scale[2]);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        });

        // Физика (Cannon-es)
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.defaultContactMaterial.friction = 0.4;

        // Материалы для физики
        const groundMaterial = new CANNON.Material('ground');
        const playerMaterial = new CANNON.Material('player');
        const contactMat = new CANNON.ContactMaterial(groundMaterial, playerMaterial, {
            friction: 0.3,
            restitution: 0.0,
        });
        world.addContactMaterial(contactMat);

        // Пол (физический)
        const groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
        // Для простоты создадим тримеш из вершин ландшафта, но это сложно. Используем плоскость
        // Вместо тримеша сделаем статический меш, но для простоты создадим плоскость на уровне 0.
        // Но рельеф будет нефизичным. Для полноты нужно построить тримеш. Пока пропустим.
        // Создадим тримеш из ландшафта (Cannon.Trimesh)
        const vertices = [];
        const indices = [];
        const posAttr = geo.attributes.position;
        const indexAttr = geo.index;
        for (let i=0; i<posAttr.count; i++) {
            vertices.push(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
        }
        if (indexAttr) {
            for (let i=0; i<indexAttr.count; i++) {
                indices.push(indexAttr.getX(i));
            }
        } else {
            // треугольники по порядку
            for (let i=0; i<posAttr.count; i+=3) {
                indices.push(i, i+1, i+2);
            }
        }
        const trimesh = new CANNON.Trimesh(vertices, indices);
        const groundBodyTrimesh = new CANNON.Body({ mass: 0, material: groundMaterial });
        groundBodyTrimesh.addShape(trimesh);
        world.addBody(groundBodyTrimesh);

        // Игрок (сфера или капсула)
        const playerBody = new CANNON.Body({ mass: 70, material: playerMaterial });
        const playerShape = new CANNON.Sphere(0.4);
        playerBody.addShape(playerShape);
        playerBody.position.set(0, 2, 0);
        world.addBody(playerBody);

        // Привязка камеры к игроку
        const playerHeight = 1.7;
        const tempQuat = new THREE.Quaternion();

        // Клавиши
        const keys = { w: false, a: false, s: false, d: false, space: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
                case 'Space': keys.space = true; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
                case 'Space': keys.space = false; e.preventDefault(); break;
            }
        });

        // Цикл анимации
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);

            // Управление игроком
            if (controls.isLocked) {
                // Вектор направления от камеры (в горизонтальной плоскости)
                const forward = new THREE.Vector3(0, 0, -1);
                const right = new THREE.Vector3(1, 0, 0);
                forward.applyQuaternion(camera.quaternion);
                right.applyQuaternion(camera.quaternion);
                forward.y = 0;
                right.y = 0;
                forward.normalize();
                right.normalize();

                const moveVec = new THREE.Vector3(0, 0, 0);
                if (keys.w) moveVec.add(forward);
                if (keys.s) moveVec.sub(forward);
                if (keys.a) moveVec.sub(right);
                if (keys.d) moveVec.add(right);
                if (moveVec.length() > 0) {
                    moveVec.normalize().multiplyScalar(5);
                    playerBody.velocity.x = moveVec.x;
                    playerBody.velocity.z = moveVec.z;
                } else {
                    playerBody.velocity.x *= 0.9;
                    playerBody.velocity.z *= 0.9;
                }

                // Прыжок
                if (keys.space && Math.abs(playerBody.velocity.y) < 0.01) {
                    playerBody.velocity.y = 5;
                }
            }

            // Физика
            world.step(1/60, delta, 3);

            // Синхронизация камеры с игроком
            camera.position.copy(playerBody.position);
            camera.position.y += playerHeight;

            renderer.render(scene, camera);
        }

        animate();

        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Мир загружен!');
    <\/script>
</body>
</html>`;
        }

        // ----- Обработка кликов в редакторе -----
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            // Ищем пересечение с ландшафтом и объектами
            const intersects = raycaster.intersectObjects([terrain, ...objects.map(o => o.mesh)]);
            if (intersects.length > 0) {
                return intersects[0];
            }
            return null;
        }

        function getTerrainIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(terrain);
            if (intersects.length > 0) {
                return intersects[0];
            }
            return null;
        }

        // Обработчик кликов на сцене
        renderer.domElement.addEventListener('click', (event) => {
            if (currentMode === 'raise' || currentMode === 'lower' || currentMode === 'smooth') {
                const hit = getTerrainIntersection(event);
                if (hit) {
                    const point = hit.point;
                    const radius = parseFloat(document.getElementById('brush-radius').value);
                    const strength = parseFloat(document.getElementById('brush-strength').value);
                    modifyTerrain(point.x, point.z, radius, strength, currentMode);
                }
            } else if (currentMode === 'texture') {
                // Пока просто меняем цвет ландшафта для демонстрации
                // В будущем можно реализовать рисование текстур через вершинные цвета
                // Сейчас просто меняем цвет всей планеты
                const colorMap = {
                    grass: 0x6da56a,
                    earth: 0x8B5A2B,
                    stone: 0x808080,
                    sand: 0xc2b280,
                };
                const activeBtn = document.querySelector('#texture-select .active');
                if (activeBtn) {
                    const tex = activeBtn.dataset.texture;
                    const color = colorMap[tex] || 0x6da56a;
                    terrainMat.color.setHex(color);
                    setStatus(`Текстура: ${tex}`);
                }
            } else if (currentMode === 'add-object') {
                const hit = getTerrainIntersection(event);
                if (hit) {
                    const point = hit.point;
                    // Добавляем куб
                    const color = 0xffaa00;
                    const size = 0.8;
                    const obj = createObject('box', point.clone(), color, size, true);
                    selectObject(obj);
                    setStatus('Объект добавлен');
                }
            } else if (currentMode === 'select') {
                const hit = getIntersection(event);
                if (hit) {
                    let obj = hit.object;
                    // Проверяем, является ли объект нашим объектом
                    if (obj.userData.isObject) {
                        const objData = objects.find(o => o.id === obj.userData.id);
                        if (objData) {
                            selectObject(objData);
                            setStatus(`Выделен объект #${objData.id}`);
                        }
                    } else {
                        // Если клик на ландшафт, снимаем выделение
                        selectedObject = null;
                        hideProperties();
                        updateObjectList();
                        setStatus('Выделение снято');
                    }
                }
            } else if (currentMode === 'delete') {
                const hit = getIntersection(event);
                if (hit) {
                    let obj = hit.object;
                    if (obj.userData.isObject) {
                        const objData = objects.find(o => o.id === obj.userData.id);
                        if (objData) {
                            removeObject(objData);
                            setStatus('Объект удалён');
                        }
                    }
                }
            }
        });

        // ----- UI: кнопки режимов -----
        document.querySelectorAll('#toolbar button[data-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                if (mode === 'clear') {
                    if (confirm('Удалить все объекты и сбросить ландшафт?')) {
                        clearAll();
                        setStatus('Всё очищено');
                    }
                    return;
                }
                // Сброс активных
                document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = mode;
                // Показать/скрыть выбор текстуры
                document.getElementById('texture-select').style.display = (mode === 'texture') ? 'flex' : 'none';
                setStatus(`Режим: ${btn.textContent.trim()}`);
            });
        });

        // Выбор текстуры
        document.querySelectorAll('#texture-select button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#texture-select button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Настройки кисти
        document.getElementById('brush-radius').addEventListener('input', (e) => {
            document.getElementById('radius-label').textContent = parseFloat(e.target.value).toFixed(1);
        });
        document.getElementById('brush-strength').addEventListener('input', (e) => {
            document.getElementById('strength-label').textContent = parseFloat(e.target.value).toFixed(1);
        });

        // Кнопка экспорта
        document.getElementById('export-btn').addEventListener('click', exportGame);

        // ----- Статус -----
        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        // ----- Инициализация -----
        setStatus('Редактор загружен. Выберите режим.');

        // ----- Анимация -----
        function animateEditor() {
            requestAnimationFrame(animateEditor);
            controls.update();
            renderer.render(scene, camera);
        }
        animateEditor();

        // ----- Ресайз -----
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // Для удобства добавим тестовый объект
        const testObj = createObject('box', new THREE.Vector3(1, 0.5, 1), 0xff0000, 0.8, true);
        selectObject(testObj);

        console.log('Редактор готов!');
    </script>
</body>
</html>
