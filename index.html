<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дом с текстурами</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 10px 20px; border-radius: 8px;
            pointer-events: none; z-index: 100;
            font-size: 14px; user-select: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            font-size: 30px; pointer-events: none; z-index: 100;
        }
        #lock-hint {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 8px 20px; border-radius: 30px;
            font-size: 16px; pointer-events: none; z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="info">🏡 Простой дом с текстурами</div>
    <div id="crosshair">+</div>
    <div id="lock-hint">Кликни, чтобы захватить мышь | WASD — ходьба</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- Инициализация ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 25, 50);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 1.7, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ---------- Освещение ----------
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(10, 15, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        const d = 15;
        sun.shadow.camera.left = -d;
        sun.shadow.camera.right = d;
        sun.shadow.camera.top = d;
        sun.shadow.camera.bottom = -d;
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 30;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-5, 0, -10);
        scene.add(fill);

        // ---------- Загрузчик текстур ----------
        const loader = new THREE.TextureLoader();
        const texPath = 'textures/';

        // Загружаем все текстуры
        const textures = {};
        const names = ['stena', 'stena2', 'trawa', 'trawa2', 'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'];
        names.forEach(n => {
            const ext = (n === 'bereza') ? 'png' : 'jpg';
            textures[n] = loader.load(`${texPath}${n}.${ext}`);
        });

        // ---------- Небо (из текстуры nebo.jpg) ----------
        const skyMat = new THREE.MeshBasicMaterial({ map: textures.nebo, side: THREE.BackSide });
        const sky = new THREE.Mesh(new THREE.SphereGeometry(80, 32, 32), skyMat);
        scene.add(sky);

        // ---------- Земля (трава) ----------
        const groundMat = new THREE.MeshStandardMaterial({
            map: textures.trawa,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // Тропинка (земля)
        function makePath(x, z, w, h) {
            const mat = new THREE.MeshStandardMaterial({ map: textures.zemla, roughness: 0.9 });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x, 0, z);
            mesh.receiveShadow = true;
            scene.add(mesh);
        }
        const pathData = [
            [0, 0, 1.2, 0.8], [0, 1.5, 1.2, 0.8], [0, 3.0, 1.2, 0.8], [0, 4.5, 1.2, 0.8],
            [-1.5, -1, 1, 1], [1.5, -1, 1, 1]
        ];
        pathData.forEach(([x, z, w, h]) => makePath(x, z, w, h));

        // ---------- ДОМ (простой, но с текстурами) ----------
        const house = new THREE.Group();

        // 1. Стены (куб) с текстурой stena.jpg
        const wallMat = new THREE.MeshStandardMaterial({ map: textures.stena, roughness: 0.6 });
        const walls = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), wallMat);
        walls.position.y = 1.25;
        walls.castShadow = true;
        walls.receiveShadow = true;
        house.add(walls);

        // 2. Крыша (конус с 4-мя сегментами) с текстурой dpol.jpg
        const roofMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8, side: THREE.DoubleSide });
        const roof = new THREE.Mesh(new THREE.ConeGeometry(2.4, 1.2, 4), roofMat);
        roof.position.y = 2.5 + 0.6;
        roof.rotation.y = Math.PI / 4;
        roof.castShadow = true;
        roof.receiveShadow = true;
        house.add(roof);

        // 3. Дверь (плоскость) с текстурой досок
        const doorMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8 });
        const door = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 1.6), doorMat);
        door.position.set(0, 0.8, 1.51);
        house.add(door);

        // Ручка (просто жёлтый шарик)
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), handleMat);
        handle.position.set(0.2, 0.8, 1.52);
        house.add(handle);

        // 4. Окна (плоскости с полупрозрачным стеклом)
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.5,
            roughness: 0.1,
            metalness: 0.3
        });
        // Передние окна
        const win1 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), glassMat);
        win1.position.set(-0.9, 1.5, 1.51);
        house.add(win1);

        const win2 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), glassMat);
        win2.position.set(0.9, 1.5, 1.51);
        house.add(win2);

        // Боковое окно (справа)
        const win3 = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), glassMat);
        win3.position.set(1.51, 1.5, -0.5);
        win3.rotation.y = Math.PI / 2;
        house.add(win3);

        // Добавляем дом в сцену
        house.position.set(0, 0, 0);
        scene.add(house);

        // ---------- ДЕРЕВЬЯ (берёзы крест-накрест, спрайты) ----------
        function createBirch() {
            const group = new THREE.Group();
            const map = textures.bereza;
            map.alphaTest = 0.5;
            const mat = new THREE.SpriteMaterial({
                map: map,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                sizeAttenuation: true
            });
            const height = 3.0;
            // Спрайт 1
            const s1 = new THREE.Sprite(mat);
            s1.scale.set(1.8, height, 1);
            s1.position.y = height / 2;
            group.add(s1);
            // Спрайт 2 (крест-накрест)
            const s2 = new THREE.Sprite(mat.clone());
            s2.scale.set(1.8, height, 1);
            s2.rotation.y = Math.PI / 2;
            s2.position.y = height / 2;
            group.add(s2);
            return group;
        }

        const treePositions = [
            [-4, -3], [5, -2], [-5, 4], [6, 5], [-3, -5], [4, -5], [-6, 0], [0, -6]
        ];
        treePositions.forEach(([x, z]) => {
            const tree = createBirch();
            tree.position.set(x, 0, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // ---------- Управление от первого лица ----------
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        let isLocked = false;

        renderer.domElement.addEventListener('click', () => {
            if (!isLocked) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
            document.getElementById('lock-hint').style.opacity = isLocked ? '0' : '1';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            euler.y -= (e.movementX || 0) * 0.002;
            euler.x -= (e.movementY || 0) * 0.002;
            euler.x = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, euler.x));
            camera.quaternion.setFromEuler(euler);
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
            }
        });

        const speed = 0.07;
        const boundary = 12;

        // ---------- Анимация ----------
        function animate() {
            requestAnimationFrame(animate);

            if (isLocked) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const move = new THREE.Vector3(0, 0, 0);
                if (keys.w) move.add(forward);
                if (keys.s) move.sub(forward);
                if (keys.a) move.sub(right);
                if (keys.d) move.add(right);
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed);
                    const newPos = camera.position.clone().add(move);
                    newPos.x = Math.max(-boundary, Math.min(boundary, newPos.x));
                    newPos.z = Math.max(-boundary, Math.min(boundary, newPos.z));
                    camera.position.copy(newPos);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Дом с текстурами загружен!');
    </script>
</body>
</html>
