<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный 3D Дом</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: #fff;
            padding: 10px 20px; border-radius: 8px;
            pointer-events: none; z-index: 100;
            font-size: 14px; user-select: none;
        }
        #controls-hint {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 8px 20px; border-radius: 30px;
            font-size: 16px; pointer-events: none; z-index: 100;
            transition: opacity 0.5s;
            text-align: center;
            white-space: nowrap;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            font-size: 30px; pointer-events: none; z-index: 100;
        }
        #lock-hint {
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 8px 20px; border-radius: 30px;
            font-size: 16px; pointer-events: none; z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="info">🏡 Интерактивный дом с интерьером</div>
    <div id="crosshair">+</div>
    <div id="lock-hint">Кликни, чтобы захватить мышь</div>
    <div id="controls-hint">WASD — ходьба | Мышь — осмотр | F — открыть/закрыть дверь</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- Инициализация ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 25, 50);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 1.7, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ---------- Освещение ----------
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 2.0);
        sun.position.set(10, 15, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        const d = 15;
        sun.shadow.camera.left = -d;
        sun.shadow.camera.right = d;
        sun.shadow.camera.top = d;
        sun.shadow.camera.bottom = -d;
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 30;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-5, 0, -10);
        scene.add(fill);

        // ---------- Загрузчик текстур ----------
        const loader = new THREE.TextureLoader();
        const texPath = 'textures/';

        const textures = {};
        const names = ['stena', 'stena2', 'trawa', 'trawa2', 'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'];
        names.forEach(n => {
            const ext = (n === 'bereza') ? 'png' : 'jpg';
            textures[n] = loader.load(`${texPath}${n}.${ext}`);
        });

        // ---------- Небо ----------
        const skyMat = new THREE.MeshBasicMaterial({ map: textures.nebo, side: THREE.BackSide });
        const sky = new THREE.Mesh(new THREE.SphereGeometry(80, 32, 32), skyMat);
        scene.add(sky);

        // ---------- Земля ----------
        const groundMat = new THREE.MeshStandardMaterial({
            map: textures.trawa,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // Тропинка
        function makePath(x, z, w, h) {
            const mat = new THREE.MeshStandardMaterial({ map: textures.zemla, roughness: 0.9 });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x, 0, z);
            mesh.receiveShadow = true;
            scene.add(mesh);
        }
        const pathData = [
            [0, 0, 1.2, 0.8], [0, 1.5, 1.2, 0.8], [0, 3.0, 1.2, 0.8], [0, 4.5, 1.2, 0.8],
            [-1.5, -1, 1, 1], [1.5, -1, 1, 1]
        ];
        pathData.forEach(([x, z, w, h]) => makePath(x, z, w, h));

        // ---------- ДОМ (с интерьером) ----------
        const house = new THREE.Group();

        // Размеры дома
        const W = 4.0;
        const D = 5.0;
        const H = 2.8;

        // ---- Стены (снаружи) ----
        const wallMat = new THREE.MeshStandardMaterial({ map: textures.stena, roughness: 0.6 });
        const wallMat2 = new THREE.MeshStandardMaterial({ map: textures.stena2, roughness: 0.6 });

        // Функция создания стены
        function addWall(w, h, d, x, y, z, mat, rotY = 0) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            mesh.rotation.y = rotY;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            house.add(mesh);
            return mesh;
        }

        // Наружные стены
        addWall(W, H, 0.1, 0, H/2, D/2, wallMat); // перед
        addWall(W, H, 0.1, 0, H/2, -D/2, wallMat2); // зад
        addWall(0.1, H, D, -W/2, H/2, 0, wallMat2); // лево
        addWall(0.1, H, D, W/2, H/2, 0, wallMat); // право

        // ---- Пол (внутри) ----
        const floorMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.7 });
        const floor = new THREE.Mesh(new THREE.BoxGeometry(W-0.1, 0.1, D-0.1), floorMat);
        floor.position.set(0, 0.05, 0);
        floor.receiveShadow = true;
        floor.castShadow = true;
        house.add(floor);

        // ---- Потолок (внутри) ----
        const ceilingMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8, side: THREE.BackSide });
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(W-0.1, D-0.1), ceilingMat);
        ceiling.position.set(0, H, 0);
        ceiling.rotation.x = -Math.PI / 2;
        house.add(ceiling);

        // ---- Крыша ----
        const roofMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8, side: THREE.DoubleSide });
        const overhang = 0.5;
        const roofW = W + overhang * 2;
        const roofD = D + overhang * 2;
        const roofH = 1.2;
        const slopeLen = Math.sqrt((roofD/2)**2 + roofH**2);
        const angle = Math.atan2(roofH, roofD/2);

        const slope1 = new THREE.Mesh(new THREE.PlaneGeometry(roofW, slopeLen), roofMat);
        slope1.rotation.x = -angle;
        slope1.position.set(0, H, D/2 + overhang/2);
        slope1.castShadow = true;
        slope1.receiveShadow = true;
        house.add(slope1);

        const slope2 = new THREE.Mesh(new THREE.PlaneGeometry(roofW, slopeLen), roofMat);
        slope2.rotation.x = angle;
        slope2.position.set(0, H, -D/2 - overhang/2);
        slope2.castShadow = true;
        slope2.receiveShadow = true;
        house.add(slope2);

        // Фронтоны
        const triShape = new THREE.Shape();
        triShape.moveTo(-roofW/2, 0);
        triShape.lineTo(0, roofH);
        triShape.lineTo(roofW/2, 0);
        triShape.lineTo(-roofW/2, 0);
        const triGeo = new THREE.ShapeGeometry(triShape);
        const triMat = new THREE.MeshStandardMaterial({ map: textures.stena2, side: THREE.DoubleSide });
        const fronton1 = new THREE.Mesh(triGeo, triMat);
        fronton1.position.set(0, H, D/2 + overhang/2 + 0.01);
        fronton1.castShadow = true;
        fronton1.receiveShadow = true;
        house.add(fronton1);

        const fronton2 = new THREE.Mesh(triGeo, triMat);
        fronton2.position.set(0, H, -D/2 - overhang/2 - 0.01);
        fronton2.rotation.y = Math.PI;
        fronton2.castShadow = true;
        fronton2.receiveShadow = true;
        house.add(fronton2);

        // Конёк
        const ridge = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.1, roofD),
            new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 })
        );
        ridge.position.set(0, H + roofH, 0);
        ridge.castShadow = true;
        house.add(ridge);

        // ---- Дверь (интерактивная) ----
        const doorGroup = new THREE.Group();
        const doorMat2 = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8 });
        const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.05), doorMat2);
        doorMesh.position.set(0, 0.9, 0);
        doorMesh.castShadow = true;
        doorGroup.add(doorMesh);

        // Ручка
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), handleMat);
        handle.position.set(0.25, 0.9, 0.04);
        doorGroup.add(handle);

        // Позиционируем дверь
        doorGroup.position.set(0, 0, D/2 + 0.01);
        house.add(doorGroup);

        // ---- Окна (снаружи) ----
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.4,
            roughness: 0.1,
            metalness: 0.3
        });

        function makeWindow(x, y, z, rotY = 0) {
            const group = new THREE.Group();
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.8), glassMat);
            glass.position.z = 0.01;
            group.add(glass);

            const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
            const hbar = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            hbar.position.y = 0.4;
            group.add(hbar);
            const hbar2 = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            hbar2.position.y = -0.4;
            group.add(hbar2);
            const vbar = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            vbar.position.x = 0.3;
            group.add(vbar);
            const vbar2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            vbar2.position.x = -0.3;
            group.add(vbar2);

            const border = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.85, 0.05), frameMat);
            border.position.z = -0.01;
            group.add(border);

            group.position.set(x, y, z);
            group.rotation.y = rotY;
            return group;
        }

        // Окна на фасаде
        house.add(makeWindow(-1.0, 1.6, D/2 + 0.01, 0));
        house.add(makeWindow(1.0, 1.6, D/2 + 0.01, 0));
        // Боковые окна
        house.add(makeWindow(-W/2 - 0.01, 1.6, 0.8, Math.PI/2));
        house.add(makeWindow(W/2 + 0.01, 1.6, -0.8, -Math.PI/2));

        // ---- ИНТЕРЬЕР ----
        const interior = new THREE.Group();

        // Материалы для мебели
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7 });
        const woodLightMat = new THREE.MeshStandardMaterial({ color: 0xDEB887, roughness: 0.7 });
        const fabricMat = new THREE.MeshStandardMaterial({ color: 0x4A6FA5, roughness: 0.9 });
        const fabricLightMat = new THREE.MeshStandardMaterial({ color: 0x6A8FC5, roughness: 0.9 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.8, roughness: 0.2 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xF5F5F5, roughness: 0.8 });

        // 1. Гостиная (зона слева от входа)
        // Диван
        const sofaGroup = new THREE.Group();
        // Сиденье
        const seat = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.6), fabricMat);
        seat.position.y = 0.15;
        seat.castShadow = true;
        seat.receiveShadow = true;
        sofaGroup.add(seat);
        // Спинка
        const back = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.1), fabricLightMat);
        back.position.set(0, 0.35, -0.3);
        back.castShadow = true;
        back.receiveShadow = true;
        sofaGroup.add(back);
        // Подлокотники
        const armL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.6), fabricLightMat);
        armL.position.set(-0.6, 0.2, 0);
        armL.castShadow = true;
        armL.receiveShadow = true;
        sofaGroup.add(armL);
        const armR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.6), fabricLightMat);
        armR.position.set(0.6, 0.2, 0);
        armR.castShadow = true;
        armR.receiveShadow = true;
        sofaGroup.add(armR);
        // Ножки
        const legMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        for (let x of [-0.5, 0.5]) {
            for (let z of [-0.25, 0.25]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.1, 6), legMat);
                leg.position.set(x, -0.05, z);
                sofaGroup.add(leg);
            }
        }
        sofaGroup.position.set(-1.2, 0.1, -0.5);
        sofaGroup.rotation.y = 0.2;
        interior.add(sofaGroup);

        // Журнальный столик
        const tableGroup = new THREE.Group();
        const tableTop = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.4), woodLightMat);
        tableTop.position.y = 0.4;
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        tableGroup.add(tableTop);
        for (let x of [-0.25, 0.25]) {
            for (let z of [-0.15, 0.15]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.35, 6), woodMat);
                leg.position.set(x, 0.175, z);
                tableGroup.add(leg);
            }
        }
        tableGroup.position.set(-1.2, 0.1, 0.4);
        interior.add(tableGroup);

        // Торшер
        const lampGroup = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 1.2, 8), metalMat);
        pole.position.y = 0.6;
        pole.castShadow = true;
        lampGroup.add(pole);
        const shade = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0xFFE4B5, roughness: 0.8 }));
        shade.position.y = 1.3;
        shade.castShadow = true;
        lampGroup.add(shade);
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0xFFFF88, emissive: 0xFFFF88, emissiveIntensity: 0.5 }));
        bulb.position.y = 1.15;
        lampGroup.add(bulb);
        lampGroup.position.set(-1.5, 0.1, -1.2);
        interior.add(lampGroup);

        // 2. Кухня (зона справа от входа)
        // Стол
        const tableGroup2 = new THREE.Group();
        const tableTop2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 0.6), woodLightMat);
        tableTop2.position.y = 0.7;
        tableTop2.castShadow = true;
        tableTop2.receiveShadow = true;
        tableGroup2.add(tableTop2);
        for (let x of [-0.35, 0.35]) {
            for (let z of [-0.25, 0.25]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.65, 6), woodMat);
                leg.position.set(x, 0.325, z);
                tableGroup2.add(leg);
            }
        }
        tableGroup2.position.set(1.2, 0.1, -0.5);
        interior.add(tableGroup2);

        // Стулья (4 шт)
        function createChair(x, z, rotY = 0) {
            const group = new THREE.Group();
            const seat2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.3), woodLightMat);
            seat2.position.y = 0.4;
            seat2.castShadow = true;
            seat2.receiveShadow = true;
            group.add(seat2);
            for (let lx of [-0.12, 0.12]) {
                for (let lz of [-0.12, 0.12]) {
                    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.35, 6), woodMat);
                    leg.position.set(lx, 0.175, lz);
                    group.add(leg);
                }
            }
            const back2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.02), woodLightMat);
            back2.position.set(0, 0.55, -0.15);
            group.add(back2);
            group.position.set(x, 0.1, z);
            group.rotation.y = rotY;
            return group;
        }

        interior.add(createChair(1.2, -0.9, 0.2));
        interior.add(createChair(1.2, 0.1, -0.2));
        interior.add(createChair(1.7, -0.9, -0.2));
        interior.add(createChair(1.7, 0.1, 0.2));

        // Холодильник
        const fridgeGroup = new THREE.Group();
        const fridgeBody = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 0.5), whiteMat);
        fridgeBody.position.y = 0.6;
        fridgeBody.castShadow = true;
        fridgeBody.receiveShadow = true;
        fridgeGroup.add(fridgeBody);
        const fridgeHandle = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 0.02), metalMat);
        fridgeHandle.position.set(0, 0.6, 0.26);
        fridgeGroup.add(fridgeHandle);
        fridgeGroup.position.set(1.5, 0.1, 1.2);
        interior.add(fridgeGroup);

        // 3. Спальня (зона в глубине)
        // Кровать
        const bedGroup = new THREE.Group();
        // Основание
        const bedBase = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 1.8), woodMat);
        bedBase.position.y = 0.1;
        bedBase.castShadow = true;
        bedBase.receiveShadow = true;
        bedGroup.add(bedBase);
        // Матрас
        const mattress = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.15, 1.7), new THREE.MeshStandardMaterial({ color: 0xE8D5B7, roughness: 0.9 }));
        mattress.position.y = 0.25;
        mattress.castShadow = true;
        mattress.receiveShadow = true;
        bedGroup.add(mattress);
        // Подушка
        const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.3), new THREE.MeshStandardMaterial({ color: 0xF5F5F5, roughness: 0.9 }));
        pillow.position.set(0, 0.35, -0.5);
        pillow.castShadow = true;
        pillow.receiveShadow = true;
        bedGroup.add(pillow);
        bedGroup.position.set(-0.5, 0.1, 1.5);
        bedGroup.rotation.y = 0.1;
        interior.add(bedGroup);

        // Тумбочка
        const nightstand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.3), woodLightMat);
        nightstand.position.set(-0.9, 0.2, 2.0);
        nightstand.castShadow = true;
        nightstand.receiveShadow = true;
        interior.add(nightstand);

        // Добавляем интерьер в дом
        house.add(interior);

        // Добавляем дом в сцену
        house.position.set(0, 0, 0);
        scene.add(house);

        // ---------- ДЕРЕВЬЯ ----------
        function createBirch() {
            const group = new THREE.Group();
            const map = textures.bereza;
            map.alphaTest = 0.5;
            const mat = new THREE.SpriteMaterial({
                map: map,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                sizeAttenuation: true
            });
            const height = 3.0;
            const s1 = new THREE.Sprite(mat);
            s1.scale.set(1.8, height, 1);
            s1.position.y = height / 2;
            group.add(s1);
            const s2 = new THREE.Sprite(mat.clone());
            s2.scale.set(1.8, height, 1);
            s2.rotation.y = Math.PI / 2;
            s2.position.y = height / 2;
            group.add(s2);
            return group;
        }

        const treePositions = [
            [-4, -3], [5, -2], [-5, 4], [6, 5], [-3, -5], [4, -5], [-6, 0], [0, -6]
        ];
        treePositions.forEach(([x, z]) => {
            const tree = createBirch();
            tree.position.set(x, 0, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // ---------- Управление дверью ----------
        let doorOpen = false;
        let doorAngle = 0;
        const doorSpeed = 0.03;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyF') {
                doorOpen = !doorOpen;
                e.preventDefault();
            }
        });

        // ---------- Управление от первого лица ----------
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        let isLocked = false;

        renderer.domElement.addEventListener('click', () => {
            if (!isLocked) renderer.domElement.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
            document.getElementById('lock-hint').style.opacity = isLocked ? '0' : '1';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            euler.y -= (e.movementX || 0) * 0.002;
            euler.x -= (e.movementY || 0) * 0.002;
            euler.x = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, euler.x));
            camera.quaternion.setFromEuler(euler);
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
            }
        });

        const speed = 0.07;
        const boundary = 12;

        // ---------- Анимация ----------
        function animate() {
            requestAnimationFrame(animate);

            // Анимация двери
            const targetAngle = doorOpen ? -Math.PI / 2 : 0;
            doorAngle += (targetAngle - doorAngle) * 0.1;
            doorGroup.rotation.y = doorAngle;

            // Движение игрока
            if (isLocked) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const move = new THREE.Vector3(0, 0, 0);
                if (keys.w) move.add(forward);
                if (keys.s) move.sub(forward);
                if (keys.a) move.sub(right);
                if (keys.d) move.add(right);
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed);
                    const newPos = camera.position.clone().add(move);
                    newPos.x = Math.max(-boundary, Math.min(boundary, newPos.x));
                    newPos.z = Math.max(-boundary, Math.min(boundary, newPos.z));
                    camera.position.copy(newPos);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Интерактивный дом с интерьером загружен!');
    </script>
</body>
</html>
