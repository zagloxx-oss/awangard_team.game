<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поляна от первого лица</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            font-size: 14px;
            user-select: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 30px;
            text-shadow: 0 0 4px black;
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
        }
        #lock-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="info">🌳 Поляна с домиком (вид от первого лица)</div>
    <div id="crosshair">+</div>
    <div id="lock-hint">Кликните по сцене, чтобы захватить мышь</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- Инициализация ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 60);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 1.7, 5); // рост 1.7

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ---------- Освещение ----------
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(10, 15, 5);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        const d = 15;
        sun.shadow.camera.left = -d;
        sun.shadow.camera.right = d;
        sun.shadow.camera.top = d;
        sun.shadow.camera.bottom = -d;
        sun.shadow.camera.near = 1;
        sun.shadow.camera.far = 30;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-5, 0, -10);
        scene.add(fill);

        // ---------- Загрузчик текстур ----------
        const loader = new THREE.TextureLoader();
        const texPath = 'textures/';

        const textures = {};
        const names = ['stena', 'stena2', 'trawa', 'trawa2', 'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'];
        names.forEach(n => {
            const ext = (n === 'bereza') ? 'png' : 'jpg';
            textures[n] = loader.load(`${texPath}${n}.${ext}`);
        });

        // ---------- Небо ----------
        const sky = new THREE.Mesh(
            new THREE.SphereGeometry(80, 32, 32),
            new THREE.MeshBasicMaterial({ map: textures.nebo, side: THREE.BackSide })
        );
        scene.add(sky);

        // ---------- Земля ----------
        const groundMat = new THREE.MeshStandardMaterial({
            map: textures.trawa,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        // Тропинка
        function pathPiece(x, z, w, h) {
            const m = new THREE.Mesh(
                new THREE.PlaneGeometry(w, h),
                new THREE.MeshStandardMaterial({ map: textures.zemla, roughness: 0.9 })
            );
            m.rotation.x = -Math.PI / 2;
            m.position.set(x, 0, z);
            m.receiveShadow = true;
            scene.add(m);
        }
        [
            [0,0,1.2,0.8], [0,1.5,1.2,0.8], [0,3.0,1.2,0.8], [0,4.5,1.2,0.8],
            [-1.5,-1,1,1], [1.5,-1,1,1]
        ].forEach(([x,z,w,h]) => pathPiece(x,z,w,h));

        // ---------- Дом (упрощённый, но с дверью, окнами и правильной крышей) ----------
        const house = new THREE.Group();

        const W = 3.0, D = 4.0, H = 2.5;
        const wallMat1 = new THREE.MeshStandardMaterial({ map: textures.stena, roughness: 0.6 });
        const wallMat2 = new THREE.MeshStandardMaterial({ map: textures.stena2, roughness: 0.6 });

        // Стены
        function addWall(w, h, d, x, y, z, mat, rotY=0) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            mesh.rotation.y = rotY;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            house.add(mesh);
        }
        addWall(W, H, 0.1, 0, H/2, D/2, wallMat1); // перед
        addWall(W, H, 0.1, 0, H/2, -D/2, wallMat2); // зад
        addWall(0.1, H, D, -W/2, H/2, 0, wallMat2); // лево
        addWall(0.1, H, D, W/2, H/2, 0, wallMat1); // право

        // Пол
        const floor = new THREE.Mesh(
            new THREE.BoxGeometry(W, 0.1, D),
            new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.7 })
        );
        floor.position.y = 0.05;
        floor.receiveShadow = true;
        floor.castShadow = true;
        house.add(floor);

        // ---- Дверь (на передней стене) ----
        const doorMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8 });
        const door = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 1.8), doorMat);
        door.position.set(0, 0.9, D/2 + 0.01);
        house.add(door);
        // Ручка
        const handle = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xffaa00, metalness: 0.8, roughness: 0.2 })
        );
        handle.position.set(0.25, 0.9, D/2 + 0.05);
        house.add(handle);

        // ---- Окна (два спереди, по бокам от двери) ----
        function makeWindow(x, y, z, rotY=0) {
            const g = new THREE.Group();
            // Стекло
            const glass = new THREE.Mesh(
                new THREE.PlaneGeometry(0.6, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5, roughness: 0.1 })
            );
            glass.position.z = 0.01;
            g.add(glass);
            // Рама (крест)
            const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
            const hbar = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            hbar.position.y = 0.4;
            g.add(hbar);
            const hbar2 = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), frameMat);
            hbar2.position.y = -0.4;
            g.add(hbar2);
            const vbar = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            vbar.position.x = 0.3;
            g.add(vbar);
            const vbar2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.85, 0.04), frameMat);
            vbar2.position.x = -0.3;
            g.add(vbar2);
            // Рамка
            const border = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.85, 0.05), frameMat);
            border.position.z = -0.01;
            g.add(border);

            g.position.set(x, y, z);
            g.rotation.y = rotY;
            return g;
        }

        house.add(makeWindow(-0.9, 1.6, D/2 + 0.01, 0));
        house.add(makeWindow(0.9, 1.6, D/2 + 0.01, 0));
        house.add(makeWindow(-W/2 - 0.01, 1.6, 0.8, Math.PI/2));
        house.add(makeWindow(W/2 + 0.01, 1.6, -0.8, -Math.PI/2));

        // ---- Крыша (две наклонные плоскости) ----
        const roofMat = new THREE.MeshStandardMaterial({ map: textures.dpol, roughness: 0.8, side: THREE.DoubleSide });
        const overhang = 0.4;
        const roofW = W + overhang * 2;
        const roofD = D + overhang * 2;
        const roofH = 1.2;

        // Длина ската
        const slopeLen = Math.sqrt((roofD/2)**2 + roofH**2);
        const angle = Math.atan2(roofH, roofD/2);

        // Передний скат (Z+)
        const slope1 = new THREE.Mesh(new THREE.PlaneGeometry(roofW, slopeLen), roofMat);
        slope1.rotation.x = -angle;
        slope1.position.set(0, H, D/2 + overhang/2);
        slope1.castShadow = true;
        slope1.receiveShadow = true;
        house.add(slope1);

        // Задний скат (Z-)
        const slope2 = new THREE.Mesh(new THREE.PlaneGeometry(roofW, slopeLen), roofMat);
        slope2.rotation.x = angle;
        slope2.position.set(0, H, -D/2 - overhang/2);
        slope2.castShadow = true;
        slope2.receiveShadow = true;
        house.add(slope2);

        // Фронтоны (треугольные заглушки) – опционально, но добавим для красоты
        const triShape = new THREE.Shape();
        triShape.moveTo(-roofW/2, 0);
        triShape.lineTo(0, roofH);
        triShape.lineTo(roofW/2, 0);
        triShape.lineTo(-roofW/2, 0);
        const triGeo = new THREE.ShapeGeometry(triShape);
        const triMat = new THREE.MeshStandardMaterial({ map: textures.stena2, side: THREE.DoubleSide });
        const fronton1 = new THREE.Mesh(triGeo, triMat);
        fronton1.position.set(0, H, D/2 + overhang/2 + 0.01);
        fronton1.castShadow = true;
        fronton1.receiveShadow = true;
        house.add(fronton1);

        const fronton2 = new THREE.Mesh(triGeo, triMat);
        fronton2.position.set(0, H, -D/2 - overhang/2 - 0.01);
        fronton2.rotation.y = Math.PI;
        fronton2.castShadow = true;
        fronton2.receiveShadow = true;
        house.add(fronton2);

        // Конёк
        const ridge = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.1, roofD),
            new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 })
        );
        ridge.position.set(0, H + roofH, 0);
        ridge.castShadow = true;
        house.add(ridge);

        scene.add(house);

        // ---------- Деревья (крест-накрест, статичные) ----------
        function createTree() {
            const group = new THREE.Group();
            const map = textures.bereza;
            map.alphaTest = 0.5;
            const mat = new THREE.SpriteMaterial({
                map: map,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                sizeAttenuation: true
            });
            const h = 3.0;
            const s1 = new THREE.Sprite(mat);
            s1.scale.set(1.8, h, 1);
            s1.position.y = h/2;
            group.add(s1);

            const s2 = new THREE.Sprite(mat.clone());
            s2.scale.set(1.8, h, 1);
            s2.rotation.y = Math.PI/2;
            s2.position.y = h/2;
            group.add(s2);

            return group;
        }

        const treePos = [
            [-4, -3], [5, -2], [-5, 4], [6, 5], [-3, -5], [4, -5], [-6, 0], [0, -6]
        ];
        treePos.forEach(([x, z]) => {
            const tree = createTree();
            tree.position.set(x, 0, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
        });

        // ---------- Управление от первого лица ----------
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const PI_2 = Math.PI / 2;

        let isLocked = false;

        // Обработка Pointer Lock
        renderer.domElement.addEventListener('click', () => {
            if (!isLocked) {
                renderer.domElement.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === renderer.domElement;
            document.getElementById('lock-hint').style.opacity = isLocked ? '0' : '1';
        });

        // Движение мыши
        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            const movementX = e.movementX || 0;
            const movementY = e.movementY || 0;

            euler.y -= movementX * 0.002;
            euler.x -= movementY * 0.002;
            euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));

            camera.quaternion.setFromEuler(euler);
        });

        // Клавиши WASD
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
            }
        });

        const speed = 0.06;
        const boundary = 12;

        // ---------- Цикл анимации ----------
        function animate() {
            requestAnimationFrame(animate);

            // Движение
            if (isLocked) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const move = new THREE.Vector3(0, 0, 0);
                if (keys.w) move.add(forward);
                if (keys.s) move.sub(forward);
                if (keys.a) move.sub(right);
                if (keys.d) move.add(right);
                if (move.length() > 0) {
                    move.normalize().multiplyScalar(speed);
                    const newPos = camera.position.clone().add(move);
                    newPos.x = Math.max(-boundary, Math.min(boundary, newPos.x));
                    newPos.z = Math.max(-boundary, Math.min(boundary, newPos.z));
                    camera.position.copy(newPos);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // ---------- Ресайз ----------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Игра запущена. Кликните для захвата мыши, WASD — ходьба.');
    </script>
</body>
</html>
