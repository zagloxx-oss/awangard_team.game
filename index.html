<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STALKER — РЕЛЬЕФ И ДОМИК</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #blocker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            cursor: pointer;
            z-index: 999;
            text-shadow: 0 0 20px #0f0;
        }
        #blocker span {
            background: #111;
            padding: 30px 50px;
            border: 3px solid #0f0;
            border-radius: 12px;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            user-select: none;
        }
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            z-index: 100;
            pointer-events: none;
            user-select: none;
            background: rgba(0,0,0,0.4);
            padding: 12px 18px;
            border-radius: 10px;
            min-width: 160px;
        }
        .stat {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .stat-label {
            width: 70px;
            color: #ccc;
        }
        .bar-bg {
            flex: 1;
            height: 14px;
            background: #333;
            border-radius: 7px;
            overflow: hidden;
            margin-left: 6px;
        }
        .bar-fill {
            height: 100%;
            width: 100%;
            background: #0f0;
            border-radius: 7px;
            transition: width 0.05s;
        }
        .bar-fill.stamina {
            background: #ffaa00;
        }
        .bar-fill.health {
            background: #ff3333;
        }
    </style>
</head>
<body>
    <div id="blocker"><span>КЛИКНИ, ЧТОБЫ ВОЙТИ В ЗОНУ</span></div>
    <div id="info">WASD — ходьба | Shift — бег | Пробел — прыжок</div>
    <div id="hud">
        <div class="stat">
            <span class="stat-label">Здоровье</span>
            <div class="bar-bg"><div class="bar-fill health" id="healthBar" style="width:100%"></div></div>
        </div>
        <div class="stat">
            <span class="stat-label">Выносливость</span>
            <div class="bar-bg"><div class="bar-fill stamina" id="staminaBar" style="width:100%"></div></div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ИНИЦИАЛИЗАЦИЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2b3c);
        scene.fog = new THREE.Fog(0x1a2b3c, 40, 80); // туман для атмосферы

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.80, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- БЛОКИРОВКА ---
        const blocker = document.getElementById('blocker');
        blocker.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('pointerlockchange', () => {
            blocker.style.display = document.pointerLockElement ? 'none' : 'flex';
        });

        // --- УПРАВЛЕНИЕ ---
        const keys = { w: false, a: false, s: false, d: false, shift: false, space: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
                case 'ShiftLeft': case 'ShiftRight': keys.shift = true; e.preventDefault(); break;
                case 'Space': keys.space = true; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
                case 'ShiftLeft': case 'ShiftRight': keys.shift = false; e.preventDefault(); break;
                case 'Space': keys.space = false; e.preventDefault(); break;
            }
        });

        // --- МЫШЬ ---
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== renderer.domElement) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
        });

        // --- СВЕТ ---
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
        sun.position.set(20, 30, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 80;
        sun.shadow.camera.left = -40;
        sun.shadow.camera.right = 40;
        sun.shadow.camera.top = 40;
        sun.shadow.camera.bottom = -40;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-20, 10, -20);
        scene.add(fill);

        // --- ТЕКСТУРЫ ---
        const loader = new THREE.TextureLoader();
        const textures = {};
        function loadTex(name) {
            return new Promise((resolve) => {
                loader.load(`textures/${name}`, (tex) => { tex.needsUpdate = true; resolve(tex); },
                    undefined, () => resolve(null));
            });
        }
        const texList = {
            zemla: 'zemla.jpg',
            trawa: 'trawa.jpg',
            stena: 'stena.jpg',
            nebo: 'nebo.jpg',
            bereza: 'bereza.png'
        };
        await Promise.all(Object.entries(texList).map(async ([key, file]) => {
            const tex = await loadTex(file);
            if (tex) textures[key] = tex;
            else console.warn(`SWILL: не загрузилась ${file}`);
        }));
        console.log('SWILL: текстуры загружены');

        // --- РЕЛЬЕФ (холмы и низины) ---
        const groundSize = 80;
        const segments = 80;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        const indices = [];
        const normals = [];
        const uvs = [];

        const half = groundSize / 2;

        for (let i = 0; i <= segments; i++) {
            const x = -half + (i / segments) * groundSize;
            for (let j = 0; j <= segments; j++) {
                const z = -half + (j / segments) * groundSize;
                // Высота: холмы с помощью синусов
                let y = 0;
                y += Math.sin(x * 0.15) * Math.cos(z * 0.12) * 2.0;
                y += Math.sin(x * 0.3 + z * 0.2) * 0.8;
                y += Math.cos(z * 0.25) * 1.0;
                // Добавим низины
                y -= Math.pow(Math.sin(x * 0.1) * Math.cos(z * 0.1), 2) * 1.5;
                // Ограничим, чтобы не было слишком глубоко
                if (y < -1.5) y = -1.5;
                if (y > 3.0) y = 3.0;
                vertices.push(x, y, z);
                uvs.push(i / segments, j / segments);
            }
        }

        for (let i = 0; i < segments; i++) {
            for (let j = 0; j < segments; j++) {
                const a = i * (segments + 1) + j;
                const b = i * (segments + 1) + j + 1;
                const c = (i + 1) * (segments + 1) + j;
                const d = (i + 1) * (segments + 1) + j + 1;
                indices.push(a, b, c);
                indices.push(b, d, c);
            }
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({
            map: textures.zemla || undefined,
            roughness: 0.8,
            metalness: 0.0,
            side: THREE.DoubleSide,
        });
        const ground = new THREE.Mesh(geometry, groundMat);
        ground.receiveShadow = true;
        ground.castShadow = false;
        scene.add(ground);

        // Добавим слой травы на некоторых участках (опционально, просто для красоты)
        // Но мы упростим, используем ту же текстуру.

        // --- НЕБО ---
        if (textures.nebo) {
            const sky = new THREE.Mesh(
                new THREE.SphereGeometry(200, 32, 32),
                new THREE.MeshBasicMaterial({ map: textures.nebo, side: THREE.BackSide })
            );
            sky.position.y = 0;
            scene.add(sky);
        }

        // --- ДЕРЕВЬЯ (крест-накрест) с учётом рельефа (ставим на y=0 для простоты) ---
        function createCrossTree(texture, x, z, height = 5, width = 2.5) {
            if (!texture) return null;
            const mat = new THREE.MeshStandardMaterial({
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                roughness: 0.8,
                metalness: 0.0,
                depthWrite: true
            });
            const p1 = new THREE.Mesh(new THREE.PlaneGeometry(width, height), mat);
            p1.position.set(0, height/2, 0);
            p1.castShadow = true;
            const p2 = new THREE.Mesh(new THREE.PlaneGeometry(width, height), mat);
            p2.position.set(0, height/2, 0);
            p2.rotation.y = Math.PI/2;
            p2.castShadow = true;
            const group = new THREE.Group();
            // Для простоты ставим деревья на y=0, игнорируя рельеф
            group.position.set(x, 0, z);
            group.add(p1);
            group.add(p2);
            return group;
        }

        const treePositions = [[-3,-2],[4,-3],[2,5],[-4,4],[6,2], [12,-8], [-10,6], [-7,-10]];
        const treeGroups = [];
        if (textures.bereza) {
            treePositions.forEach(([x,z]) => {
                const tree = createCrossTree(textures.bereza, x, z, 5, 2.5);
                if (tree) { scene.add(tree); treeGroups.push(tree); }
            });
        }

        // --- КОЛЛИЗИИ (стена, деревья, домик) ---
        const colliders = [];

        // Стена (AABB)
        const wallPos = new THREE.Vector3(-5, 2, -8);
        const wallHalf = new THREE.Vector3(4, 2, 0.25);
        colliders.push({
            type: 'box',
            pos: wallPos,
            half: wallHalf
        });

        // Деревья (сферы) — уменьшенный радиус
        treeGroups.forEach((group) => {
            const pos = new THREE.Vector3();
            group.getWorldPosition(pos);
            const center = new THREE.Vector3(pos.x, 2.5, pos.z);
            colliders.push({
                type: 'sphere',
                center: center,
                radius: 1.0
            });
        });

        // --- ДОМИК (коробка с входом) ---
        function createHouse() {
            const group = new THREE.Group();
            const houseX = 10;
            const houseZ = -5;
            const width = 4;   // по X
            const depth = 3.5; // по Z
            const height = 3;  // по Y
            const wallThick = 0.15;
            const doorWidth = 1.0;
            const doorHeight = 2.0;

            // Материал стен
            const wallMat = new THREE.MeshStandardMaterial({
                map: textures.stena || undefined,
                roughness: 0.7,
                metalness: 0.1,
                side: THREE.DoubleSide,
            });
            // Материал для крыши (используем ту же текстуру или просто цвет)
            const roofMat = new THREE.MeshStandardMaterial({
                color: 0x8b5a2b,
                roughness: 0.9,
                metalness: 0.0,
                side: THREE.DoubleSide,
            });
            // Пол (внутренний)
            const floorMat = new THREE.MeshStandardMaterial({
                map: textures.zemla || undefined,
                roughness: 0.8,
                metalness: 0.0,
                side: THREE.DoubleSide,
            });

            // ---- Стены ----
            // Задняя стена (z = -depth/2)
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(width, height, wallThick), wallMat);
            backWall.position.set(0, height/2, -depth/2);
            backWall.castShadow = true;
            backWall.receiveShadow = true;
            group.add(backWall);

            // Левая стена (x = -width/2)
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, height, depth), wallMat);
            leftWall.position.set(-width/2, height/2, 0);
            leftWall.castShadow = true;
            leftWall.receiveShadow = true;
            group.add(leftWall);

            // Правая стена (x = width/2)
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, height, depth), wallMat);
            rightWall.position.set(width/2, height/2, 0);
            rightWall.castShadow = true;
            rightWall.receiveShadow = true;
            group.add(rightWall);

            // Передняя стена — состоит из двух частей по бокам от двери
            // Левая часть передней стены (от -width/2 до -doorWidth/2)
            const frontLeft = new THREE.Mesh(new THREE.BoxGeometry((width - doorWidth)/2, height, wallThick), wallMat);
            frontLeft.position.set(-(width/2 + doorWidth/2)/2, height/2, depth/2);
            frontLeft.castShadow = true;
            frontLeft.receiveShadow = true;
            group.add(frontLeft);

            // Правая часть передней стены (от doorWidth/2 до width/2)
            const frontRight = new THREE.Mesh(new THREE.BoxGeometry((width - doorWidth)/2, height, wallThick), wallMat);
            frontRight.position.set((width/2 + doorWidth/2)/2, height/2, depth/2);
            frontRight.castShadow = true;
            frontRight.receiveShadow = true;
            group.add(frontRight);

            // Верхняя часть над дверью (от doorWidth/2 до -doorWidth/2) по X, высота от doorHeight до height
            const topDoor = new THREE.Mesh(new THREE.BoxGeometry(doorWidth, height - doorHeight, wallThick), wallMat);
            topDoor.position.set(0, (height + doorHeight)/2, depth/2);
            topDoor.castShadow = true;
            topDoor.receiveShadow = true;
            group.add(topDoor);

            // ---- Пол ----
            const floor = new THREE.Mesh(new THREE.BoxGeometry(width - wallThick*2, 0.1, depth - wallThick*2), floorMat);
            floor.position.set(0, 0.05, 0);
            floor.receiveShadow = true;
            floor.castShadow = false;
            group.add(floor);

            // ---- Крыша (плоская) ----
            const roof = new THREE.Mesh(new THREE.BoxGeometry(width + 0.5, 0.1, depth + 0.5), roofMat);
            roof.position.set(0, height + 0.05, 0);
            roof.castShadow = true;
            roof.receiveShadow = true;
            group.add(roof);

            // ---- Коллизии домика (стены) ----
            // Для простоты добавим все стены как AABB коллайдеры
            // Задняя стена
            colliders.push({
                type: 'box',
                pos: new THREE.Vector3(0, height/2, -depth/2),
                half: new THREE.Vector3(width/2, height/2, wallThick/2)
            });
            // Левая стена
            colliders.push({
                type: 'box',
                pos: new THREE.Vector3(-width/2, height/2, 0),
                half: new THREE.Vector3(wallThick/2, height/2, depth/2)
            });
            // Правая стена
            colliders.push({
                type: 'box',
                pos: new THREE.Vector3(width/2, height/2, 0),
                half: new THREE.Vector3(wallThick/2, height/2, depth/2)
            });
            // Передняя левая часть
            colliders.push({
                type: 'box',
                pos: new THREE.Vector3(-(width/2 + doorWidth/2)/2, height/2, depth/2),
                half: new THREE.Vector3((width - doorWidth)/4, height/2, wallThick/2)
            });
            // Передняя правая часть
            colliders.push({
                type: 'box',
                pos: new THREE.Vector3((width/2 + doorWidth/2)/2, height/2, depth/2),
                half: new THREE.Vector3((width - doorWidth)/4, height/2, wallThick/2)
            });
            // Верхняя часть над дверью
            colliders.push({
                type: 'box',
                pos: new THREE.Vector3(0, (height + doorHeight)/2, depth/2),
                half: new THREE.Vector3(doorWidth/2, (height - doorHeight)/2, wallThick/2)
            });

            group.position.set(houseX, 0, houseZ);
            return group;
        }

        const house = createHouse();
        scene.add(house);

        // --- ФИЗИКА ---
        let velocityY = 0;
        const gravity = -9.8;
        const jumpSpeed = 4.5;
        const jumpStaminaCost = 15;
        const groundY = 1.80; // базовая высота глаз

        // --- СТАМИНА ---
        let stamina = 100;
        const maxStamina = 100;
        const staminaDrain = 25;
        const staminaRegen = 12;

        // --- HUD ---
        const healthBar = document.getElementById('healthBar');
        const staminaBar = document.getElementById('staminaBar');

        // --- ПОКАЧИВАНИЕ ---
        let bobPhase = 0;
        let isMoving = false;

        // --- КОЛЛИЗИИ (функция) ---
        const playerRadius = 0.5;
        const playerHeight = 1.8;

        function resolveCollisions(pos) {
            for (const col of colliders) {
                if (col.type === 'box') {
                    const half = col.half;
                    const center = col.pos;
                    const dx = pos.x - center.x;
                    const dy = (pos.y - playerHeight/2) - center.y;
                    const dz = pos.z - center.z;
                    const closestX = Math.max(-half.x, Math.min(half.x, dx));
                    const closestZ = Math.max(-half.z, Math.min(half.z, dz));
                    const distX = dx - closestX;
                    const distZ = dz - closestZ;
                    const distH = Math.sqrt(distX*distX + distZ*distZ);
                    if (distH < playerRadius && distH > 0.001) {
                        const overlap = playerRadius - distH;
                        const norm = new THREE.Vector3(distX, 0, distZ).normalize();
                        pos.x += norm.x * overlap;
                        pos.z += norm.z * overlap;
                    }
                } else if (col.type === 'sphere') {
                    const center = col.center;
                    const dx = pos.x - center.x;
                    const dz = pos.z - center.z;
                    const distH = Math.sqrt(dx*dx + dz*dz);
                    const minDist = col.radius + playerRadius;
                    if (distH < minDist && distH > 0.001) {
                        const overlap = minDist - distH;
                        const norm = new THREE.Vector3(dx, 0, dz).normalize();
                        pos.x += norm.x * overlap;
                        pos.z += norm.z * overlap;
                    } else if (distH < 0.001) {
                        pos.x += 0.1;
                        pos.z += 0.1;
                    }
                }
            }
            return pos;
        }

        // --- ОСНОВНОЙ ЦИКЛ ---
        let lastTime = performance.now();

        function animate(time) {
            requestAnimationFrame(animate);
            const delta = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            if (document.pointerLockElement === renderer.domElement) {
                // --- СКОРОСТЬ ---
                const baseSpeed = 4.0;
                const runMultiplier = (keys.shift && stamina > 0) ? 2.0 : 1.0;
                const currentSpeed = baseSpeed * runMultiplier;

                // --- НАПРАВЛЕНИЕ ---
                const dir = new THREE.Vector3(0, 0, 0);
                if (keys.w) dir.z -= 1;
                if (keys.s) dir.z += 1;
                if (keys.a) dir.x -= 1;
                if (keys.d) dir.x += 1;
                isMoving = dir.lengthSq() > 0;
                if (isMoving) dir.normalize();

                // --- ПОВОРОТ ---
                const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);

                // --- ДВИЖЕНИЕ ---
                let newPos = camera.position.clone();
                if (isMoving) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0; forward.normalize();
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    right.y = 0; right.normalize();
                    const moveDelta = new THREE.Vector3()
                        .addScaledVector(forward, -dir.z * currentSpeed * delta)
                        .addScaledVector(right, dir.x * currentSpeed * delta);
                    newPos.x += moveDelta.x;
                    newPos.z += moveDelta.z;
                }

                // --- КОЛЛИЗИИ ---
                newPos = resolveCollisions(newPos);

                // --- ПРЫЖОК ---
                if (keys.space && camera.position.y <= groundY + 0.01 && stamina >= jumpStaminaCost) {
                    velocityY = jumpSpeed;
                    stamina -= jumpStaminaCost;
                }

                // --- ГРАВИТАЦИЯ ---
                velocityY += gravity * delta;
                newPos.y += velocityY * delta;
                if (newPos.y < groundY) {
                    newPos.y = groundY;
                    velocityY = 0;
                }

                camera.position.copy(newPos);

                // --- СТАМИНА ---
                if (keys.shift && isMoving && camera.position.y <= groundY + 0.01) {
                    stamina = Math.max(0, stamina - staminaDrain * delta);
                } else {
                    stamina = Math.min(maxStamina, stamina + staminaRegen * delta);
                }
                staminaBar.style.width = (stamina / maxStamina * 100) + '%';

                // --- ПОКАЧИВАНИЕ ---
                if (isMoving && camera.position.y <= groundY + 0.01) {
                    const freq = runMultiplier > 1 ? 14 : 10;
                    const amp = runMultiplier > 1 ? 0.06 : 0.03;
                    bobPhase += currentSpeed * freq * delta;
                    const bobOffset = Math.sin(bobPhase) * amp;
                    camera.position.y += bobOffset * 0.3;
                    if (camera.position.y < groundY) camera.position.y = groundY;
                } else {
                    bobPhase *= 0.9;
                }

                // --- ГРАНИЦЫ КАРТЫ ---
                const limit = 35;
                if (Math.abs(camera.position.x) > limit) camera.position.x = Math.sign(camera.position.x) * limit;
                if (Math.abs(camera.position.z) > limit) camera.position.z = Math.sign(camera.position.z) * limit;
            }

            renderer.render(scene, camera);
        }

        animate(performance.now());

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('SWILL: Карта с холмами, низинами и домиком готова!');
    </script>
</body>
</html>
