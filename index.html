<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор миров — 3D строитель</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #fff; }
        #toolbar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,30,0.85); backdrop-filter: blur(8px);
            padding: 10px 20px; border-radius: 40px;
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 10; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        #toolbar button {
            background: rgba(255,255,255,0.06);
            border: none; color: #ccc;
            padding: 8px 18px; border-radius: 30px;
            font-size: 14px; cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        #toolbar button:hover { background: rgba(255,255,255,0.15); }
        #toolbar button.active { background: #4a9eff; color: #fff; border-color: #4a9eff; box-shadow: 0 0 20px rgba(74,158,255,0.3); }
        #toolbar button.danger { background: rgba(255,70,70,0.25); }
        #toolbar button.danger:hover { background: rgba(255,70,70,0.5); }
        #toolbar .separator { width: 1px; background: rgba(255,255,255,0.1); margin: 0 6px; }

        #status {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            padding: 8px 24px; border-radius: 40px;
            font-size: 15px; color: #ddd;
            z-index: 10; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            max-width: 90%;
        }

        #hint {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.4); padding: 6px 18px; border-radius: 20px;
            font-size: 13px; color: #aaa; z-index: 10; pointer-events: none;
            white-space: nowrap;
        }

        #brush-settings {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,30,0.85); backdrop-filter: blur(8px);
            padding: 8px 20px; border-radius: 30px;
            display: none; gap: 20px; align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 10; font-size: 14px; color: #ccc;
            pointer-events: auto;
        }
        #brush-settings label { display: flex; align-items: center; gap: 8px; }
        #brush-settings input[type="range"] { width: 100px; accent-color: #4a9eff; }

        #object-palette {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,30,0.85); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 30px;
            display: none; gap: 8px; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 10; pointer-events: auto;
        }
        #object-palette button {
            background: rgba(255,255,255,0.06);
            border: none; color: #ccc;
            padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 13px;
            transition: 0.2s;
        }
        #object-palette button:hover { background: rgba(255,255,255,0.15); }
        #object-palette button.active { background: #4a9eff; color: #fff; }

        .crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.15);
            font-size: 36px; pointer-events: none; z-index: 5;
            font-weight: 100;
            text-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        @media (max-width: 700px) {
            #toolbar button { font-size: 12px; padding: 6px 12px; }
            #hint { font-size: 11px; white-space: normal; bottom: 100px; }
        }
    </style>
</head>
<body>

    <div class="crosshair">+</div>

    <!-- Панель инструментов -->
    <div id="toolbar">
        <button data-mode="fly" class="active">✈️ Полет</button>
        <button data-mode="terrain">⛰️ Рельеф</button>
        <button data-mode="wall">🧱 Стены</button>
        <button data-mode="object">📦 Предметы</button>
        <button data-mode="select">🖱️ Выделить</button>
        <div class="separator"></div>
        <button id="export-btn" style="background:#4a9eff; color:#fff;">⬇️ Экспорт</button>
        <button id="clear-btn" class="danger">❌ Очистить</button>
    </div>

    <!-- Настройки кисти (для рельефа) -->
    <div id="brush-settings">
        <label>Радиус <input type="range" id="brush-radius" min="0.5" max="8" step="0.1" value="3"><span id="radius-label">3.0</span></label>
        <label>Сила <input type="range" id="brush-strength" min="0.1" max="2" step="0.1" value="0.6"><span id="strength-label">0.6</span></label>
    </div>

    <!-- Палитра предметов -->
    <div id="object-palette">
        <button data-object="cube" class="active">🧊 Куб</button>
        <button data-object="sphere">⚪ Сфера</button>
        <button data-object="cylinder">🥫 Цилиндр</button>
        <button data-object="tree">🌳 Дерево</button>
        <button data-object="table">🪑 Стол</button>
        <button data-object="chair">💺 Стул</button>
        <button data-object="lamp">💡 Торшер</button>
    </div>

    <!-- Статус -->
    <div id="status">Режим: Полет — WASD для движения, мышь для осмотра</div>
    <div id="hint">Кликните по сцене, чтобы начать</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ----- Импорт -----
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // ----- Настройки -----
        const MAP_SIZE = 100;
        const SEGMENTS = 64; // 64x64 вершин
        const MAX_HEIGHT = 5;
        const WALL_HEIGHT_DEFAULT = 2.5;
        const WALL_WIDTH_DEFAULT = 0.3;

        // ----- Состояние -----
        let currentMode = 'fly';
        let selectedObject = null;
        let objectIdCounter = 0;
        const sceneObjects = []; // массив { mesh, id, type, data }

        // Переменные для строительства стен
        let wallStartPoint = null; // точка начала стены

        // ----- Сцена, камера, рендер -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6da5c9);
        scene.fog = new THREE.Fog(0x6da5c9, 60, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(10, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ----- Управление камерой (полет) -----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 0.5;
        controls.maxDistance = 100;
        controls.target.set(0, 0, 0);
        controls.update();

        // Для режима полета: WASD двигают камеру, мышь вращает (OrbitControls уже делает это)
        // Настроим скорость движения
        let moveSpeed = 8;
        const keys = { w: false, a: false, s: false, d: false, shift: false };

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
                case 'ShiftLeft': keys.shift = true; e.preventDefault(); break;
                case 'Escape': 
                    if (currentMode === 'terrain' || currentMode === 'wall' || currentMode === 'object') {
                        setMode('fly');
                    }
                    break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; e.preventDefault(); break;
                case 'KeyA': keys.a = false; e.preventDefault(); break;
                case 'KeyS': keys.s = false; e.preventDefault(); break;
                case 'KeyD': keys.d = false; e.preventDefault(); break;
                case 'ShiftLeft': keys.shift = false; e.preventDefault(); break;
            }
        });

        // Движение камеры в режиме полета (обновляем в цикле)
        function updateFlyMovement(delta) {
            if (currentMode !== 'fly') return;
            const speed = keys.shift ? moveSpeed * 2.5 : moveSpeed;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();
            const move = new THREE.Vector3(0, 0, 0);
            if (keys.w) move.add(forward);
            if (keys.s) move.sub(forward);
            if (keys.a) move.sub(right);
            if (keys.d) move.add(right);
            if (move.length() > 0) {
                move.normalize().multiplyScalar(speed * delta);
                camera.position.add(move);
                controls.target.add(move);
            }
        }

        // ----- Освещение -----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
        sun.position.set(30, 40, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 100;
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-20, 10, -20);
        scene.add(fill);

        // ----- Ландшафт (100x100) -----
        const geometry = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, SEGMENTS, SEGMENTS);
        geometry.rotateX(-Math.PI/2);
        const posAttr = geometry.attributes.position;
        const vertexCount = posAttr.count;
        const origX = new Float32Array(vertexCount);
        const origZ = new Float32Array(vertexCount);
        for (let i=0; i<vertexCount; i++) {
            origX[i] = posAttr.getX(i);
            origZ[i] = posAttr.getZ(i);
        }
        const heights = new Float32Array(vertexCount);
        heights.fill(0);

        function updateTerrain() {
            for (let i=0; i<vertexCount; i++) {
                posAttr.setY(i, heights[i]);
            }
            posAttr.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        // Текстура травы
        const textureLoader = new THREE.TextureLoader();
        let grassTex = null;
        try {
            grassTex = textureLoader.load('textures/trawa.jpg');
        } catch(e) {}

        const terrainMat = new THREE.MeshStandardMaterial({
            map: grassTex || undefined,
            color: grassTex ? 0xffffff : 0x6da56a,
            roughness: 0.8,
            metalness: 0.0,
            side: THREE.DoubleSide,
        });
        const terrain = new THREE.Mesh(geometry, terrainMat);
        terrain.receiveShadow = true;
        terrain.castShadow = true;
        terrain.position.y = 0;
        scene.add(terrain);

        // Сетка для ориентира
        const gridHelper = new THREE.GridHelper(MAP_SIZE, 20, 0x88aa88, 0x446644);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // ----- Функции работы с рельефом -----
        function getClosestVertexIndex(x, z) {
            let minDist = Infinity;
            let idx = -1;
            for (let i=0; i<vertexCount; i++) {
                const dx = origX[i] - x;
                const dz = origZ[i] - z;
                const dist = dx*dx + dz*dz;
                if (dist < minDist) {
                    minDist = dist;
                    idx = i;
                }
            }
            return idx;
        }

        function modifyTerrain(x, z, radius, strength, mode) {
            const radiusSq = radius*radius;
            for (let i=0; i<vertexCount; i++) {
                const dx = origX[i] - x;
                const dz = origZ[i] - z;
                const distSq = dx*dx + dz*dz;
                if (distSq < radiusSq) {
                    const influence = 1 - Math.sqrt(distSq)/radius;
                    const delta = influence * strength;
                    if (mode === 'raise') heights[i] += delta;
                    else if (mode === 'lower') heights[i] -= delta;
                    heights[i] = Math.max(-MAX_HEIGHT, Math.min(MAX_HEIGHT, heights[i]));
                }
            }
            updateTerrain();
        }

        // ----- Функции создания объектов -----

        function createWall(x1, z1, x2, z2, height = WALL_HEIGHT_DEFAULT, width = WALL_WIDTH_DEFAULT) {
            const dx = x2 - x1;
            const dz = z2 - z1;
            const length = Math.sqrt(dx*dx + dz*dz);
            if (length < 0.3) return null;
            const angle = Math.atan2(dx, dz);
            const midX = (x1 + x2) / 2;
            const midZ = (z1 + z2) / 2;
            // Материал стены (дерево или камень)
            const wallMat = new THREE.MeshStandardMaterial({
                color: 0xbc8f4f,
                roughness: 0.7,
                metalness: 0.0,
            });
            const wall = new THREE.Mesh(new THREE.BoxGeometry(width, height, length), wallMat);
            wall.position.set(midX, height/2, midZ);
            wall.rotation.y = angle;
            wall.castShadow = true;
            wall.receiveShadow = true;
            wall.userData.isObject = true;
            wall.userData.id = objectIdCounter++;
            wall.userData.type = 'wall';
            wall.userData.width = width;
            wall.userData.height = height;
            wall.userData.length = length;
            scene.add(wall);
            const objData = { mesh: wall, id: wall.userData.id, type: 'wall', data: { width, height, length, x1, z1, x2, z2 } };
            sceneObjects.push(objData);
            updateObjectList();
            return objData;
        }

        function createObject(type, position, color = 0xffaa00, size = 0.6) {
            let mesh;
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.1 });
            if (type === 'cube') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
            } else if (type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(size/2, 16, 16), mat);
            } else if (type === 'cylinder') {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(size/2, size/2, size, 12), mat);
            } else if (type === 'tree') {
                // Простое дерево: ствол + крона
                const group = new THREE.Group();
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 0.8, 6), trunkMat);
                trunk.position.y = 0.4;
                trunk.castShadow = true;
                group.add(trunk);
                const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
                const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.8, 6), leafMat);
                leaf.position.y = 0.9;
                leaf.castShadow = true;
                group.add(leaf);
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'tree';
                scene.add(group);
                const objData = { mesh: group, id: group.userData.id, type: 'tree', data: {} };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else if (type === 'table') {
                const group = new THREE.Group();
                const topMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
                const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.05, 0.5), topMat);
                top.position.y = 0.6;
                top.castShadow = true;
                group.add(top);
                const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                for (let x of [-0.35, 0.35]) {
                    for (let z of [-0.2, 0.2]) {
                        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.55, 6), legMat);
                        leg.position.set(x, 0.275, z);
                        group.add(leg);
                    }
                }
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'table';
                scene.add(group);
                const objData = { mesh: group, id: group.userData.id, type: 'table', data: {} };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else if (type === 'chair') {
                const group = new THREE.Group();
                const seatMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
                const seat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.05, 0.3), seatMat);
                seat.position.y = 0.35;
                seat.castShadow = true;
                group.add(seat);
                const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
                for (let x of [-0.12, 0.12]) {
                    for (let z of [-0.12, 0.12]) {
                        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), legMat);
                        leg.position.set(x, 0.15, z);
                        group.add(leg);
                    }
                }
                const backMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
                const back = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.02), backMat);
                back.position.set(0, 0.55, -0.15);
                group.add(back);
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'chair';
                scene.add(group);
                const objData = { mesh: group, id: group.userData.id, type: 'chair', data: {} };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else if (type === 'lamp') {
                const group = new THREE.Group();
                const poleMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.8, roughness: 0.2 });
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 1.0, 8), poleMat);
                pole.position.y = 0.5;
                pole.castShadow = true;
                group.add(pole);
                const shadeMat = new THREE.MeshStandardMaterial({ color: 0xFFE4B5 });
                const shade = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.25, 8), shadeMat);
                shade.position.y = 1.1;
                shade.castShadow = true;
                group.add(shade);
                const bulbMat = new THREE.MeshStandardMaterial({ color: 0xFFFF88, emissive: 0xFFFF88, emissiveIntensity: 0.3 });
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), bulbMat);
                bulb.position.y = 0.95;
                group.add(bulb);
                group.position.copy(position);
                group.userData.isObject = true;
                group.userData.id = objectIdCounter++;
                group.userData.type = 'lamp';
                scene.add(group);
                const objData = { mesh: group, id: group.userData.id, type: 'lamp', data: {} };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            } else {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), mat);
            }
            if (mesh) {
                mesh.position.copy(position);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.isObject = true;
                mesh.userData.id = objectIdCounter++;
                mesh.userData.type = type;
                scene.add(mesh);
                const objData = { mesh, id: mesh.userData.id, type, data: {} };
                sceneObjects.push(objData);
                updateObjectList();
                return objData;
            }
            return null;
        }

        function removeObject(objData) {
            scene.remove(objData.mesh);
            const idx = sceneObjects.indexOf(objData);
            if (idx !== -1) sceneObjects.splice(idx, 1);
            if (selectedObject === objData) {
                selectedObject = null;
                transformControls.detach();
            }
            updateObjectList();
        }

        function clearAll() {
            sceneObjects.forEach(obj => scene.remove(obj.mesh));
            sceneObjects.length = 0;
            selectedObject = null;
            transformControls.detach();
            updateObjectList();
            // Сброс высот
            for (let i=0; i<vertexCount; i++) heights[i] = 0;
            updateTerrain();
        }

        // ----- Transform Controls -----
        const transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.setSize(0.6);
        scene.add(transformControls);

        transformControls.addEventListener('dragging-changed', (event) => {
            controls.enabled = !event.value;
        });

        // При изменении объекта обновляем его данные (для экспорта)
        transformControls.addEventListener('objectChange', () => {
            if (selectedObject) {
                const mesh = selectedObject.mesh;
                selectedObject.data.position = mesh.position.clone();
                selectedObject.data.rotation = mesh.rotation.clone();
                selectedObject.data.scale = mesh.scale.clone();
            }
        });

        // ----- Управление выделением -----
        function selectObject(objData) {
            if (selectedObject === objData) return;
            if (selectedObject) {
                transformControls.detach();
            }
            selectedObject = objData;
            if (objData) {
                transformControls.attach(objData.mesh);
                setStatus(`Выделен ${objData.type} #${objData.id}`);
            } else {
                setStatus('Выделение снято');
            }
            updateObjectList();
        }

        // ----- UI: список объектов (пока только статус, но можно вывести) -----
        function updateObjectList() {
            // Можно вывести список в консоль или в отдельный элемент, пока упростим
            // Для наглядности обновим статус количеством объектов
            document.getElementById('status').textContent = `Объектов: ${sceneObjects.length} | Режим: ${currentMode}`;
        }

        // ----- Обработка кликов по сцене -----
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            // Ищем пересечение с ландшафтом и объектами
            const targets = [terrain, ...sceneObjects.map(o => o.mesh)];
            const intersects = raycaster.intersectObjects(targets, true);
            if (intersects.length > 0) {
                return intersects[0];
            }
            return null;
        }

        function getTerrainIntersection(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
