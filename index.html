<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STALKER TEST — SWILL FIX</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #blocker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            cursor: pointer;
            z-index: 999;
            text-shadow: 0 0 20px #0f0;
        }
        #blocker span {
            background: #111;
            padding: 30px 50px;
            border: 3px solid #0f0;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div id="blocker"><span>КЛИКНИ, ЧТОБЫ ВОЙТИ В ЗОНУ</span></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ИНИЦИАЛИЗАЦИЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2b3c);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.80, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- БЛОКИРОВКА ---
        const blocker = document.getElementById('blocker');
        blocker.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('pointerlockchange', () => {
            blocker.style.display = document.pointerLockElement ? 'none' : 'flex';
        });

        // --- УПРАВЛЕНИЕ ---
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; break;
                case 'KeyA': keys.a = true; break;
                case 'KeyS': keys.s = true; break;
                case 'KeyD': keys.d = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; break;
                case 'KeyA': keys.a = false; break;
                case 'KeyS': keys.s = false; break;
                case 'KeyD': keys.d = false; break;
            }
        });

        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== renderer.domElement) return;
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        });

        // --- СВЕТ ---
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
        sun.position.set(20, 30, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 60;
        sun.shadow.camera.left = -30;
        sun.shadow.camera.right = 30;
        sun.shadow.camera.top = 30;
        sun.shadow.camera.bottom = -30;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
        fill.position.set(-20, 10, -20);
        scene.add(fill);

        // --- ЗАГРУЗКА ТЕКСТУР ---
        const loader = new THREE.TextureLoader();
        const textures = {};

        function loadTex(name) {
            return new Promise((resolve) => {
                loader.load(`textures/${name}`, (tex) => {
                    tex.needsUpdate = true;
                    resolve(tex);
                }, undefined, () => resolve(null));
            });
        }

        const texList = {
            zemla: 'zemla.jpg',
            trawa: 'trawa.jpg',
            stena: 'stena.jpg',
            nebo: 'nebo.jpg',
            bereza: 'bereza.jpg', // можно JPG — код вырежет белый
            elka: 'elka.jpg'      // можно JPG — код вырежет белый
        };

        const loadPromises = Object.entries(texList).map(async ([key, file]) => {
            const tex = await loadTex(file);
            if (tex) textures[key] = tex;
            else console.warn(`SWILL: не загрузилась хуйня ${file}`);
        });

        await Promise.all(loadPromises);
        console.log('SWILL: все текстуры загружены');

        // --- УДАЛЕНИЕ БЕЛОГО ФОНА ИЗ КАРТИНКИ ---
        function removeWhiteBackground(texture) {
            if (!texture) return null;
            const img = texture.image;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                if (r > 230 && g > 230 && b > 230) {
                    data[i + 3] = 0;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            const newTex = new THREE.CanvasTexture(canvas);
            newTex.needsUpdate = true;
            return newTex;
        }

        // --- ФУНКЦИЯ СОЗДАНИЯ ДЕРЕВА (УВЕЛИЧЕННАЯ В 2 РАЗА) ---
        function createTree(texture, x, z, scale = 1.0) {
            if (!texture) return null;
            const cleanTex = removeWhiteBackground(texture);
            if (!cleanTex) return null;
            
            const mat = new THREE.SpriteMaterial({
                map: cleanTex,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                opacity: 1.0
            });
            const sprite = new THREE.Sprite(mat);
            // УВЕЛИЧИВАЕМ В 2 РАЗА
            const finalScale = 2.5 * scale * 2;
            sprite.position.set(x, 1.25, z);
            sprite.scale.set(finalScale, finalScale, 1);
            return sprite;
        }

        // --- МИР ---
        if (textures.zemla) {
            const g = new THREE.Mesh(
                new THREE.PlaneGeometry(60, 60),
                new THREE.MeshStandardMaterial({ map: textures.zemla, roughness: 0.8 })
            );
            g.rotation.x = -Math.PI/2;
            g.position.y = 0;
            g.receiveShadow = true;
            scene.add(g);
        }

        if (textures.trawa) {
            const g = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshStandardMaterial({ map: textures.trawa, roughness: 0.9 })
            );
            g.rotation.x = -Math.PI/2;
            g.position.set(0, 0.01, 0);
            g.receiveShadow = true;
            scene.add(g);
        }

        if (textures.stena) {
            const w = new THREE.Mesh(
                new THREE.BoxGeometry(8, 4, 0.5),
                new THREE.MeshStandardMaterial({ map: textures.stena, roughness: 0.7 })
            );
            w.position.set(-5, 2, -8);
            w.castShadow = true;
            w.receiveShadow = true;
            scene.add(w);
        }

        // ДЕРЕВЬЯ (теперь без белого фона и УВЕЛИЧЕННЫЕ)
        if (textures.bereza) {
            scene.add(createTree(textures.bereza, -3, -2, 1.0));
            scene.add(createTree(textures.bereza, 4, -3, 0.9));
        }
        if (textures.elka) {
            scene.add(createTree(textures.elka, 2, 5, 1.1));
            scene.add(createTree(textures.elka, -4, 4, 1.0));
            scene.add(createTree(textures.elka, 6, 2, 0.8));
        }

        // НЕБО
        if (textures.nebo) {
            const sky = new THREE.Mesh(
                new THREE.SphereGeometry(200, 32, 32),
                new THREE.MeshBasicMaterial({ map: textures.nebo, side: THREE.BackSide })
            );
            sky.position.y = 0;
            scene.add(sky);
        }

        console.log('SWILL: сцена готова, деревья увеличены в 2 раза, белый фон удалён');

        // --- АНИМАЦИЯ ---
        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement === renderer.domElement) {
                const speed = 0.08;
                const dir = new THREE.Vector3(0, 0, 0);
                if (keys.w) dir.z -= speed;
                if (keys.s) dir.z += speed;
                if (keys.a) dir.x -= speed;
                if (keys.d) dir.x += speed;
                
                const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
                camera.quaternion.setFromEuler(euler);
                
                if (dir.lengthSq() > 0) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0; forward.normalize();
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    right.y = 0; right.normalize();
                    camera.position.add(new THREE.Vector3().addScaledVector(forward, -dir.z).addScaledVector(right, dir.x));
                }
                if (camera.position.y < 1.80) camera.position.y = 1.80;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
