<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL 3D ОТКРЫТЫЙ МИР</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffcc;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border: 2px solid #00ffcc;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 10px #00ffcc;
        }
        #info span {
            color: #ff3366;
            font-weight: bold;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 24px;
            z-index: 200;
            text-shadow: 0 0 20px #00ffcc;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">SWILL 3D OPEN WORLD<br>ЗАГРУЗКА...</div>
    <div id="info">SWILL 3D ОТКРЫТЫЙ | <span>WASD</span> — движение | <span>Мышь</span> — осмотр | <span>Shift</span> — бег | <span>Пробел</span> — прыжок</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // ---------------------------------------------------------------
        // SWILL 3D ОТКРЫТЫЙ МИР - НАСТОЯЩИЙ ТРЁХМЕРНЫЙ ПИЗДЕЦ
        // ---------------------------------------------------------------
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // Инициализация
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 10, 30);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Управление
        const controls = new PointerLockControls(camera, renderer.domElement);
        renderer.domElement.addEventListener('click', () => controls.lock());

        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 60, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 120;
        dirLight.shadow.camera.left = -60;
        dirLight.shadow.camera.right = 60;
        dirLight.shadow.camera.top = 60;
        dirLight.shadow.camera.bottom = -60;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.4);
        scene.add(hemiLight);

        // Загрузка текстур
        const textureLoader = new THREE.TextureLoader();
        const textures = {};
        const textureNames = ['stena', 'stena2', 'trawa', 'trawa2', 'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'];
        
        function loadAllTextures() {
            return new Promise((resolve) => {
                let loaded = 0;
                const total = textureNames.length;
                
                textureNames.forEach(name => {
                    const ext = name === 'bereza' ? 'png' : 'jpg';
                    textureLoader.load(
                        `textures/${name}.${ext}`,
                        (texture) => {
                            textures[name] = texture;
                            loaded++;
                            if (loaded === total) resolve();
                        },
                        undefined,
                        () => {
                            // Заглушка
                            const canvas = document.createElement('canvas');
                            canvas.width = 512;
                            canvas.height = 512;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
                            ctx.fillRect(0, 0, 512, 512);
                            ctx.fillStyle = '#fff';
                            ctx.font = '40px monospace';
                            ctx.textAlign = 'center';
                            ctx.fillText(name, 256, 256);
                            textures[name] = new THREE.CanvasTexture(canvas);
                            loaded++;
                            if (loaded === total) resolve();
                        }
                    );
                });
            });
        }

        // Создание настоящего 3D мира
        function create3DWorld() {
            const group = new THREE.Group();
            const worldSize = 60;
            const tileSize = 3;
            const halfWorld = worldSize / 2;
            
            const collisionObjects = [];

            // Генерация рельефа и объектов
            for (let x = -halfWorld; x < halfWorld; x += tileSize) {
                for (let z = -halfWorld; z < halfWorld; z += tileSize) {
                    // Определяем высоту и тип
                    let height = 0;
                    let textureKey = 'trawa';
                    let isWall = false;
                    let isTree = false;
                    let isFloor = false;
                    
                    // Создаём холмы и впадины
                    const distFromCenter = Math.sqrt(x*x + z*z);
                    const noise = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 0.5;
                    
                    // Центральная равнина с домом
                    if (distFromCenter < 10) {
                        height = 0;
                        if (Math.abs(x) < 4 && Math.abs(z) < 4) {
                            // Пол дома
                            textureKey = 'dpol';
                            isFloor = true;
                            height = 0.2;
                        } else if (Math.abs(x) < 6 && Math.abs(z) < 6 && (Math.abs(x) > 3 || Math.abs(z) > 3)) {
                            // Стены дома (3D стены)
                            textureKey = Math.random() > 0.5 ? 'stena' : 'stena2';
                            isWall = true;
                            height = 0.2;
                        } else {
                            textureKey = Math.random() > 0.5 ? 'trawa' : 'trawa2';
                            height = noise * 0.3;
                        }
                    } else if (distFromCenter < 20) {
                        // Лесная зона
                        textureKey = Math.random() > 0.5 ? 'zemla' : 'zemla2';
                        height = noise * 0.8 + 0.2;
                        if (Math.random() < 0.15) {
                            isTree = true;
                        }
                    } else {
                        // Открытые поля
                        textureKey = Math.random() > 0.5 ? 'trawa' : 'trawa2';
                        height = noise * 0.5 - 0.2;
                    }

                    // СОЗДАЁМ ОБЪЁМНЫЕ БЛОКИ
                    const geometry = new THREE.BoxGeometry(tileSize - 0.1, Math.max(0.3, Math.abs(height) + 0.1), tileSize - 0.1);
                    const material = new THREE.MeshStandardMaterial({
                        map: textures[textureKey] || textures['trawa'],
                        roughness: 0.7,
                        metalness: 0.1
                    });
                    
                    const tile = new THREE.Mesh(geometry, material);
                    tile.position.set(x, height / 2, z);
                    tile.receiveShadow = true;
                    tile.castShadow = true;
                    group.add(tile);

                    // Коллизия для стен
                    if (isWall) {
                        // Создаём вертикальные стены
                        const wallHeight = 2.5;
                        const wallGeom = new THREE.BoxGeometry(tileSize - 0.2, wallHeight, tileSize - 0.2);
                        const wallMat = new THREE.MeshStandardMaterial({
                            map: textures[textureKey],
                            roughness: 0.9,
                            metalness: 0.1
                        });
                        const wall = new THREE.Mesh(wallGeom, wallMat);
                        wall.position.set(x, wallHeight/2 + height/2, z);
                        wall.castShadow = true;
                        wall.receiveShadow = true;
                        group.add(wall);
                        
                        collisionObjects.push({ 
                            x: x, 
                            z: z, 
                            radius: 1.2,
                            isWall: true 
                        });
                    }

                    // 3D ДЕРЕВЬЯ (НАСТОЯЩИЕ)
                    if (isTree && !isWall) {
                        const treeGroup = create3DTree(x, z, height);
                        group.add(treeGroup);
                        collisionObjects.push({
                            x: x,
                            z: z,
                            radius: 1.0,
                            isTree: true
                        });
                    }
                }
            }

            // НЕБО - большой купол
            const skyGeom = new THREE.SphereGeometry(100, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                map: textures['nebo'] || textures['trawa'],
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeom, skyMat);
            sky.position.y = 20;
            group.add(sky);

            return { group, collisionObjects };
        }

        // СОЗДАНИЕ 3D ДЕРЕВА
        function create3DTree(x, z, height) {
            const treeGroup = new THREE.Group();
            
            // Ствол
            const trunkGeom = new THREE.CylinderGeometry(0.3, 0.5, 2.5, 8);
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0x8B7355,
                roughness: 0.9,
                metalness: 0.1
            });
            const trunk = new THREE.Mesh(trunkGeom, trunkMat);
            trunk.position.y = 1.25 + height;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);

            // Крона (объёмная сфера с текстурой листвы)
            const leafMat = new THREE.MeshStandardMaterial({
                map: textures['bereza'],
                transparent: true,
                roughness: 0.7,
                metalness: 0.1
            });
            
            // Большая крона
            const crownGeom = new THREE.SphereGeometry(1.8, 8, 8);
            const crown = new THREE.Mesh(crownGeom, leafMat);
            crown.position.y = 3.0 + height;
            crown.castShadow = true;
            crown.receiveShadow = true;
            treeGroup.add(crown);

            // Дополнительные ветки для объёма
            const crown2Geom = new THREE.SphereGeometry(1.2, 6, 6);
            const crown2 = new THREE.Mesh(crown2Geom, leafMat);
            crown2.position.set(1.2, 3.5 + height, 0.8);
            crown2.castShadow = true;
            crown2.receiveShadow = true;
            treeGroup.add(crown2);

            const crown3Geom = new THREE.SphereGeometry(1.0, 6, 6);
            const crown3 = new THREE.Mesh(crown3Geom, leafMat);
            crown3.position.set(-1.1, 3.8 + height, -0.9);
            crown3.castShadow = true;
            crown3.receiveShadow = true;
            treeGroup.add(crown3);

            treeGroup.position.set(x, 0, z);
            return treeGroup;
        }

        // Проверка коллизий
        function checkCollision(newPos, collisionObjects) {
            const radius = 0.5;
            for (const obj of collisionObjects) {
                const dx = newPos.x - obj.x;
                const dz = newPos.z - obj.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < radius + obj.radius) {
                    return true;
                }
            }
            return false;
        }

        // Запуск игры
        async function init() {
            document.getElementById('loading').textContent = 'SWILL 3D OPEN WORLD\nЗАГРУЗКА ТЕКСТУР...';
            await loadAllTextures();
            
            document.getElementById('loading').textContent = 'SWILL 3D OPEN WORLD\nСОЗДАНИЕ МИРА...';
            
            const { group, collisionObjects } = create3DWorld();
            scene.add(group);

            // Игрок
            const playerGeom = new THREE.BoxGeometry(0.8, 1.6, 0.8);
            const playerMat = new THREE.MeshStandardMaterial({ 
                color: 0xff3366, 
                emissive: 0x440011,
                roughness: 0.3,
                metalness: 0.7
            });
            const player = new THREE.Mesh(playerGeom, playerMat);
            player.position.set(0, 0.8, 0);
            player.castShadow = true;
            scene.add(player);

            // Управление
            const keys = {};
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);

            // Прыжок
            let velocityY = 0;
            let isJumping = false;
            const gravity = -0.02;
            const jumpSpeed = 0.3;
            const groundY = 0.8;

            document.getElementById('loading').style.display = 'none';

            // Игровой цикл
            function animate() {
                requestAnimationFrame(animate);

                // Движение
                const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? 0.15 : 0.05;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0;
                dir.normalize();

                const right = new THREE.Vector3();
                right.crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();

                const newPos = player.position.clone();

                if (keys['KeyW']) newPos.add(dir.clone().multiplyScalar(speed));
                if (keys['KeyS']) newPos.sub(dir.clone().multiplyScalar(speed));
                if (keys['KeyA']) newPos.sub(right.clone().multiplyScalar(speed));
                if (keys['KeyD']) newPos.add(right.clone().multiplyScalar(speed));

                // Гравитация и прыжок
                if (keys['Space'] && !isJumping) {
                    velocityY = jumpSpeed;
                    isJumping = true;
                }

                velocityY += gravity;
                newPos.y += velocityY;

                if (newPos.y < groundY) {
                    newPos.y = groundY;
                    velocityY = 0;
                    isJumping = false;
                }

                // Коллизия
                if (!checkCollision(newPos, collisionObjects)) {
                    player.position.copy(newPos);
                    camera.position.copy(newPos.clone().add(new THREE.Vector3(0, 2, 0)));
                } else {
                    // Если коллизия, откатываемся
                    if (keys['KeyW']) player.position.sub(dir.clone().multiplyScalar(speed));
                    if (keys['KeyS']) player.position.add(dir.clone().multiplyScalar(speed));
                    if (keys['KeyA']) player.position.add(right.clone().multiplyScalar(speed));
                    if (keys['KeyD']) player.position.sub(right.clone().multiplyScalar(speed));
                    
                    // Обновляем камеру
                    camera.position.copy(player.position.clone().add(new THREE.Vector3(0, 2, 0)));
                }

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        init().catch(err => {
            console.error('SWILL ОШИБКА:', err);
            document.getElementById('loading').textContent = 'SWILL: ОШИБКА! СМОТРИ КОНСОЛЬ';
        });

    </script>
</body>
</html>
