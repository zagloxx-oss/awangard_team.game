<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL 3D - КРЕСТ НА КРЕСТ</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #info {
            position: absolute; bottom: 20px; left: 20px; color: #00ffcc;
            background: rgba(0,0,0,0.8); padding: 15px 25px; border: 2px solid #00ffcc;
            border-radius: 5px; font-size: 14px; pointer-events: none; z-index: 100;
            text-shadow: 0 0 10px #00ffcc;
        }
        #info span { color: #ff3366; font-weight: bold; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 24px; z-index: 200; text-shadow: 0 0 20px #00ffcc;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">SWILL 3D - КРЕСТ НА КРЕСТ<br>ЗАГРУЗКА...</div>
    <div id="info"><span>WASD</span> — движение | <span>Мышь</span> — осмотр | <span>Shift</span> — бег</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // === ИНИЦИАЛИЗАЦИЯ ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(10, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, renderer.domElement);
        renderer.domElement.addEventListener('click', () => controls.lock());

        // === СВЕТ ===
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(30, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        scene.add(dirLight);
        const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.3);
        scene.add(hemi);

        // === ЗАГРУЗКА ТЕКСТУР ===
        const loader = new THREE.TextureLoader();
        const textures = {};
        const names = ['stena', 'stena2', 'trawa', 'trawa2', 'zemla', 'zemla2', 'dpol', 'nebo', 'bereza'];
        function loadAll() {
            return new Promise((resolve) => {
                let loaded = 0;
                names.forEach(name => {
                    const ext = name === 'bereza' ? 'png' : 'jpg';
                    loader.load(`textures/${name}.${ext}`, (tex) => {
                        textures[name] = tex;
                        loaded++;
                        if (loaded === names.length) resolve();
                    }, undefined, () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 512; canvas.height = 512;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
                        ctx.fillRect(0, 0, 512, 512);
                        ctx.fillStyle = '#fff';
                        ctx.font = '40px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText(name, 256, 256);
                        textures[name] = new THREE.CanvasTexture(canvas);
                        loaded++;
                        if (loaded === names.length) resolve();
                    });
                });
            });
        }

        // === СОЗДАНИЕ МИРА ===
        function buildWorld() {
            const group = new THREE.Group();
            const collisionObjects = [];

            // 1. ЗЕМЛЯ — ОДНА БОЛЬШАЯ ТЕКСТУРА
            const groundGeom = new THREE.PlaneGeometry(80, 80);
            const groundMat = new THREE.MeshStandardMaterial({
                map: textures['trawa'] || textures['trawa2'] || textures['zemla'],
                roughness: 0.9,
                metalness: 0.0,
                side: THREE.DoubleSide
            });
            const ground = new THREE.Mesh(groundGeom, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            ground.receiveShadow = true;
            group.add(ground);

            // 2. СТЕНЫ — 3D КУБЫ
            const wallPositions = [
                { x: -4, z: -4 }, { x: 0, z: -4 }, { x: 4, z: -4 },
                { x: -4, z: 0 }, { x: 4, z: 0 },
                { x: -4, z: 4 }, { x: 0, z: 4 }, { x: 4, z: 4 }
            ];
            wallPositions.forEach((pos, i) => {
                const texKey = i % 2 === 0 ? 'stena' : 'stena2';
                const wallMat = new THREE.MeshStandardMaterial({
                    map: textures[texKey],
                    roughness: 0.8,
                    metalness: 0.1
                });
                const wallGeom = new THREE.BoxGeometry(1.8, 2.5, 1.8);
                const wall = new THREE.Mesh(wallGeom, wallMat);
                wall.position.set(pos.x, 1.25, pos.z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                group.add(wall);
                collisionObjects.push({
                    type: 'box',
                    x: pos.x, z: pos.z,
                    radius: 1.3
                });
            });

            // 3. ДЕРЕВЬЯ — КРЕСТ НА КРЕСТ ИЗ ДВУХ ПЛОСКОСТЕЙ
            function createTreeSprite(x, z) {
                const groupTree = new THREE.Group();
                const mat = new THREE.MeshStandardMaterial({
                    map: textures['bereza'],
                    transparent: true,
                    side: THREE.DoubleSide,
                    roughness: 0.6,
                    metalness: 0.0,
                    alphaTest: 0.1 // чтобы не было артефактов
                });
                const geom = new THREE.PlaneGeometry(3, 3);
                // Первая плоскость
                const plane1 = new THREE.Mesh(geom, mat);
                plane1.position.y = 1.5;
                plane1.castShadow = true;
                plane1.receiveShadow = true;
                groupTree.add(plane1);
                // Вторая плоскость — повёрнута на 90°
                const plane2 = new THREE.Mesh(geom, mat);
                plane2.rotation.y = Math.PI / 2;
                plane2.position.y = 1.5;
                plane2.castShadow = true;
                plane2.receiveShadow = true;
                groupTree.add(plane2);

                groupTree.position.set(x, 0, z);
                return groupTree;
            }

            const treePositions = [
                { x: -10, z: -10 }, { x: 12, z: -8 }, { x: -8, z: 12 },
                { x: 15, z: 10 }, { x: -15, z: -5 }, { x: 5, z: -15 },
                { x: -12, z: 5 }, { x: 8, z: -12 }
            ];
            treePositions.forEach(pos => {
                const tree = createTreeSprite(pos.x, pos.z);
                group.add(tree);
                collisionObjects.push({
                    type: 'sphere',
                    x: pos.x, z: pos.z,
                    radius: 1.8
                });
            });

            // 4. ПОЛ ВНУТРИ КОМНАТЫ
            const floorMat = new THREE.MeshStandardMaterial({
                map: textures['dpol'],
                roughness: 0.6,
                metalness: 0.1
            });
            const floorGeom = new THREE.PlaneGeometry(3.5, 3.5);
            const floor = new THREE.Mesh(floorGeom, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(0, 0.02, 0);
            floor.receiveShadow = true;
            group.add(floor);

            // 5. НЕБО
            const skyGeom = new THREE.SphereGeometry(70, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({
                map: textures['nebo'],
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeom, skyMat);
            sky.position.y = 10;
            group.add(sky);

            return { group, collisionObjects };
        }

        // === КОЛЛИЗИЯ ===
        function checkCollision(newPos, objects) {
            const playerRadius = 0.6;
            for (const obj of objects) {
                const dx = newPos.x - obj.x;
                const dz = newPos.z - obj.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < playerRadius + obj.radius) return true;
            }
            return false;
        }

        // === ЗАПУСК ===
        async function init() {
            document.getElementById('loading').textContent = 'SWILL 3D - КРЕСТ НА КРЕСТ\nЗАГРУЗКА ТЕКСТУР...';
            await loadAll();

            document.getElementById('loading').textContent = 'SWILL 3D - КРЕСТ НА КРЕСТ\nСТРОЮ МИР...';
            const { group, collisionObjects } = buildWorld();
            scene.add(group);

            // Игрок
            const playerGeom = new THREE.BoxGeometry(0.8, 1.6, 0.8);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x440011 });
            const player = new THREE.Mesh(playerGeom, playerMat);
            player.position.set(0, 0.8, 5);
            player.castShadow = true;
            scene.add(player);

            const keys = {};
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);

            document.getElementById('loading').style.display = 'none';

            function animate() {
                requestAnimationFrame(animate);
                const speed = keys['ShiftLeft'] ? 0.15 : 0.05;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0;
                dir.normalize();
                const right = new THREE.Vector3();
                right.crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();

                const newPos = player.position.clone();
                if (keys['KeyW']) newPos.add(dir.clone().multiplyScalar(speed));
                if (keys['KeyS']) newPos.sub(dir.clone().multiplyScalar(speed));
                if (keys['KeyA']) newPos.sub(right.clone().multiplyScalar(speed));
                if (keys['KeyD']) newPos.add(right.clone().multiplyScalar(speed));

                if (!checkCollision(newPos, collisionObjects)) {
                    player.position.copy(newPos);
                    camera.position.copy(newPos.clone().add(new THREE.Vector3(0, 2, 0)));
                } else {
                    if (keys['KeyW']) player.position.sub(dir.clone().multiplyScalar(speed*0.5));
                    if (keys['KeyS']) player.position.add(dir.clone().multiplyScalar(speed*0.5));
                    if (keys['KeyA']) player.position.add(right.clone().multiplyScalar(speed*0.5));
                    if (keys['KeyD']) player.position.sub(right.clone().multiplyScalar(speed*0.5));
                    camera.position.copy(player.position.clone().add(new THREE.Vector3(0, 2, 0)));
                }

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        init().catch(err => {
            console.error('SWILL ОШИБКА:', err);
            document.getElementById('loading').textContent = 'SWILL: ОШИБКА! СМОТРИ КОНСОЛЬ';
        });
    </script>
</body>
</html>
